<!--
  Load the real game modules in their native browser environment, in the same
  order index.html uses. This tests the actual shipping code, not a re-implementation.

  side effects are harmless against the hidden canvas above.
-->
<script>
/* ===== data.js ===== */
const GAME_VERSION = '1.10.0';

const DUNGEON_NAME = 'The Dungeon of Ash';

const MAX_DUNGEON_FLOOR = 100;

// Maximum number of allied minions the Necromancer subclass can maintain
// simultaneously. Referenced in both getSubclassMeterHtml (display) and
// useSubclassAbility (logic) — changing it here propagates to both.
const NECROMANCER_MINION_CAP = 2;


// ── Seeded RNG ──────────────────────────────────────────────────────────────
// Mulberry32: small, fast, and — critically — fully deterministic given the
// same 32-bit seed. Every gameplay-determining Math.random() call in the
// codebase has been migrated to call rng() instead, so two runs started
// from the same seed code play out identically: same dungeon layouts, same
// loot rolls, same enemy AI decisions, same shop stock, same dice outcomes.
//
// Deliberately NOT migrated: a few purely cosmetic randoms that don't
// affect what actually happens in the run (the dice-table flicker
// animation during a roll, and ambient NPC/tavern flavor-line selection).
// Routing those through the seeded stream would burn RNG state on visual
// flourishes that have zero gameplay consequence, for no replay benefit.
let _rngState = null;

function _mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

// The actual replacement for Math.random() throughout gameplay code.
// Falls back to Math.random() only if seedRun() was never called (e.g.
// some future code path forgets to seed) so a missing seed degrades to
// "works, just not deterministic" rather than crashing outright.
function rng() {
    return _rngState ? _rngState() : Math.random();
}

// Call once per run, before any gameplay randomness happens (currently:
// inside initGame(), before generateDungeon()'s first call). Stores the
// seed on gameState so it can be displayed, copied, and persisted through
// save/load.
function seedRun(seed) {
    const s = (seed >>> 0) || 1; // 0 is a valid mulberry32 seed but reads
                                  // oddly as "no seed" in the UI; nudge to 1.
    gameState.runSeed = s;
    _rngState = _mulberry32(s);
}

const SEED_ALPHABET = '23456789ABCDEFGHJKMNPQRSTUVWXYZ'; // no 0/O or 1/I/L — avoids transcription mistakes
const SEED_CODE_LENGTH = 7;

function seedToCode(seed) {
    let n = (seed >>> 0) || 1;
    let out = '';
    for (let i = 0; i < SEED_CODE_LENGTH; i++) {
        out = SEED_ALPHABET[n % SEED_ALPHABET.length] + out;
        n = Math.floor(n / SEED_ALPHABET.length);
    }
    return out;
}

// Returns the decoded seed, or null if the code contains characters
// outside SEED_ALPHABET (case-insensitive on input).
function codeToSeed(code) {
    if (!code) return null;
    const cleaned = code.trim().toUpperCase();
    if (!cleaned) return null;
    let n = 0;
    for (const ch of cleaned) {
        const idx = SEED_ALPHABET.indexOf(ch);
        if (idx === -1) return null;
        n = n * SEED_ALPHABET.length + idx;
    }
    return n >>> 0;
}

// Generates a fresh random seed for a new, unseeded run. Uses the page's
// actual Math.random() (deliberately, not rng() — there's no seed yet to
// draw from) seasoned with the current time so two runs started in the
// same millisecond still get different seeds.
function generateRandomSeed() {
    return (Math.floor(Math.random() * 4294967296) ^ Date.now()) >>> 0;
}


// ── Daily Challenge ────────────────────────────────────────────────────────────
// Everyone in the world plays the same dungeon each day. The seed is derived
// deterministically from the UTC date, so two players on the same calendar day
// (UTC) get an identical run to compare. Personal best-per-day is stored in
// gameMeta.dailyRecords keyed by the date string.

// Returns today's date key as 'YYYY-MM-DD' in UTC, so the daily rolls over at
// the same instant worldwide rather than at each player's local midnight.
function getDailyKey(date = new Date()) {
    return date.toISOString().slice(0, 10); // 'YYYY-MM-DD'
}

// Deterministic 32-bit seed from the date key. Uses a simple string hash so the
// same date always yields the same seed, but consecutive days look unrelated.
function getDailySeed(dateKey = getDailyKey()) {
    let h = 2166136261 >>> 0; // FNV-1a basis
    for (let i = 0; i < dateKey.length; i++) {
        h ^= dateKey.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
    }
    // Avoid 0 (reads as "no seed"); guarantee a stable non-zero value.
    return (h || 1) >>> 0;
}

// The player's record for a given day, or null if they haven't played it.
// Record shape: { floor, won, className, subclass, ts }
function getDailyRecord(dateKey = getDailyKey()) {
    if (!gameMeta.dailyRecords) return null;
    return gameMeta.dailyRecords[dateKey] || null;
}

// Records a daily result, keeping only the player's best (deepest floor, or a
// win) for that day. Returns true if this run set a new personal daily best.
function recordDailyResult(dateKey, floor, won, className, subclass) {
    if (!gameMeta.dailyRecords) gameMeta.dailyRecords = {};
    const prev = gameMeta.dailyRecords[dateKey];
    const isBetter = !prev || won || floor > (prev.floor || 0);
    if (isBetter) {
        gameMeta.dailyRecords[dateKey] = { floor, won: !!won, className, subclass, ts: Date.now() };
    }
    // Earn 2 Renown for participating in a daily, once per day
    if (!prev && typeof earnRenown === 'function') earnRenown(2, 'daily challenge');
    // Prune old records so the object can't grow unbounded over months of play.
    const keys = Object.keys(gameMeta.dailyRecords).sort();
    while (keys.length > 60) {
        delete gameMeta.dailyRecords[keys.shift()];
    }
    saveMetaProgress();
    return isBetter;
}

// How many distinct days the player has completed at least one daily run on —
// drives a simple "streak/dedication" readout and a future achievement hook.
function getDailyPlayCount() {
    return gameMeta.dailyRecords ? Object.keys(gameMeta.dailyRecords).length : 0;
}


// ── Hero Statue tier ────────────────────────────────────────────────────────────
// The Trophy Hall's centerpiece statue upgrades its material as the player
// proves themselves, across BOTH the dungeon and the arena — so either path
// (or both) advances it. Returns a tier descriptor used by the renderer.
const HERO_STATUE_TIERS = [
    { id: 'stone',  name: 'Stone',  base: '#6e6a63', light: '#8d887e', dark: '#4c4944', sheen: 0.05 },
    { id: 'bronze', name: 'Bronze', base: '#9c6b3f', light: '#c89055', dark: '#6e4827', sheen: 0.12 },
    { id: 'silver', name: 'Silver', base: '#b9bcc4', light: '#e6e9f0', dark: '#83868f', sheen: 0.20 },
    { id: 'gold',   name: 'Gold',   base: '#d9a93f', light: '#ffe48a', dark: '#9c7320', sheen: 0.30 },
];

function getHeroStatueTier() {
    const best = gameState.bestFloor || 0;
    const bosses = gameMeta.bossesSlain || 0;
    // Arena tier index (0 Unknown .. 5 Legend), if the arena system is loaded.
    let arenaIdx = 0;
    if (typeof getArenaTier === 'function' && typeof ARENA_FAME_TIERS !== 'undefined') {
        arenaIdx = ARENA_FAME_TIERS.findIndex(t => t.title === getArenaTier().title);
        if (arenaIdx < 0) arenaIdx = 0;
    }
    // Gold: true endgame mastery on either track.
    if (best >= 75 || arenaIdx >= 5) return HERO_STATUE_TIERS[3];
    // Silver: deep delving or arena Gladiator+.
    if (best >= 50 || arenaIdx >= 3) return HERO_STATUE_TIERS[2];
    // Bronze: real progress — a milestone boss down or past Floor 25.
    if (best >= 25 || bosses >= 1 || arenaIdx >= 1) return HERO_STATUE_TIERS[1];
    // Stone: just starting out.
    return HERO_STATUE_TIERS[0];
}


// ── Bestiary / Codex ───────────────────────────────────────────────────────────
// A collection page that fills in as the player encounters and defeats each
// enemy type. gameMeta.bestiary maps enemy type -> { seen, kills }. Lore lives
// in BESTIARY_LORE; anything in ENEMY_TYPES without lore still shows with a
// generic blurb, so new enemy types appear automatically.

const BESTIARY_LORE = {
    goblin:   { title: 'Goblin', lore: 'Scavengers of the upper floors. Individually weak, dangerous in numbers, and always hungry for whatever you\'re carrying.' },
    slime:    { title: 'Slime', lore: 'A creeping mass of corrosive ooze. Its touch leaves a lingering poison. Fire renders it down to nothing.' },
    skeleton: { title: 'Skeleton', lore: 'The dungeon\'s restless dead, animated by the ash-curse. Their rattling blows sap a warrior\'s guard. Lightning shatters their brittle frames.' },
    archer:   { title: 'Archer', lore: 'A ranged hunter that draws its bow from across the room. Close the distance fast, or break line of sight behind a wall.' },
    brute:    { title: 'Brute', lore: 'A slab of muscle that telegraphs a devastating slam. Read the wind-up and step clear, or pay for it in blood.' },
    cultist:  { title: 'Cultist', lore: 'A robed zealot that channels dark fury into its allies rather than fighting itself. Cut the chanting short — kill it first, and the pack loses its edge.' },
    thief:    { title: 'Thief', lore: 'A nimble cutpurse that strikes once, snatches your gold, and bolts for the exit. Catch it before it escapes the floor, or the coin is gone for good.' },
    warden:   { title: 'Warden', lore: 'An armored sentinel that shrugs off stuns and crushes the strength from those it strikes. You will not lock it down — you must out-position it.' },
    bat:      { title: 'Bat', lore: 'A leather-winged horror that lurches through the dark on no fixed path. Hard to predict, harder to corner. Pin it against a wall and end it quickly.' },
    spider:   { title: 'Spider', lore: 'A skittering venom-bag that closes distance in a blink and sinks its fangs deep. Each bite layers more poison — kill it fast, before the venom does the work for it.' },
    necromancer: { title: 'Necromancer', lore: 'A grave-robbing sorcerer who would rather raise the dead than face you himself. Leave him standing and you will fight an endless tide of bone. Silence him first.' },
    imp:        { title: 'Imp',         lore: 'A frenzied little fiend that attacks twice when it gets going. Low HP — but in numbers they overwhelm before you can react. Each bite leaves a burn.' },
    ratman:     { title: 'Ratman',      lore: 'A cowardly skirmisher that fires from a distance and scrambles away the moment you close in. Patient hunters catch it in a corner.' },
    ghoul:      { title: 'Ghoul',       lore: 'It heals from every hit it lands. Trade wounds with a ghoul and you will always lose. Burst it down before it undoes every point of damage you deal.' },
    lizardman:  { title: 'Lizardman',   lore: 'Tough, disciplined, and annoyingly resilient — it heals a little each turn it survives. Drawn-out fights favour it entirely. Hit hard and finish fast.' },
    orc:        { title: 'Orc',         lore: 'A brute with enormous HP and a devastating charge it telegraphs a turn in advance. Predictable. Terrifying. Step clear of the charge line or pay for it.' },
    darkknight: { title: 'Dark Knight', lore: 'An armored counter-fighter. When it raises its guard, striking it is exactly what it wants — the blow is reversed back at you. Wait for the opening.' },
    demon:      { title: 'Demon',       lore: 'A creature of pure destruction that shrugs off fire and closes distance with violent intent. The deep floors forge these things. Lightning hurts them.' },
    mimic:      { title: 'Mimic',       lore: 'It looked exactly like a chest. You were so sure. In hindsight, the teeth were a clue.' },
    boss:     { title: 'Floor Boss', lore: 'A guardian grown strong on the ash. Each is a wall between you and the deeper dark.' },
    spawn:    { title: 'Spawn', lore: 'A lesser horror split from something larger. Cut them down before they overwhelm you.' },
};

// Types deliberately hidden from the Bestiary grid (internal/spawn helpers).
const BESTIARY_HIDDEN = new Set(['spawn']);

function _ensureBestiary() {
    if (!gameMeta.bestiary) gameMeta.bestiary = {};
    return gameMeta.bestiary;
}

function recordBestiarySeen(type) {
    if (!type || BESTIARY_HIDDEN.has(type)) return;
    const b = _ensureBestiary();
    if (!b[type]) b[type] = { seen: true, kills: 0 };
    else b[type].seen = true;
    // Light-touch persistence: seen-marks are saved with the next meta write
    // (kills already trigger one). Avoid a save per reveal to limit churn.
}

function recordBestiaryKill(type) {
    if (!type || BESTIARY_HIDDEN.has(type)) return;
    const b = _ensureBestiary();
    if (!b[type]) b[type] = { seen: true, kills: 0 };
    b[type].seen = true;
    b[type].kills = (b[type].kills || 0) + 1;
    saveMetaProgress();
}

function getBestiaryEntry(type) {
    const b = gameMeta.bestiary || {};
    return b[type] || { seen: false, kills: 0 };
}

// Ordered list of bestiary types for display — follows ENEMY_TYPES order,
// minus hidden helpers, so new types slot in where they're defined.
function getBestiaryTypes() {
    return Object.keys(ENEMY_TYPES).filter(t => !BESTIARY_HIDDEN.has(t));
}

function getBestiaryProgress() {
    const types = getBestiaryTypes();
    const discovered = types.filter(t => getBestiaryEntry(t).seen).length;
    return { discovered, total: types.length };
}


// ── Goals surface ──────────────────────────────────────────────────────────────
// Turns the game's rich-but-implicit meta-progression into explicit, visible
// targets the player can chase. Computes the next 2-3 most relevant objectives
// from current state — the next milestone boss, an arena fame threshold, a
// bestiary completion nudge, etc. Pure read of existing state; no new tracking.
function getNextGoals() {
    const goals = [];
    const best = gameState.bestFloor || 0;

    // 1. Next milestone boss / depth target
    const milestoneFloors = Object.keys(MILESTONE_BOSSES).map(Number).sort((a, b) => a - b);
    const nextMilestone = milestoneFloors.find(f => best < f);
    if (nextMilestone) {
        const boss = MILESTONE_BOSSES[nextMilestone];
        goals.push({
            icon: '\u2620',
            label: `Reach Floor ${nextMilestone} — face ${boss.name}`,
            color: '#ff9f58',
        });
    } else if (best < MAX_DUNGEON_FLOOR) {
        goals.push({ icon: '\u25BC', label: `Descend past Floor ${best} — deeper than ever`, color: '#ff9f58' });
    }

    // 2. Arena fame next tier (only once the Pit is relevant to the player)
    if (typeof isArenaUnlocked === 'function' && isArenaUnlocked() && typeof getNextArenaTier === 'function') {
        const next = getNextArenaTier();
        if (next) {
            const fame = getArenaFame();
            goals.push({
                icon: '\u2694',
                label: `Earn ${next.fame - fame} Arena fame — reach ${next.title}`,
                color: '#c98bff',
            });
        }
    }

    // 3. Next renown milestone
    const nextRenown = getNextRenownMilestone();
    if (nextRenown) {
        const renown = gameMeta.tavernRenown || 0;
        goals.push({
            icon: '\u2605',
            label: `${nextRenown.renown - renown} more Renown — unlock ${nextRenown.label}`,
            color: '#d4a96a',
        });
    }

    // 4. Bestiary completion nudge
    const bp = getBestiaryProgress();
    if (bp.discovered < bp.total) {
        goals.push({
            icon: '\u2763',
            label: `Discover ${bp.total - bp.discovered} more creature${bp.total - bp.discovered === 1 ? '' : 's'} for the Bestiary`,
            color: '#d4a96a',
        });
    }

    // 5. Today's daily, if not yet played
    if (!getDailyRecord()) {
        goals.push({ icon: '\u2600', label: "Take on today's Daily Challenge", color: '#a082ff' });
    }

    // Return the top 3 most relevant
    return goals.slice(0, 3);
}


const RARITY_COLORS = {
    common: '#f0f0f0',
    uncommon: '#6fce82',
    rare: '#62b9ff',
    epic: '#c98bff',
    legendary: '#ff9f3d',
    mythic: '#ff4444'
};


const LEGENDARY_NAMES = {

const MILESTONE_BOSSES = {
    10:  { name: 'Goblin King',    variant: 'splitter',    color: '#58c26d', glyph: 'K', hpMult: 1.2, atkMult: 1.1,
           announce: 'The Goblin King rises from the ash — floor 10 trembles!' },
    25:  { name: 'Bone Dragon',    variant: 'wraith',      color: '#e8e8f0', glyph: 'D', hpMult: 1.5, atkMult: 1.3,
           announce: 'Bones rattle as the Bone Dragon unfurls its wings!' },
    50:  { name: 'Lich Lord',      variant: 'necromancer', color: '#b06fff', glyph: 'L', hpMult: 1.8, atkMult: 1.4,
           announce: 'The Lich Lord awakens — the dead answer its call!' },
    75:  { name: 'Demon Prince',   variant: 'sentinel',    color: '#ff4444', glyph: 'P', hpMult: 2.0, atkMult: 1.6,

    100: { name: 'The Fallen God', variant: 'splitter',    color: '#ffd65a', glyph: 'G', hpMult: 2.5, atkMult: 2.0,
           announce: 'Reality cracks — The Fallen God descends from the ash!' }
};


// Maximum number of dungeon floors held in the exploration cache at once.
// At roughly 20KB per floor this caps persistent storage at ~400KB,
// well within the typical 5MB localStorage limit.
const MAX_CACHED_FLOORS = 20;

const TILE_SIZE = 40;

const MAP_WIDTH = 25;

const MAP_HEIGHT = 18;

const EXIT_X = MAP_WIDTH - 3;

const EXIT_Y = MAP_HEIGHT - 3;

const SPAWN_X = 2;

const SPAWN_Y = 2;

// 4 ascend stairs (floor 2+, goes up one floor),
// 5 tavern exit (floor 1 only, requires confirmation — see returnToTavern)
// 6 courtyard door (floor 0 only — see toggleCourtyard in tavern.js)
const TILE_ASCEND = 4;

const TILE_TAVERN_EXIT = 5;

const TILE_COURTYARD_DOOR = 6;


const canvas = document.getElementById('game-canvas');

const ctx = canvas.getContext('2d');


const gameState = {

// Preloaded once at module init, fire-and-forget. Each entry starts as
// just an Image() with .complete === false; drawPlayer() checks
// .complete (and that it didn't error) every frame before drawing it,
// falling back to the original flat-circle rendering otherwise — so a
// slow connection or a missing/corrupt file never blocks gameplay or
// shows a broken-image icon, it just quietly keeps the old look until
// (unless) the sprite becomes available.
const CLASS_SPRITES = {};
for (const [cls, src] of Object.entries(CLASS_SPRITE_SRC)) {
    const img = new Image();
    img.src = src;
    img._loadFailed = false;
    img.onerror = () => { img._loadFailed = true; };
    CLASS_SPRITES[cls] = img;
}

function getClassSprite(className) {
    const img = CLASS_SPRITES[className];
    if (!img || img._loadFailed || !img.complete || img.naturalWidth === 0) return null;
    return img;
}

// Records a fallen hero to the persistent graveyard shown on the title screen.
// killedBy is a short string describing the cause ("Goblin on Floor 3", etc.).
function recordFallen(player, floor, killedBy) {
    if (!player || !player.name) return;
    if (!gameMeta.fallen) gameMeta.fallen = [];
    gameMeta.fallen.unshift({
        name: player.name,
        className: player.className || 'warrior',
        subclass: player.subclass || '',
        level: player.level || 1,
        floor: floor || 0,
        killedBy: killedBy || 'the dungeon',
        ts: Date.now(),
    });
    // Keep only the 8 most recent — the graveyard is a memorial, not a
    // spreadsheet. The most dramatic recent deaths are the most resonant.
    gameMeta.fallen = gameMeta.fallen.slice(0, 8);
    saveMetaProgress();
}

function pickDungeonEvent() {
    const totalWeight = DUNGEON_EVENTS.reduce((s, e) => s + e.weight, 0);
    let roll = Math.random() * totalWeight;
    for (const ev of DUNGEON_EVENTS) {
        roll -= ev.weight;
        if (roll <= 0) return ev.id === 'none' ? null : ev;
    }
    return null;
}

function getDungeonEvent() {
    if (!gameState.dungeonEvent) return null;
    return DUNGEON_EVENTS.find(e => e.id === gameState.dungeonEvent) || null;
}

// True if a given milestone is currently unlocked.
function isRenownUnlocked(id) {
    const m = RENOWN_MILESTONES.find(m => m.id === id);
    return !!m && (gameMeta.tavernRenown || 0) >= m.renown;
}

// The highest milestone currently reached.
function getHighestRenownMilestone() {
    const r = gameMeta.tavernRenown || 0;
    const passed = RENOWN_MILESTONES.filter(m => r >= m.renown);
    return passed.length ? passed[passed.length - 1] : null;
}

// The next milestone the player hasn't yet reached.
function getNextRenownMilestone() {
    const r = gameMeta.tavernRenown || 0;
    return RENOWN_MILESTONES.find(m => r < m.renown) || null;
}

// Award renown and notify the player if a milestone was just crossed.
// reason is a short string for the message ("floors descended", etc.).
function earnRenown(amount, reason) {
    if (amount <= 0) return;
    const before = gameMeta.tavernRenown || 0;
    gameMeta.tavernRenown = before + amount;
    // Check for newly crossed milestones and announce them
    const crossed = RENOWN_MILESTONES.filter(m => before < m.renown && gameMeta.tavernRenown >= m.renown);
    crossed.forEach(m => {
        addMessage(`✦ Tavern Renown: ${m.label} unlocked — ${m.desc}`);
    });
    saveMetaProgress();
}

// Fortune Wheel segments — the player's wager is multiplied by the landed value.
// Weights favour house edge while still offering real upside for big spins.
// Fortune Wheel segments — BUST (0×) means the full wager is lost, so real
// risk exists on every spin. Weights tuned so bust hits ~24% of spins, the
// rest of the distribution still has genuine upside (including a rare 10×).
const WHEEL_SEGMENTS = [
    { label: 'BUST', mult: 0,    color: '#6b0c0c', weight: 4 }, // lose all
    { label: 'BUST', mult: 0,    color: '#8b1a1a', weight: 3 }, // lose all
    { label: '½×',  mult: 0.5,  color: '#c0392b', weight: 3 }, // lose half
    { label: '1×',  mult: 1.0,  color: '#5a5a5a', weight: 3 }, // break even
    { label: '2×',  mult: 2.0,  color: '#27ae60', weight: 4 }, // double
    { label: '3×',  mult: 3.0,  color: '#2980b9', weight: 2 }, // triple
    { label: '5×',  mult: 5.0,  color: '#8e44ad', weight: 2 }, // big win
    { label: '10×', mult: 10.0, color: '#f39c12', weight: 1 }, // jackpot
];

// The jackpot grows 25g per day it goes unclaimed, minimum 50g, maximum 500g.
function getCasinoJackpot() {
    return Math.min(500, Math.max(50, gameMeta.casinoJackpot || 50));
}

// True if the player hasn't claimed today's jackpot yet.
function canClaimJackpot() {
    const today = getDailyKey();
    return gameMeta.casinoJackpotLastClaimed !== today;
}

// Called each time the casino lobby opens — bumps the jackpot if a new day
// has passed since it was last claimed or bumped.
function tickCasinoJackpot() {
    const today = getDailyKey();
    if (!gameMeta.casinoJackpotLastBumped) gameMeta.casinoJackpotLastBumped = today;
    if (gameMeta.casinoJackpotLastBumped !== today) {
        gameMeta.casinoJackpot = Math.min(500, (gameMeta.casinoJackpot || 50) + 25);
        gameMeta.casinoJackpotLastBumped = today;
        saveMetaProgress();
    }
}

// Claims the jackpot — awards gold, resets pot to 50g.
function claimJackpot(player) {
    const prize = getCasinoJackpot();
    player.gold += prize;
    gameMeta.casinoJackpotLastClaimed = getDailyKey();
    gameMeta.casinoJackpot = 50;
    gameMeta.casinoJackpotLastBumped = getDailyKey();
    saveMetaProgress();
    return prize;
}

// Seeded spin result for the Fortune Wheel — uses the game's RNG (which is
// seeded, so the outcome is locked in when the player commits their wager,
// not after they see the animation). Returns the segment index.
function spinWheel() {
    const totalWeight = WHEEL_SEGMENTS.reduce((s, seg) => s + seg.weight, 0);
    let pick = rng() * totalWeight;
    for (let i = 0; i < WHEEL_SEGMENTS.length; i++) {
        pick -= WHEEL_SEGMENTS[i].weight;
        if (pick <= 0) return i;
    }
    return WHEEL_SEGMENTS.length - 1;
}

// Returns the interactable the player is currently adjacent to (Chebyshev ≤ 1),
// or null. Courtyard handles only the arena gate (see interactInTavern).
function getAdjacentInteractable() {
    const p = gameState.player;
    if (!p || gameState.floor !== 0) return null;
    if (gameState.inCourtyard) {
        const g = gameState.arenaGate;
        if (g && Math.max(Math.abs(p.x - g.x), Math.abs(p.y - g.y)) <= 1) {
            return { npc: g, verb: 'Enter', label: 'The Pit', color: '#ff9f58' };
        }
        return null;
    }
    for (const def of TAVERN_INTERACTABLES) {
        const npc = gameState[def.key];
        if (npc && Math.max(Math.abs(p.x - npc.x), Math.abs(p.y - npc.y)) <= 1) {
            return { npc, verb: def.verb, label: def.label, color: def.color };
        }
    }
    // Dungeon entrance (descend)
    const ex = gameState.dungeonEntrance;
    if (ex && Math.max(Math.abs(p.x - ex.x), Math.abs(p.y - ex.y)) <= 1) {
        return { npc: ex, verb: 'Descend into', label: 'the Dungeon', color: '#ff9f3d' };
    }
    return null;
}

// Player-facing options, persisted across runs in localStorage. Defaults are
// chosen so a first-time player gets the full intended experience (sound on,
// full juice); the toggles exist for preference and accessibility (volume,
// mute, and motion-sensitivity options for the screen shake / flash effects).
const DEFAULT_SETTINGS = {
    masterVolume: 0.7,  // 0..1, scales the audio master gain
    muted: false,
    screenShake: true,  // camera shake on big hits
    reduceMotion: false, // suppresses screen flashes + hit-stop for motion sensitivity
};

let gameSettings = { ...DEFAULT_SETTINGS };

function loadSettings() {
    try {
        const raw = localStorage.getItem(SAVE_KEY_SETTINGS);
        if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed === 'object') {
                // Merge over defaults so a save written by an older version
                // (missing a newer key) still gets sane values for it.
                gameSettings = { ...DEFAULT_SETTINGS, ...parsed };
                // Clamp volume defensively in case of a hand-edited save
                gameSettings.masterVolume = Math.max(0, Math.min(1, Number(gameSettings.masterVolume) || 0));
            }
        }
    } catch (e) {
        if (!(e instanceof DOMException)) console.warn('loadSettings failed:', e);
    }
    return gameSettings;
}

function saveSettings() {
    try {
        localStorage.setItem(SAVE_KEY_SETTINGS, JSON.stringify(gameSettings));
    } catch (e) {
        if (!(e instanceof DOMException)) console.warn('saveSettings failed:', e);
    }
}

// Effective audio gain — what the master gain node should actually be set to,
// accounting for the mute toggle. Centralised so audio.js and the settings
// panel never disagree about what "muted" means.
function effectiveVolume() {
    return gameSettings.muted ? 0 : gameSettings.masterVolume;
}

let _masterGain = null;


function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Single master gain node every sound routes through, so volume and
        // mute are controlled in exactly one place (see applyAudioSettings).
        _masterGain = audioCtx.createGain();
        _masterGain.gain.value = (typeof effectiveVolume === 'function') ? effectiveVolume() : 0.7;
        _masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
}


// The node every oscillator should connect to instead of ac.destination, so
// all output passes through the master gain. Falls back to destination if the
// master gain somehow isn't ready (shouldn't happen — ensureAudio creates it).
function _out(ac) {
    return _masterGain || ac.destination;
}


// Pushes the current settings' volume/mute into the live master gain. Safe to
// call before any audio has played (no-op until the context exists). Called by
// the settings panel on every change and once at startup.
function applyAudioSettings() {
    if (!_masterGain || !audioCtx) return;
    const target = (typeof effectiveVolume === 'function') ? effectiveVolume() : 0.7;
    // Brief ramp instead of a hard set avoids a click when toggling mute.
    const now = audioCtx.currentTime;
    _masterGain.gain.cancelScheduledValues(now);
    _masterGain.gain.setValueAtTime(_masterGain.gain.value, now);
    _masterGain.gain.linearRampToValueAtTime(target, now + 0.05);
}


function _osc(ac, freq, type, t0, t1, peak, freqEnd) {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(_out(ac));
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t1);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t1);
    osc.start(t0);
    osc.stop(t1 + 0.04);
}

// ── Bard music loop ───────────────────────────────────────────────────────────

let _bardLoopActive = false;

let _bardLoopTimeout = null;


function _stopBardLoop() {
    _bardLoopActive = false;
    if (_bardLoopTimeout !== null) { clearTimeout(_bardLoopTimeout); _bardLoopTimeout = null; }
}


function _scheduleBardNotes(notes, tempoSec, waveType, vol) {
    if (!_bardLoopActive) return;
    const ac = ensureAudio();
    const t = ac.currentTime + 0.05; // small look-ahead
    notes.forEach((freq, i) => {
        if (freq > 0) {
            _osc(ac, freq, waveType, t + i * tempoSec, t + i * tempoSec + tempoSec * 0.8, vol);
        }
    });
    const totalMs = Math.round(notes.length * tempoSec * 1000);
    _bardLoopTimeout = setTimeout(() => _scheduleBardNotes(notes, tempoSec, waveType, vol), totalMs);
}


function _startBardLoop(track) {
    _stopBardLoop();
    _bardLoopActive = true;
    _scheduleBardNotes(track.notes, track.tempo / 1000, track.wave, track.vol);
}

function createEmptyEquipment() {
    return { helmet: null, chest: null, weapon: null, shield: null, ring1: null, ring2: null, amulet: null, boots: null };
}


function migrateEquipment(equip) {
    if (!equip) return createEmptyEquipment();
    if (equip.chest !== undefined || equip.helmet !== undefined) {
        const out = { ...createEmptyEquipment(), ...equip };
        // Pre-second-ring saves stored a single `ring` key — route it into
        // ring1 rather than letting it linger as an orphaned property.
        if (equip.ring !== undefined && equip.ring1 === undefined) {
            out.ring1 = equip.ring ? { ...equip.ring, slot: 'ring1' } : null;
        }
        delete out.ring;
        return out;
    }
    const out = createEmptyEquipment();
    if (equip.weapon) out.weapon = { ...equip.weapon, slot: 'weapon' };
    if (equip.armor) out.chest = { ...equip.armor, slot: 'chest' };
    if (equip.accessory) {
        const slot = equip.accessory.effectId === 'manaRegen' ? 'amulet' : 'ring1';
        out[slot] = { ...equip.accessory, slot };
    }
    return out;
}


function normalizeGearSlot(slot) {
    if (slot === 'armor') return 'chest';
    if (slot === 'accessory' || slot === 'ring') return 'ring1';
    return slot;
}


function createRunStats() {
    return { enemiesSlain: 0, bossesDefeated: 0, goldEarned: 0, legendaryFound: 0, mythicFound: 0, startFloor: 0 };
}

function initSubclassState(player) {
    player.sc = {};
    player.ability = SUBCLASS_ABILITIES[player.subclass]?.name || player.ability;
    switch (player.subclass) {
        case 'berserker':      player.sc = { rage: 0, deathSaveReady: true }; break;
        case 'knight':         player.sc = { block: 0, blockReady: false }; break;
        case 'gladiator':      player.sc = { combo: 0 }; break;
        case 'assassin':       player.sc = { stealth: 0 }; break;
        case 'trickster':      player.sc = { trapCharges: 2, dodgeReady: true }; break;
        case 'shadow':         break;
        case 'elementalist':   player.sc = { element: 0 }; break;
        case 'illusionist':    break;
        case 'necromancer':    break;
        case 'warDomain':      break;
        case 'lightDomain':    break;
        case 'twilightDomain': break;
        default: break;
    }
}


function getSubclassMeterHtml() {
    const p = gameState.player;
    if (!p?.sc || (gameState.floor === 0 && !gameState.inArenaBout)) return '';
    switch (p.subclass) {
        case 'berserker':
            return `<div class="sc-meter"><small>Rage</small><div class="sc-track"><div class="sc-fill sc-rage" style="width:${p.sc.rage}%"></div></div><span>${p.sc.rage}</span></div>`;
        case 'knight':
            return `<div class="sc-meter"><small>Block${p.sc.blockReady ? ' \u2713 READY' : ''}</small><div class="sc-track"><div class="sc-fill sc-block" style="width:${p.sc.block}%"></div></div><span>${p.sc.block}</span></div>`;
        case 'gladiator':
            return `<div class="sc-meter"><small>Combo</small><div class="sc-track"><div class="sc-fill sc-combo" style="width:${Math.min(100, p.sc.combo * 10)}%"></div></div><span>${p.sc.combo}</span></div>`;
        case 'assassin':
            return p.sc.stealth > 0 ? `<span class="status-badge" style="--sc:#9b7bd6">\u{1F576} Stealth (${p.sc.stealth})</span>` : '';
        case 'trickster':
            return `<div class="sc-meter"><small>Trap Charges</small><span class="sc-val">${p.sc.trapCharges}</span></div>` +
                (p.sc.dodgeReady ? '<span class="status-badge" style="--sc:#6fce82">\u21BB Dodge Ready</span>' : '');
        case 'elementalist': {
            const els = ['Fire', 'Ice', 'Lightning'];
            return `<div class="sc-meter"><small>Element</small><span class="sc-val sc-elem">${els[p.sc.element]}</span></div>`;
        }
        case 'necromancer': {
            const count = gameState.allies.length;
            const capped = count >= NECROMANCER_MINION_CAP;
            const header = `<div class="sc-meter-label">Minions${capped ? ' <span class="sc-drain-hint">(E: drain weakest)</span>' : ''} <span class="sc-val">${count} / ${NECROMANCER_MINION_CAP}</span></div>`;
            if (!count) return `<div class="sc-meter">${header}</div>`;
            const rows = gameState.allies.map((a, i) => {
                const hpPct = Math.round((a.hp / a.maxHp) * 100);
                const hpColor = hpPct > 60 ? '#58c26d' : hpPct > 30 ? '#ffd65a' : '#e14b4b';
                const turnPct = Math.round((a.turns / 6) * 100); // 6 = max turns on summon
                return `<div class="minion-row">
                    <span class="minion-glyph" style="color:#b06fff">S</span>
                    <div class="minion-bars">

                        </div>
                    </div>

                        <span class="minion-hp">${a.hp}/${a.maxHp}</span>
                        <span class="minion-turns">${a.turns}t</span>
                    </div>
                </div>`;
            }).join('');
            return `<div class="sc-meter sc-meter-minions">${header}${rows}</div>`;
        }
        default: return '';
    }
}


function applyBerserkerBonuses(player, baseDamage) {
    let dmg = baseDamage;
    const ratio = player.hp / player.maxHp;
    if (ratio < 0.5) dmg = Math.ceil(dmg * (1 + (0.5 - ratio) * 1.5));
    return dmg;
}


// Berserker's advertised "Ignores death once per floor at 1 HP" trait.
// Mirrors tryRelicLethalSave's pattern exactly — called from showGameOver
// before the run is actually ended, returns true if the save fired so the
// caller aborts the death. deathSaveReady is consumed here and restored by
// resetPerFloorSubclassState() on the next floor transition (either
// direction), making this a once-per-floor safety net rather than a
// once-per-run one like Phoenix Feather.
function tryBerserkerDeathSave() {
    const p = gameState.player;
    if (!p || p.subclass !== 'berserker' || !p.sc?.deathSaveReady) return false;
    p.sc.deathSaveReady = false;
    p.hp = 1;
    addFloatingText(p.x, p.y, 'UNBREAKABLE!', '#ff4500', { style: 'crit-banner' });
    addMessage('Pure fury refuses to let you fall — you cling to life at 1 HP!');
    showEventCard('UNBREAKABLE', 'Refused to die — 1 HP', 'boss');
    updateUI();
    return true;
}


function onPlayerDealDamage(dealt) {
    const p = gameState.player;
    if (!p?.sc) return;
    if (p.subclass === 'berserker') p.sc.rage = Math.min(100, p.sc.rage + Math.ceil(dealt / 2));
    if (p.subclass === 'gladiator') p.sc.combo = Math.min(10, p.sc.combo + 1);
}


function onPlayerTakeDamage(sourceEnemy = null) {
    const p = gameState.player;
    if (p?.subclass === 'gladiator' && p.sc) p.sc.combo = Math.min(10, p.sc.combo + 1);
    if (p) p.hitFlash = 1.0;
    // Marks this specific boss encounter as no longer eligible for the
    // "Flawless Victory" achievement — tracked per-enemy-instance (not
    // per-run) so a hit from a different boss earlier in the run doesn't
    // wrongly disqualify a clean fight against this one.
    if (sourceEnemy && sourceEnemy.type === 'boss') {
        sourceEnemy.tookNoDamage = false;
    }
}


function onEnemyKilledByPlayer() {
    const p = gameState.player;
    if (p?.subclass === 'assassin' && p.sc) {
        p.sc.stealth = 1;
        addMessage('You vanish into the shadows after the kill.');
    }
    if (p?.subclass === 'gladiator' && p.sc) p.sc.combo = Math.min(10, p.sc.combo + 2);
}


function useSubclassAbility() {
    const p = gameState.player;
    if (!p || gameState.gameOver || gameState.awaitingLevelChoice) return;

    const finish = () => { p.regenMana(); enemyTurn(); refreshEnemyIntents(); updateUI(); };
    const abi = SUBCLASS_ABILITIES[p.subclass];

    switch (p.subclass) {
        case 'berserker': {
            const cost = Math.max(1, Math.floor(p.maxHp * 0.2));
            if (p.hp <= cost) return addMessageAndUpdate('Not enough HP for Frenzied Strike.');
            const enemy = findEnemyAt(p.x, p.y, 1) || findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No target in range.');
            p.hp -= cost;
            p.attackAnim = { life: 20, maxLife: 20 };
            const dealt = Math.max(1, Math.ceil(p.atk * 2.2) - enemy.def);
            damageEnemy(enemy, dealt, 'CRIT');
            applyLifesteal(dealt);
            onPlayerDealDamage(dealt);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            finish();
            return;
        }
        case 'knight': {
            p.sc.block = 100;
            p.sc.blockReady = true;
            addBurst(p.x, p.y, '#ffd65a');
            addMessage('Shield Wall raised — the next blow will be fully blocked!');
            finish();
            return;
        }
        case 'gladiator': {
            p.sc.riposteReady = true;
            addBurst(p.x, p.y, '#ff9f58');
            addMessage('Riposte stance — counter the next attacker for double damage!');
            finish();
            return;
        }
        case 'assassin': {
            const enemy = findEnemyAt(p.x, p.y, 1) || findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No target for Shadow Strike.');
            const mult = p.sc.stealth > 0 ? 3 : 1.8;
            const dealt = Math.max(1, Math.ceil(p.atk * mult) - enemy.def);
            damageEnemy(enemy, dealt, p.sc.stealth > 0 ? 'CRIT' : 'backstab');
            applyLifesteal(dealt);
            p.sc.stealth = 0;
            onPlayerDealDamage(dealt);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            finish();
            return;
        }
        case 'trickster': {
            if (p.sc.trapCharges <= 0) return addMessageAndUpdate('No trap charges remaining.');
            if (gameState.traps.some(t => t.x === p.x && t.y === p.y)) return addMessageAndUpdate('A trap is already here.');
            gameState.traps.push({ x: p.x, y: p.y });
            p.sc.trapCharges--;
            addBurst(p.x, p.y, '#aaa397');
            addMessage('You set a snare trap on the floor.');
            finish();
            return;
        }
        case 'shadow': {
            if (p.mana < 4) return addMessageAndUpdate('Not enough mana (4).');
            const enemy = findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No enemy to step toward.');
            const spots = [
                { x: enemy.x + 1, y: enemy.y }, { x: enemy.x - 1, y: enemy.y },
                { x: enemy.x, y: enemy.y + 1 }, { x: enemy.x, y: enemy.y - 1 }
            ].filter(s => isWalkable(s.x, s.y) && !findEnemyAt(s.x, s.y, 0) && !isPlayerAt(s.x, s.y));
            if (!spots.length) return addMessageAndUpdate('No space to shadow step.');
            const dest = spots.sort((a, b) => getDistance(a.x, a.y, enemy.x, enemy.y) - getDistance(b.x, b.y, enemy.x, enemy.y))[0];
            addBurst(p.x, p.y, '#9b7bd6');
            p.x = dest.x; p.y = dest.y;
            p.mana -= 4;
            revealAround(p.x, p.y, 4);
            addBurst(p.x, p.y, '#9b7bd6');
            addMessage('You shadow step through the dark.');
            finish();
            return;
        }
        case 'elementalist': {
            if (p.mana < 3) return addMessageAndUpdate('Not enough mana (3).');
            const enemy = findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No enemies in sight.');
            p.mana -= 3;
            const el = p.sc.element;
            p.sc.element = (el + 1) % 3;
            let dmg = 16 + p.level * 2;
            const elementNames = ['fire', 'ice', 'lightning'];
            const activeElement = elementNames[el];
            if (el === 0) { dmg += 4; applyStatus(enemy, 'burn', 3); addMessage('Fire scorches the foe!'); }
            else if (el === 1) { dmg = Math.ceil(dmg * 0.85); applyStatus(enemy, 'stun', 1); addMessage('Ice freezes the foe in place!'); }
            else { addMessage('Lightning arcs — striking a second target!'); const second = gameState.enemies.find(e => e !== enemy && gameState.revealed[e.y]?.[e.x] && getDistance(e.x, e.y, enemy.x, enemy.y) <= 3); if (second) damageEnemy(second, Math.floor(dmg * 0.6), 'fire'); }
            // Advertised "exploit elemental weaknesses for bonus damage"
            // trait — only slime (fire) and skeleton (lightning) have a
            // defined weakness (see ENEMY_TYPES); other enemy types
            // aren't elemental in nature, so giving them an arbitrary
            // weakness would feel unmotivated rather than thematic.
            const weakness = ENEMY_TYPES[enemy.type]?.elementWeakness;
            if (weakness && weakness === activeElement) {
                dmg = Math.ceil(dmg * 1.5);
                addFloatingText(enemy.x, enemy.y, 'WEAKNESS!', '#ffd65a', { style: 'crit-banner' });
                addMessage(`The ${enemy.name} is exposed — elemental weakness exploited!`);
            }
            damageEnemy(enemy, dmg, 'fire');
            applyLifesteal(dmg);
            onPlayerDealDamage(dmg);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            finish();
            return;
        }
        case 'illusionist': {
            if (p.mana < 4) return addMessageAndUpdate('Not enough mana (4).');
            p.mana -= 4;
            gameState.decoy = { x: p.x, y: p.y, hp: Math.floor(p.maxHp * 0.4), turns: 3 };
            // Confusion spell — enemies near the cast point may turn on
            // each other (see the confuse status check in enemyTurn)
            // instead of just ignoring the decoy and beelining the player.
            const confused = gameState.enemies.filter(e => e.hp > 0 && getDistance(e.x, e.y, p.x, p.y) <= 3);
            confused.forEach(e => applyStatus(e, 'confuse', 3));
            // Mirror Image — a multi-turn damage-reduction buff layered on
            // top of the decoy, rather than a separate spell, since each
            // subclass only has the one castable ability slot.
            p.mirrorImageTurns = 3;
            addBurst(p.x, p.y, '#c49eff');
            const confuseNote = confused.length > 0 ? ' Nearby enemies reel in confusion!' : '';
            addMessage(`A phantom twin appears, drawing enemy attention!${confuseNote}`);
            finish();
            return;
        }
        case 'necromancer': {
            if (p.mana < 5) return addMessageAndUpdate('Not enough mana (5).');
            if (gameState.allies.length >= NECROMANCER_MINION_CAP) {
                // Advertised "drain life from your own minions to heal"
                // trait — repurposes what used to be a dead-end failure
                // ("you can only control 2 minions") into a genuine
                // choice: sacrifice your weakest minion (lowest
                // remaining lifespan) for a heal, rather than just
                // waiting for one to expire naturally.
                const weakest = gameState.allies.reduce((a, b) => (a.turns <= b.turns ? a : b));
                gameState.allies = gameState.allies.filter(a => a !== weakest);
                const heal = Math.ceil(weakest.maxHp * 0.6);
                p.hp = Math.min(p.maxHp, p.hp + heal);
                p.mana -= 5;
                addFloatingText(p.x, p.y, `+${heal}`, '#58c26d');
                addBurst(weakest.x, weakest.y, '#9c6dff');
                addMessage(`You drain your skeleton minion's remaining life, restoring ${heal} HP.`);
                finish();
                return;
            }
            const spot = findRandomOpenTile(1) || { x: p.x, y: p.y };
            p.mana -= 5;
            gameState.allies.push({ x: spot.x, y: spot.y, hp: 20 + p.level * 3, maxHp: 20 + p.level * 3, atk: 6 + p.level, turns: 6, type: 'skeleton' });
            addBurst(spot.x, spot.y, '#b06fff');
            // Bone shields from nearby corpses — a recent kill (tracked in
            // gameState.fallenEnemies, capped at the last 10) provides the
            // raw material for a defensive ward layered on top of the
            // minion summon. Consumes the corpse so the same kill can't
            // fuel multiple shields back to back; with no recent corpse
            // available the cast still raises a minion, it just doesn't
            // also grant the shield.
            const corpse = gameState.fallenEnemies?.pop();
            if (corpse) {
                p.boneShieldTurns = 4;
                p.boneShieldDef = 4 + Math.floor(p.level / 3);
                recalculateStats();
                addBurst(p.x, p.y, '#d8d4ca');
                addMessage(`A skeleton minion rises, and the ${corpse.name}'s bones knit into a protective ward!`);
            } else {
                addMessage('A skeleton minion rises to fight for you!');
            }
            finish();
            return;
        }
        case 'warDomain': {
            if (p.mana < 3) return addMessageAndUpdate('Not enough mana (3).');
            const enemy = findEnemyAt(p.x, p.y, 1);
            if (!enemy) return addMessageAndUpdate('Smite requires an adjacent foe.');
            p.mana -= 3;
            const dealt = Math.max(1, Math.ceil(p.atk * 1.8) + 8 - enemy.def);
            damageEnemy(enemy, dealt, 'fire');
            applyLifesteal(dealt);
            onPlayerDealDamage(dealt);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            // War Cry — stuns every OTHER adjacent enemy (the primary
            // target already ate Smite's damage instead). Folded into
            // the same cast rather than a separate ability slot, same
            // convention as every other subclass's single-ability kit.
            const adjacentOthers = gameState.enemies.filter(e =>
                e !== enemy && e.hp > 0 && getDistance(e.x, e.y, p.x, p.y) <= 1);
            adjacentOthers.forEach(e => applyStatus(e, 'stun', 1));
            addMessage(adjacentOthers.length > 0
                ? 'Divine smite crashes into your foe — your war cry staggers the others!'
                : 'Divine smite crashes into your foe!');
            finish();
            return;
        }
        case 'lightDomain': {
            if (p.mana < 4) return addMessageAndUpdate('Not enough mana (4).');
            const enemy = findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No target for Searing Light.');
            p.mana -= 4;
            const dealt = Math.max(1, 14 + p.level * 2 - enemy.def);
            damageEnemy(enemy, dealt, 'fire');
            applyStatus(enemy, 'stun', 1);
            applyLifesteal(dealt);
            onPlayerDealDamage(dealt);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            // Advertised "heals restore more HP and can briefly overheal"
            // trait. Searing Light previously had no direct heal
            // component at all (only the same shared lifesteal every
            // class gets), so there was nothing for the bonus to apply
            // to. Overheal is tracked as a separate temporary shield
            // pool (p.overheal) rather than pushing hp above maxHp
            // directly — much lower risk than touching every existing
            // Math.min(maxHp, ...) clamp across the codebase for the
            // same player-facing effect, and ties in cleanly with
            // onPlayerTakeDamage()/tickStatuses() to decay on its own.
            const heal = 10 + p.level * 2;
            const room = p.maxHp - p.hp;
            const directHeal = Math.min(room, heal);
            const spillover = heal - directHeal;
            p.hp += directHeal;
            if (spillover > 0) {
                const cap = Math.ceil(p.maxHp * 0.15);
                p.overheal = Math.min(cap, (p.overheal || 0) + spillover);
                p.overhealTurns = 4;
            }
            addFloatingText(p.x, p.y, `+${heal}`, '#fff3b0');
            addMessage(`Holy light sears the enemy and mends your wounds for ${heal} HP.`);
            finish();
            return;
        }
        case 'twilightDomain': {
            if (p.mana < 3) return addMessageAndUpdate('Not enough mana (3).');
            const enemy = findEnemyAt(p.x, p.y, 1) || findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No target for Moonbeam.');
            p.mana -= 3;
            const dealt = Math.max(1, Math.ceil(p.atk * 1.4) - enemy.def);
            damageEnemy(enemy, dealt, 'hit');
            applyStatus(enemy, 'weaken', 2);
            const heal = Math.ceil(dealt * 0.5);
            p.hp = Math.min(p.maxHp, p.hp + heal);
            addFloatingText(p.x, p.y, `+${heal}`, '#58c26d');
            applyLifesteal(dealt);
            onPlayerDealDamage(dealt);
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
            addMessage(`Moonbeam drains the foe, restoring ${heal} HP and sapping its strength.`);
            finish();
            return;
        }
        default:
            p.useLegacyAbility();
            return;
    }
}


class Player {
    constructor(className, subclassId = null, characterName = '') {
        this.className = className;
        this.subclass = subclassId;
        this.name = characterName;
        // Base class stats (includes the ability name)
        Object.assign(this, CLASSES[className]);
        // Subclass overrides hp/atk/def/mana stats
        if (subclassId) {
            const scDef = (SUBCLASSES[className] || []).find(s => s.id === subclassId);
            if (scDef) Object.assign(this, scDef.stats);
        }
        this.baseAtk = this.atk;
        this.baseDef = this.def;
        this.x = 12;
        this.y = 10;
        this.renderX = this.x * TILE_SIZE;
        this.renderY = this.y * TILE_SIZE;
        this.level = 1;
        this.xp = 0;
        this.gold = 0;
        this.inventory = [{ type: 'potion', name: 'Health Potion', qty: gameState.tavernUpgrades.stockedPantry ? 3 : 2 }];
        this.equipment = createEmptyEquipment();
        this.relics = [];       // equipped relics, max RELIC_MAX_SLOTS
        this.relicPouch = [];   // benched/unequipped relics, separate from inventory
        this.shieldActive = false;
        this.levelCritBonus = 0;
        this.levelLifestealBonus = 0;
        this.critChance = subclassId === 'assassin' ? 40 : (className === 'rogue' ? 30 : 0);
        this.lifesteal = 0;
        this.goldFind = 0;
        this.thorns = 0;
        this.manaRegenBonus = 0;
        this.statuses = [];   // { type: 'poison'|'burn'|'stun'|'weaken', turns }
        this.overheal = 0;       // Light Domain temporary shield pool (see Searing Light)
        this.overhealTurns = 0;  // turns remaining before it decays to 0
        this.mirrorImageTurns = 0; // Illusionist Mirror Image duration (see enemyAttack)
        this.boneShieldTurns = 0;  // Necromancer bone shield duration (see recalculateStats)
        this.boneShieldDef = 0;    // DEF bonus granted while the shield is active
        this.cellarRushFloor = null; // floor Adrenaline Rush was granted on (see CELLAR_FIND_CHOICES); cleared on floor change
        this.attackAnim = null;
        this.lungeAnim = null; // universal attack-step animation, all classes (see Player.attack)
        this.facingLeft = false; // sprite facing direction, set from horizontal movement input (see move())
        this.hitFlash = 0;
        initSubclassState(this);
    }

    move(dx, dy) {
        if (gameState.gameOver || gameState.awaitingLevelChoice || gameState.shopOpen || gameState.gamblingOpen || gameState.brewmasterOpen || gameState.questBoardOpen || gameState.bardOpen || gameState.stashOpen || gameState.magicDealerOpen || gameState.blacksmithOpen || gameState.trainerOpen || gameState.bankOpen || gameState.innOpen || gameState.tavernConfirmOpen || gameState.ringChoiceOpen || gameState.cellarFindOpen) return;

        // Sprite facing direction — set from horizontal input regardless
        // of whether this move actually succeeds (an NPC-blocked or
        // wall-blocked attempt still visually faces the tried direction).
        // Vertical-only input (dx === 0) deliberately leaves facing
        // unchanged rather than resetting it, so walking straight up or
        // down doesn't flip the sprite back to a default direction.
        if (dx < 0) this.facingLeft = true;
        else if (dx > 0) this.facingLeft = false;

        // Stun check
        if (hasStatus(this, 'stun')) {
            addMessage('You are stunned and cannot move!');
            // Still run enemy turn so time passes
            this.regenMana();
            enemyTurn();
            updateUI();
            return;
        }

        const newX = this.x + dx;
        const newY = this.y + dy;

        if (gameState.floor === 0 && newX === gameState.innkeeper.x && newY === gameState.innkeeper.y) {
            talkToBartender();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.merchant.x && newY === gameState.merchant.y) {
            openShop();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.blacksmith.x && newY === gameState.blacksmith.y) {
            openBlacksmith();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.trainer.x && newY === gameState.trainer.y) {
            openTrainer();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.bank.x && newY === gameState.bank.y) {
            openBank();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.gambler.x && newY === gameState.gambler.y) {
            openGambling();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.brewmaster.x && newY === gameState.brewmaster.y) {
            openBrewmaster();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.questBoard.x && newY === gameState.questBoard.y) {
            openNoticeBoard();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.bard.x && newY === gameState.bard.y) {
            openBard();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.stashChest.x && newY === gameState.stashChest.y) {
            openStash();
            return;
        }

        if (gameState.floor === 0 && newX === gameState.magicDealer.x && newY === gameState.magicDealer.y) {
            openMagicDealer();
            return;
        }

        const enemy = findEnemyAt(newX, newY, 0);
        if (enemy) {
            this.attack(enemy);
            return;
        }

        if (!isWalkable(newX, newY)) return;

        this.x = newX;
        this.y = newY;
        revealAround(this.x, this.y, 4);
        sfxFootstep();
        collectItemAt(newX, newY);
        checkWorldDiscovery(newX, newY);
        if (gameState.floor === 0) {
            triggerNpcProximityLine('innkeeper', isAdjacentToInnkeeper());
            triggerNpcProximityLine('merchant', isAdjacentToMerchant());
            triggerNpcProximityLine('blacksmith', isAdjacentToBlacksmith());
        }
        if (this.subclass === 'knight' && this.sc) {
            this.sc.block = Math.min(100, this.sc.block + 25);
        }
        checkInteractions();

        if ((gameState.floor > 0 || gameState.inArenaBout) && !gameState.awaitingLevelChoice) {
            triggerTrapAt(newX, newY);
            this.regenMana();
            enemyTurn();
        }

        updateUI();
    }

    attack(targetEnemy = null) {
        if (gameState.gameOver || gameState.awaitingLevelChoice || gameState.shopOpen || gameState.gamblingOpen || gameState.brewmasterOpen || gameState.questBoardOpen || gameState.bardOpen || gameState.stashOpen || gameState.magicDealerOpen || gameState.blacksmithOpen || gameState.trainerOpen || gameState.bankOpen || gameState.innOpen || gameState.cellarFindOpen) return;

        // During an arena bout, floor is still 0 but we want real combat,
        // not the tavern NPC interaction that floor===0 normally routes to.
        if (gameState.floor === 0 && !gameState.inArenaBout) {
            interactInTavern();
            return;
        }

        const enemy = targetEnemy || findEnemyAt(this.x, this.y, 1);
        if (!enemy) {
            addMessage('There is nothing close enough to strike.');
            updateUI();
            return;
        }

        let damage = this.atk;
        if (this.subclass === 'berserker') damage = applyBerserkerBonuses(this, damage);
        if (this.subclass === 'gladiator' && this.sc?.combo) damage += this.sc.combo * 2;
        // Gladiator's advertised "Bonus damage against stunned enemies"
        // trait — multiplicative on top of the combo-stack bonus above,
        // since the two are advertised as separate traits rather than
        // one replacing the other. "The crowd demands blood" reads as
        // punishing an opponent that can't fight back, so this only
        // checks the target's own stun, not the player's.
        if (this.subclass === 'gladiator' && hasStatus(enemy, 'stun')) damage = Math.ceil(damage * 1.5);
        // War Domain's advertised "Divine Strike bonus applies on every
        // melee hit" trait — a small flat bonus on every regular attack,
        // separate from (and deliberately smaller than) the dedicated
        // Smite ability's own +8 burst bonus, so the passive complements
        // rather than competes with the active ability.
        if (this.subclass === 'warDomain') {
            damage += 3;
            // Blessed Rage: ATK bonus grows below half HP. Stacks on top
            // of the flat Divine Strike bonus above rather than replacing
            // it (they're advertised as two separate traits), and only
            // applies to regular melee attacks — Smite already has its
            // own fixed +8 burst and isn't meant to scale further with
            // missing HP on top of that.
            const ratio = this.hp / this.maxHp;
            if (ratio < 0.5) damage = Math.ceil(damage * (1 + (0.5 - ratio) * 0.8));
        }
        let crit = false;
        if (rng() * 100 < this.critChance) {
            damage = Math.ceil(damage * 1.5);
            crit = true;
        }
        if (hasStatus(this, 'rage')) damage = Math.ceil(damage * 1.5);

        const dealt = Math.max(1, damage - enemy.def);
        sfxAttack();
        // Universal attack lunge — every class steps toward its target on
        // a hit, mirroring the enemy lunge added in combat.js. Kept
        // separate from attackAnim below, which is Berserker's own
        // claw-slash visual effect and stays exclusive to that subclass
        // rather than being repurposed as the generic lunge for everyone.
        this.lungeAnim = { life: 10, maxLife: 10, dx: Math.sign(enemy.x - this.x), dy: Math.sign(enemy.y - this.y) };
        if (this.subclass === 'berserker') {
            this.attackAnim = { life: 16, maxLife: 16 };
        }
        damageEnemy(enemy, dealt, crit ? 'CRIT' : 'hit');
        applyLifesteal(dealt);
        onPlayerDealDamage(dealt);
        if (!crit) addMessage(`You hit the ${enemy.name} for ${dealt} damage.`);
        // Light Domain's advertised "Critical hits blind enemies for 1
        // turn" trait — applied after damageEnemy so it can't affect
        // this hit's own damage, only the enemy's next attack (read in
        // enemyAttack's effectiveAtk calc).
        if (crit && this.subclass === 'lightDomain' && enemy.hp > 0) {
            applyStatus(enemy, 'blind', 1);
            addFloatingText(enemy.x, enemy.y, 'BLINDED!', '#fff7d6');
        }

        if (enemy.hp <= 0) {
            defeatEnemy(enemy);
        } else {
            enemyAttack(enemy);
        }

        this.regenMana();
        refreshEnemyIntents();
        updateUI();
    }

    useAbility() {
        if (gameState.gameOver || gameState.awaitingLevelChoice) return;

        if (gameState.floor === 0) {
            interactInTavern();
            return;
        }

        if (this.subclass && SUBCLASS_ABILITIES[this.subclass]) {
            useSubclassAbility();
            return;
        }
        this.useLegacyAbility();
    }

    useLegacyAbility() {
        if (this.className === 'mage') {
            if (this.mana < 3) return addMessageAndUpdate('Not enough mana for Fireball.');
            const enemy = findNearestEnemy();
            if (!enemy) return addMessageAndUpdate('No enemies in sight to target.');

            this.mana -= 3;
            const fireDamage = 20 + this.level * 2;
            damageEnemy(enemy, fireDamage, 'fire');
            applyLifesteal(fireDamage);
            applyStatus(enemy, 'burn', 3);
            addMessage(`Fireball scorches the ${enemy.name}. (burning 3 turns)`);
            addBurst(enemy.x, enemy.y, '#ff9f58');
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyTurn();
        } else if (this.className === 'cleric') {
            if (this.mana < 4) return addMessageAndUpdate('Not enough mana to Heal.');
            const heal = Math.floor(this.maxHp * 0.35);
            this.hp = Math.min(this.maxHp, this.hp + heal);
            this.mana -= 4;
            addFloatingText(this.x, this.y, `+${heal}`, '#58c26d');
            addMessage(`You heal for ${heal} HP.`);
            enemyTurn();
        } else if (this.className === 'warrior') {
            this.shieldActive = true;
            addBurst(this.x, this.y, '#ffd65a');
            addMessage('Shield Block is ready for the next hit.');
            enemyTurn();
        } else if (this.className === 'rogue') {
            const enemy = findEnemyAt(this.x, this.y, 1);
            if (!enemy) return addMessageAndUpdate('Backstab needs an adjacent target.');
            const dealt = Math.max(1, Math.ceil(this.atk * 2.2) - enemy.def);
            damageEnemy(enemy, dealt, 'backstab');
            applyLifesteal(dealt);
            if (rng() < 0.4) {
                applyStatus(enemy, 'stun', 1);
                addMessage(`Backstab lands for ${dealt} damage and stuns the ${enemy.name}!`);
            } else {
                addMessage(`Backstab lands for ${dealt} damage.`);
            }
            if (enemy.hp <= 0) defeatEnemy(enemy);
            else enemyAttack(enemy);
        }

        refreshEnemyIntents();
        updateUI();
    }

    gainXp(amount) {
        this.xp += amount;
        addFloatingText(this.x, this.y, `+${amount} XP`, '#ffd65a', { style: 'xp', offsetY: 14 });

        // A single large XP gain (e.g. a high-floor boss kill) can justify
        // more than one level-up — this used to be a plain `if`, so a
        // 500-XP burst at level 1 only ever leveled up once and silently
        // discarded the rest of the XP's value toward the next threshold.
        // Each level still gets its own choice prompt (queued one at a
        // time) rather than silently auto-picking bonuses for the player.
        let levelsGained = 0;
        let needed = getXpToLevel();
        while (this.xp >= needed) {
            this.xp -= needed;
            this.level++;
            this.hp = this.maxHp;
            this.mana = this.maxMana;
            levelsGained++;
            needed = getXpToLevel();
        }
        if (levelsGained > 0) {
            // Guaranteed small ATK trickle on every level, independent of
            // the level-up choice below. Previously ATK only grew via a
            // 1-in-5 (or 1-in-6 with mana) RNG choice or weapon gear,
            // while DEF effectively grew faster — 4 armor slots' worth of
            // gear bonus vs. 1 weapon slot, plus its own choice option.
            // Accumulated as a fraction so it still totals +3 every 5
            // levels on average rather than rounding away to nothing.
            this._atkTrickleAccum = (this._atkTrickleAccum || 0) + levelsGained * 0.6;
            const wholeTrickle = Math.floor(this._atkTrickleAccum);
            if (wholeTrickle > 0) {
                this.baseAtk += wholeTrickle;
                this._atkTrickleAccum -= wholeTrickle;
                recalculateStats();
            }
            gameState.pendingLevelChoices = (gameState.pendingLevelChoices || 0) + levelsGained - 1;
            gameState.awaitingLevelChoice = true;
            sfxLevelUp();
            showLevelChoices();
        }
    }

    equip(item) {
        item.slot = normalizeGearSlot(item.slot);
        const previous = this.equipment[item.slot];
        if (previous && previous.cursed && gameState.floor > 0 && gameState.enemies.length > 0) {
            addMessage(`${previous.identified ? previous.name : '?? Item'} is cursed — clear the floor first!`);
            return;
        }
        this.equipment[item.slot] = item;
        if (previous) addItemToInventory(previous);
        recalculateStats();
        const displayName = (item.cursed && !item.identified) ? '?? Item' : item.name;
        addMessage(`Equipped ${displayName}.`);
    }

    regenMana() {
        if (this.maxMana > 0 && this.mana < this.maxMana) {
            this.mana = Math.min(this.maxMana, this.mana + 1 + (this.manaRegenBonus || 0));
        }
    }
}


class Enemy {
    constructor(x, y, type = 'goblin') {
        const template = ENEMY_TYPES[type];
        this.x = x;
        this.y = y;
        this.type = type;
        this.name = template.name;
        this.color = template.color;
        this.glyph = template.glyph;
        this.range = template.range;
        this.xp = template.xp;
        this.hp = template.hp + gameState.floor * (type === 'boss' ? 12 : 4);
        this.maxHp = this.hp;
        // Boss ATK scaled at 2x the rate of regular enemies and of player
        // DEF growth (gear bonus is ~floor/3 per slot, def levels are
        // gated behind a 1-in-5 level-up roll) — by floor 100 that left
        // bosses able to kill a well-geared player in ~1-4 hits while
        // still taking 60-100+ hits to bring down. Dropped to 1.4x: still
        // the steepest-scaling enemy type (regular enemies are 1x), just
        // not double, so boss fights stay the hardest fights in the game
        // without being unwinnable even with strong gear.
        this.atk = template.atk + Math.ceil(gameState.floor * (type === 'boss' ? 1.4 : 1));
        this.def = template.def + Math.floor(gameState.floor / 2);
        this.flash = 0;
        this.hitFlash = 0;
        this.statuses = [];
        this.intent = null;
        // Boss-specific fields
        this.bossVariant = null;
        this.bossPhase = 'normal';   // for sentinel: 'armored' | 'vulnerable'
        this.bossTurnCounter = 0;
        this.splitDone = false;
        this.immuneToStun = (type === 'warden' || type === 'orc'); // wardens and orcs shrug off stun
        this.fireImmune = (type === 'demon'); // demons are immune to burn — matches lore
        // Tracks whether the player took zero damage from this boss encounter —
        // used for the Flawless Victory achievement (see ui.js checkAchievements).
        // Set to true when a boss spawns (dungeon.js), cleared to false by
        // onPlayerTakeDamage when the boss lands a hit. Initialized here so
        // save/load and non-boss enemies all start with a defined value.
        this.tookNoDamage = false;
        // Smoothly-interpolated draw position, mirroring Player's
        // renderX/renderY — previously enemies only had logical grid x/y
        // and snapped instantly between tiles on every move (see the lerp
        // toward x*TILE_SIZE/y*TILE_SIZE in the per-frame update loop in
        // render.js, the same one the player already used).
        this.renderX = x * TILE_SIZE;
        this.renderY = y * TILE_SIZE;
        // Attack lunge state, mirroring Player's attackAnim — set when
        // this enemy lands a hit (see enemyAttack in combat.js), decayed
        // in the same per-frame loop as the player's.
        this.attackAnim = null;
    }

    applyVariant(variantKey) {
        const v = BOSS_VARIANTS[variantKey];
        if (!v) return;
        this.bossVariant = variantKey;
        this.name = v.name;
        this.color = v.color;
        this.glyph = v.glyph;
        if (variantKey === 'sentinel') {
            this.bossPhase = 'armored';
            this.color = '#a8c8e8';
        }
        if (variantKey === 'wraith') {
            this.immuneToStun = true;
            this.range = 3;
        }
    }
}
