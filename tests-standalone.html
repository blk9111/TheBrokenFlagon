// Resets any subclass state that's meant to refresh "once per floor"
// rather than persisting for the whole run. Called from both
// descendFloor() and ascendFloor() so the two can't drift — currently
// only Trickster's advertised "first hit each floor has a dodge
// chance" trait needs this, but it's written generically in case a
// future subclass trait needs the same per-floor-refresh pattern.
function resetPerFloorSubclassState() {
    const p = gameState.player;
    if (!p) return;

    // Cellar Find's Adrenaline Rush (see CELLAR_FIND_CHOICES in data.js)
    // — not subclass-gated, so checked before the p.sc guard below.
    // Expires the moment the floor actually changes; recalculated
    // immediately so the ATK/DEF boost drops off right away rather than
    // lingering until some unrelated recalc happens to fire later.
    if (p.cellarRushFloor !== null && p.cellarRushFloor !== gameState.floor) {
        p.baseAtk -= 8;
        p.baseDef -= 5;
        p.cellarRushFloor = null;
        recalculateStats();
        addMessage('The adrenaline rush fades.');
    }

    if (!p.sc) return;
    if (p.subclass === 'trickster') p.sc.dodgeReady = true;
    // Berserker's advertised "ignores death once per floor at 1 HP" —
    // see tryBerserkerDeathSave() in showGameOver's lethal-save chain.
    if (p.subclass === 'berserker') p.sc.deathSaveReady = true;
}


function descendFloor() {
    if (gameState.floor >= MAX_DUNGEON_FLOOR) return;

    // Snapshot the floor we're leaving before anything changes so it can be
    // restored identically if the player ascends back here later.
    saveFloorToCache();

    gameState.floor++;
    resetPerFloorSubclassState();
    gameState.player.x = SPAWN_X;
    gameState.player.y = SPAWN_Y;
    gameState.player.renderX = SPAWN_X * TILE_SIZE;
    gameState.player.renderY = SPAWN_Y * TILE_SIZE;
    gameState.player.shieldActive = false;
    gameState.player.regenMana();
    gameState.effects = [];
    gameState.fallenEnemies = [];
    // Floor-dependent passives (Knight's depth-scaled DEF, Gladiator's
    // depth-scaled gold find) need to be current the moment the floor
    // actually changes, not just whenever something else happens to
    // trigger a recalc later.
    recalculateStats();

    // Tick brew duration
    if (gameState.activeBrew) {
        if (gameState.activeBrew.duration > 0) {
            gameState.activeBrew.duration--;
            if (gameState.activeBrew.duration <= 0) {
                const def = BREW_MENU.find(b => b.id === gameState.activeBrew.id);
                if (def) def.remove(gameState.player);
                addMessage(`The ${gameState.activeBrew.name} wears off.`);
                gameState.activeBrew = null;
                recalculateStats();
            }
        }
    }

    // Quest tracking: challenge_reach and no_potion_run
    const q = gameState.activeQuest;
    if (q && !q.completed && !q.failed) {
        if (q.type === 'challenge_reach' && gameState.floor >= q.targetAmount) {
            completeQuest();
        } else if (q.type === 'no_potion_run' && gameState.floor >= q.targetAmount) {
            completeQuest();
        }
    }

    // Trophy: royal rug unlocked on reaching floor 5
    if (gameState.floor >= 5 && !gameState.tavernUpgrades.royalRug) {
        gameState.tavernUpgrades.royalRug = true;
        saveTavernUpgrades();
        addMessage('A royal rug has been laid in the Broken Flagon — the tavern looks almost respectable!');
        checkAchievements();
    }

    // Song: descentHeal (Lament of the Broken)
    if (gameState.activeSong && gameState.activeSong.effect.type === 'stat_boost'
        && gameState.activeSong.effect.stat === 'descentHeal') {
        const heal = gameState.activeSong.effect.value;
        const p = gameState.player;
        p.hp = Math.min(p.hp + heal, p.maxHp);
        addMessage(`The bard's lament soothes you — restored ${heal} HP.`);
    }

    // Restore the floor from cache if we've been here before; otherwise
    // generate it fresh. Either path leaves gameState.dungeon/revealed/etc.
    // fully populated for the new floor number.
    const revisit = restoreFloorFromCache(gameState.floor);
    if (!revisit) {
        generateDungeon();
    } else {
        // Reveal the spawn area so the player can see where they landed —
        // generateDungeon() normally does this; we replicate it on restore.
        revealAround(SPAWN_X, SPAWN_Y, 4);
    }

    if (gameState.floor === 1 && !revisit) {
        addMessage(`You enter ${DUNGEON_NAME} — ${MAX_DUNGEON_FLOOR} floors stand between you and The Fallen God.`);
        showEventCard(DUNGEON_NAME, `Floor 1 / ${MAX_DUNGEON_FLOOR}`, 'milestone');
    } else if (revisit) {
        addMessage(`You descend back to Floor ${gameState.floor} — the ash still settles here.`);
    } else {
        addMessage(`You descend to Floor ${gameState.floor} of ${MAX_DUNGEON_FLOOR}.`);
    }
    const milestone = MILESTONE_BOSSES[gameState.floor];
    if (milestone && !revisit) addMessage(`A milestone looms: ${milestone.name} guards this floor.`);
    updateUI();
}


function ascendFloor() {
    if (!gameState.player || gameState.floor <= 1) return;

    // Snapshot the floor we're leaving before decrementing the counter.
    saveFloorToCache();

    gameState.floor--;
    resetPerFloorSubclassState();
    gameState.player.shieldActive = false;
    gameState.player.regenMana();
    gameState.effects = [];
    recalculateStats();

    // Tick brew duration — every floor transition (up or down) costs a charge
    if (gameState.activeBrew) {
        if (gameState.activeBrew.duration > 0) {
            gameState.activeBrew.duration--;
            if (gameState.activeBrew.duration <= 0) {
                const def = BREW_MENU.find(b => b.id === gameState.activeBrew.id);
                if (def) def.remove(gameState.player);
                addMessage(`The ${gameState.activeBrew.name} wears off.`);
                gameState.activeBrew = null;
                recalculateStats();
            }
        }
    }

    // Always try the cache first — we were just on this floor, so it will
    // almost always hit. Fall back to generateDungeon() only if somehow
    // the cache was cleared (e.g. initGame() on a new run).
    if (!restoreFloorFromCache(gameState.floor)) {
        generateDungeon();
    }

    // Arrive at the descend stairs — mirror of how descendFloor places
    // the player at the ascend stairs on the floor below.
    gameState.player.x = EXIT_X;
    gameState.player.y = EXIT_Y;
    gameState.player.renderX = EXIT_X * TILE_SIZE;
    gameState.player.renderY = EXIT_Y * TILE_SIZE;
    revealAround(EXIT_X, EXIT_Y, 4);

    addMessage(`You ascend to Floor ${gameState.floor}.`);
    updateUI();
}


function returnToTavern() {
    if (!gameState.player) return;

    // Cache the floor we're leaving (usually floor 1) so it can be
    // restored when the player descends again this session.
    saveFloorToCache();

    gameState.floor = 0;
    gameState.player.shieldActive = false;
    gameState.player.regenMana();
    gameState.effects = [];

    generateDungeon(); // floor === 0 branch rebuilds the tavern map and reveals it

    // Arrive at the tavern's dungeon hatch — the same staircase used to descend.
    gameState.player.x = EXIT_X;
    gameState.player.y = EXIT_Y;
    gameState.player.renderX = EXIT_X * TILE_SIZE;
    gameState.player.renderY = EXIT_Y * TILE_SIZE;

    addMessage('You return to The Broken Flagon Tavern.');
    // Persist immediately so the character/gold/inventory/gear survive a
    // browser close even while idling in town (normally only floor>0 autosaves).
    saveActiveRun();
    updateUI();
}

let shopTab = 'buy';


function showShopTab(tab) {
    shopTab = tab;

    document.getElementById('shop-tab-sell').style.display = tab === 'sell' ? 'block' : 'none';
    renderShop();

function renderShop() {
    const goldEl = document.getElementById('shop-gold');
    goldEl.textContent = `Your gold: ${gameState.player.gold}g`;

    if (shopTab === 'sell') {
        renderSellList();
        return;
    }

    const items = getShopItems();
    const list = document.getElementById('shop-list');
    list.innerHTML = '';

    items.forEach(item => {
        const row = document.createElement('div');
        const canAfford = gameState.player.gold >= item.cost;
        row.className = `shop-row${canAfford ? '' : ' shop-cant-afford'}`;
        row.innerHTML = `
            <span class="shop-icon">${item.icon}</span>
            <span class="shop-info">
                <span class="shop-name">${item.label}</span>
                <span class="shop-desc">${item.desc}</span>
            </span>
            <button class="shop-buy-btn" ${canAfford ? '' : 'disabled'}>${item.cost}g</button>
        `;
        if (canAfford) {
            row.querySelector('.shop-buy-btn').addEventListener('click', () => {
                gameState.player.gold -= item.cost;
                item.buy();
                renderShop();
                updateUI();
            });
        }
        list.appendChild(row);
    });
}


function renderSellList() {
    const list = document.getElementById('shop-sell-list');
    if (!list) return;
    list.innerHTML = '';

    const p = gameState.player;
    const rows = [];

    GEAR_SLOTS.forEach(slot => {
        const item = migrateEquipment(p.equipment)[slot];
        if (!item) return;
        rows.push({ item, value: getSellValue(item), onSell: () => sellEquippedSlot(slot), slotLabel: `${SLOT_LABELS[slot]} (equipped)` });
    });

    p.inventory.filter(i => i.type === 'equipment').forEach(item => {
        rows.push({ item, value: getSellValue(item), onSell: () => sellItem(item), slotLabel: null });
    });

    if (rows.length === 0) {
        list.innerHTML = '<div class="shop-sell-empty">No gear to sell right now.</div>';
        return;
    }

    rows.forEach(({ item, value, onSell, slotLabel }) => {
        const hidden = item.cursed && !item.identified;
        const name = hidden ? '?? Item' : item.name;
        const stat = hidden ? '+??' : `+${item.bonus}${item.unit || ''}`;
        const cursedTag = (item.cursed && item.identified) ? ' <span class="cursed-tag">CURSED</span>' : '';
        const row = document.createElement('div');
        row.className = 'shop-row';
        row.innerHTML = `
            <span class="shop-icon">${getGearIcon(item.slot)}</span>
            <span class="shop-info">
                <span class="shop-name rarity-${item.rarity || 'common'}">${name} ${stat}${cursedTag}</span>
                <span class="shop-desc">${slotLabel ? slotLabel : 'In pack'}${item.desc ? ` — ${item.desc}` : ''}</span>
            </span>
            <button class="shop-buy-btn shop-sell-btn">Sell ${value}g</button>
        `;
        row.querySelector('.shop-sell-btn').addEventListener('click', onSell);
        list.appendChild(row);
    });
}

function playDice(betType) {
    if (!gameState.player || !gameState.gamblingOpen) return;

    const wagerEl = document.getElementById('wager-input');
    const resultEl = document.getElementById('gambling-result');
    const wager = Math.round(Number(wagerEl ? wagerEl.value : 10));

    const showErr = msg => {
        if (resultEl) { resultEl.textContent = msg; resultEl.className = 'gambling-result result-lose'; }
    };

    if (wager < 5)                        return showErr('Minimum wager is 5 gold.');
    if (wager > 100)                       return showErr('Maximum wager is 100 gold.');
    if (gameState.player.gold < wager)     return showErr("Not enough gold.");

    gameState.player.gold -= wager;
    _setDiceBtnsDisabled(true);
    if (resultEl) { resultEl.textContent = 'Rolling…'; resultEl.className = 'gambling-result'; }
    _syncGamblingGold();

    // Roll values (pre-determined) — seeded, since this outcome is real
    // gameplay state (gold won or lost), unlike the flicker below.
    const rolls = [
        Math.floor(rng() * 6) + 1,
        Math.floor(rng() * 6) + 1,
        Math.floor(rng() * 6) + 1,
    ];
    const dieEls = ['die-1', 'die-2', 'die-3'].map(id => document.getElementById(id));

    // Flicker animation — deliberately NOT seeded. This is pure visual
    // noise while the "Rolling…" suspense plays out; the real outcome is
    // already locked in above. Routing it through rng() would burn seeded
    // RNG state on something with zero effect on the actual run.
    dieEls.forEach(el => { if (el) el.textContent = '?'; });
    const start = Date.now();
    const flicker = setInterval(() => {
        dieEls.forEach(el => {
            if (el) el.textContent = DICE_FACES[Math.floor(Math.random() * 6)];
        });
    }, 70);

    clearTimeout(_diceRollTimer);
    _diceRollTimer = setTimeout(() => {
        clearInterval(flicker);

        // Show final faces
        rolls.forEach((r, i) => { if (dieEls[i]) dieEls[i].textContent = DICE_FACES[r - 1]; });

        const total = rolls[0] + rolls[1] + rolls[2];
        const isTriple = rolls[0] === rolls[1] && rolls[1] === rolls[2];

        let won = false, payout = 0, msg = '';

        if (betType === 'triple') {
            if (isTriple) {
                won = true; payout = wager * 5;
                msg = `TRIPLE ${rolls[0]}s! You win ${payout}g!`;
            } else {
                msg = `Total ${total} — No triple. You lose ${wager}g.`;
            }
        } else if (betType === 'low') {
            if (total <= 10) {
                won = true; payout = wager * 2;
                msg = `Total ${total} — LOW! You win ${payout}g!`;
            } else {
                msg = `Total ${total} — Too high. You lose ${wager}g.`;
            }
        } else if (betType === 'high') {
            if (total >= 12) {
                won = true; payout = wager * 2;
                msg = `Total ${total} — HIGH! You win ${payout}g!`;
            } else {
                msg = `Total ${total} — Too low. You lose ${wager}g.`;
            }
        }

        if (won) {
            gameState.player.gold += payout;
            ensureMetaStats();
            gameMeta.stats.diceWins++;
            checkAchievements();
        }

        if (resultEl) {
            resultEl.textContent = msg;
            resultEl.className = 'gambling-result ' + (won ? 'result-win' : 'result-lose');
        }

        addMessage(`[Flagon Dice] ${rolls.map(r => DICE_FACES[r - 1]).join(' ')} = ${total} — ${msg}`);
        _syncGamblingGold();
        _setDiceBtnsDisabled(false);
        updateUI();
    }, 500);
}


// ── Fortune Wheel ─────────────────────────────────────────────────────────────

let _wheelSpinTimer = null;
let _wheelAnimFrame = null;

// Draw the static wheel at a given rotation angle (radians). Null = default.
function _drawWheel(angle) {
    const canvas = document.getElementById('wheel-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = cx - 8;
    const segs = WHEEL_SEGMENTS;
    const total = segs.reduce((s, sg) => s + sg.weight, 0);
    let startAngle = angle || 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Outer ring
    ctx.beginPath();
    ctx.arc(cx, cy, r + 6, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1208';
    ctx.fill();
    ctx.strokeStyle = '#c8a060';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Segments
    segs.forEach((seg, i) => {
        const sliceAngle = (seg.weight / total) * Math.PI * 2;
        const endAngle = startAngle + sliceAngle;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.globalAlpha = 0.88;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Label
        const midAngle = startAngle + sliceAngle / 2;
        const lx = cx + Math.cos(midAngle) * (r * 0.68);
        const ly = cy + Math.sin(midAngle) * (r * 0.68);
        ctx.save();
        ctx.translate(lx, ly);
        ctx.rotate(midAngle + Math.PI / 2);
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${seg.label.length > 2 ? 11 : 13}px "Courier New"`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.fillText(seg.label, 0, 0);
        ctx.restore();

        startAngle = endAngle;
    });

    // Center hub
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fillStyle = '#c8a060';
    ctx.fill();
    ctx.strokeStyle = '#8a6828';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#2a1e0a';
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', cx, cy);
}


// Animate the wheel spinning, landing on segmentIndex after ~2s.
function _drawWheelSpin(segmentIndex, extraRevolutions, onDone) {
    if (_wheelAnimFrame) cancelAnimationFrame(_wheelAnimFrame);
    const segs = WHEEL_SEGMENTS;
    const total = segs.reduce((s, sg) => s + sg.weight, 0);

    // Find the angle where segmentIndex's CENTER sits at the top (pointer).
    // Pointer is at the top = -Math.PI/2 in canvas coords.
    let accAngle = 0;
    for (let i = 0; i < segmentIndex; i++) {
        accAngle += (segs[i].weight / total) * Math.PI * 2;
    }
    const segCenter = accAngle + (segs[segmentIndex].weight / total) * Math.PI * 2 / 2;
    // Target rotation: pointer sits at top when startAngle puts segCenter at -PI/2
    const targetAngle = (Math.PI * 2 * extraRevolutions) + (-Math.PI / 2 - segCenter);

    const duration = 3000;
    const startTime = performance.now();

    function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        // Ease out cubic
        const eased = 1 - Math.pow(1 - t, 3);
        const currentAngle = eased * targetAngle;
        _drawWheel(currentAngle);
        if (t < 1) {
            _wheelAnimFrame = requestAnimationFrame(frame);
        } else {
            _wheelAnimFrame = null;
            onDone();
        }
    }
    _wheelAnimFrame = requestAnimationFrame(frame);
}


function playWheel() {
    if (!gameState.player || !gameState.gamblingOpen) return;
    const wagerEl = document.getElementById('wheel-wager-input');
    const resultEl = document.getElementById('wheel-result');
    const wager = Math.round(Number(wagerEl ? wagerEl.value : 10));
    const spinBtn = document.getElementById('wheel-spin-btn');

    const showErr = msg => {
        if (resultEl) { resultEl.textContent = msg; resultEl.className = 'gambling-result result-lose'; }
    };
    if (wager < 5) return showErr('Minimum wager is 5 gold.');
    if (wager > 500) return showErr('Maximum wager is 500 gold.');
    if (gameState.player.gold < wager) return showErr('Not enough gold.');

    // Deduct wager and lock the seeded result immediately
    gameState.player.gold -= wager;
    const segIdx = spinWheel();
    const seg = WHEEL_SEGMENTS[segIdx];
    gameMeta.casinoWheelSpins = (gameMeta.casinoWheelSpins || 0) + 1;
    if (seg.mult >= 5) gameMeta.casinoWheelBigWins = (gameMeta.casinoWheelBigWins || 0) + 1;

    if (spinBtn) spinBtn.disabled = true;
    if (resultEl) { resultEl.textContent = 'Spinning…'; resultEl.className = 'gambling-result'; }
    _syncGamblingGold();

    _drawWheelSpin(segIdx, 5, () => {
        // Resolve
        const payout = Math.floor(wager * seg.mult);
        const won = payout > wager;
        const broke = payout === 0;
        gameState.player.gold += payout;

        let msg = '';
        if (broke)       msg = `${seg.label}! Lost everything — ${wager}g gone.`;
        else if (payout < wager) msg = `${seg.label}! Got back ${payout}g — lost ${wager - payout}g.`;
        else if (payout === wager) msg = `${seg.label}! Broke even — ${payout}g back.`;
        else             msg = `${seg.label}! Won ${payout}g!`;

        if (resultEl) {
            resultEl.textContent = msg;
            resultEl.className = 'gambling-result ' + (payout > wager ? 'result-win' : payout < wager ? 'result-lose' : '');
        }
        if (spinBtn) spinBtn.disabled = false;
        addMessage(`[Fortune Wheel] Landed on ${seg.label} — ${msg}`);
        saveMetaProgress();
        _syncGamblingGold();
        updateUI();
    });
}

function generateBounties() {
    const lvl = gameState.player ? gameState.player.level : 1;
    const hardBounties = isRenownUnlocked('harderBounties');
    // Shuffle the pool and take 3 unique templates
    const shuffled = [...QUEST_POOL].sort(() => rng() - 0.5).slice(0, 3);
    return shuffled.map(tpl => {
        const amount = tpl.getAmount(lvl);
        let reward = tpl.getReward(amount);
        // Renown 100: harder bounties pay 30% more gold — the board posts
        // serious work for proven delvers.
        if (hardBounties) reward = Math.floor(reward * 1.3);
        return {
            id:            tpl.id,
            type:          tpl.type,
            targetType:    tpl.targetType,
            targetAmount:  amount,
            currentAmount: 0,
            label:         tpl.makeLabel(amount),
            desc:          tpl.makeDesc(amount, reward),
            goldReward:    reward,
            completed:     false,
            failed:        false
        };
    });
}

function buyBrew(id) {

    const def = BREW_MENU.find(b => b.id === id);
    if (!def) return;
    if (p.gold < def.cost) { addMessage("You can't afford that."); return; }

    p.gold -= def.cost;
    gameState.activeBrew = { id: def.id, name: def.name, icon: def.icon, duration: def.duration };
    def.apply(p);
    recalculateStats();
    addMessage(`You drink ${def.name}. ${def.desc}`);
    renderBrewmasterPanel();
    updateUI();

function depositToStash(inventoryIndex) {
    const p = gameState.player;
    const item = p.inventory[inventoryIndex];
    if (!item || !item.slot) return;
    if (gameSharedStash.length >= STASH_MAX) {
        addMessage('The stash is full (3 item limit).');
        updateUI();
        return;
    }
    p.inventory.splice(inventoryIndex, 1);
    gameSharedStash.push(item);
    saveStash();
    addMessage(`Deposited ${item.name} into the stash.`);
    recalculateStats();
    renderStashPanel();
    updateUI();
}


function withdrawFromStash(stashIndex) {
    const item = gameSharedStash[stashIndex];
    if (!item) return;
    gameSharedStash.splice(stashIndex, 1);
    gameState.player.inventory.push(item);
    saveStash();
    addMessage(`Took ${item.name} from the stash.`);
    recalculateStats();
    renderStashPanel();
    updateUI();

// Centralized unlock condition for the Pit. Two paths in:
//   • The Gladiator subclass is born of the arena — its whole identity is
//     "the crowd demands blood." It can enter the Pit from level 1, with no
//     floor requirement. This is one of the class's defining advantages.
//   • Every other class must prove itself by surviving to Floor 20 of the
//     Ash Dungeon. gameState.bestFloor persists across every run/character
//     (see saveBestFloor in save.js), so that's account-wide progress.
// All arena features (gate, panel, capture nets, fame HUD, crowd) gate on
// this single function, so both paths stay consistent everywhere.
function isArenaUnlocked() {
    if (gameState.player?.subclass === 'gladiator') return true;
    return gameState.bestFloor >= 20;
}


function generateMagicStock() {
    const relicSlot = rng() < 0.5 ? 'weapon' : 'chest';
    const relicBonus = 4 + Math.floor(rng() * 3);          // 4–6
    const relicCursed = rng() < 0.75;
    const relicNames = relicSlot === 'weapon' ? MAGIC_RELIC_WEAPONS : MAGIC_RELIC_ARMORS;
    const relicTrueName = 'Epic ' + relicNames[Math.floor(rng() * relicNames.length)];
    const relic = {
        type: 'equipment', slot: relicSlot, rarity: 'epic',
        name: '?? Relic', identified: false, cursed: relicCursed,
        bonus: relicCursed ? Math.ceil(relicBonus * 1.6) : relicBonus,
        color: relicSlot === 'weapon' ? '#78bfff' : '#d08aff',
        glyph: relicSlot === 'weapon' ? '/' : ']',
        trueName: relicTrueName,
        cost: 120,
    };
    if (relicCursed) { relic.trueBonus = relic.bonus; }

    // 2 exotic accessories — guaranteed positive effects, never cursed
    const positiveEffects = ['lifesteal', 'critChance', 'manaRegen'];
    const shuffled = [...positiveEffects].sort(() => rng() - 0.5);
    const accessories = shuffled.slice(0, 2).map(effectId => {
        const effect = ACCESSORY_EFFECTS[effectId];
        const rarityName = rng() < 0.5 ? 'rare' : 'epic';
        const rarityObj = RARITIES.find(r => r.name === rarityName) || RARITIES[2];
        const bonus = effect.scale * rarityObj.bonus;
        const itemName = effect.names[Math.floor(rng() * effect.names.length)];
        const jewelrySlot = effectId === 'manaRegen' ? 'amulet' : 'ring';
        return {
            type: 'equipment', slot: jewelrySlot, effectId,
            rarity: rarityName,
            name: `${capitalize(rarityName)} ${effect.label} ${itemName}`,
            identified: true, cursed: false,
            bonus, unit: effect.unit, desc: effect.desc,
            color: '#5ad1c2', glyph: SLOT_GLYPHS[jewelrySlot],
            cost: rarityName === 'epic' ? 95 : 70,
        };
    });

    gameState.magicStock = [relic, ...accessories, generateDealerRelic()];
}


// The dealer's relic is a guaranteed, known pick — priced at a markup over
// the relic's own base cost since dungeon drops are random but this one
// is a sure thing.
function generateDealerRelic() {
    const ids = Object.keys(RELIC_DEFS);
    const relicId = ids[Math.floor(rng() * ids.length)];
    const def = RELIC_DEFS[relicId];
    return {
        type: 'relic', relicId,
        cost: Math.round(def.cost * 1.4)
    };
}


function openMagicDealer() {
    if (gameState.floor !== 0 || !gameState.player) return;
    if (gameState.shopOpen || gameState.charSheetOpen || gameState.gamblingOpen
        || gameState.brewmasterOpen || gameState.questBoardOpen || gameState.bardOpen
        || gameState.stashOpen || gameState.cellarFindOpen) return;
    if (!gameState.magicStock.length) generateMagicStock();
    gameState.magicDealerOpen = true;
    renderMagicDealerPanel('artifacts');
    document.getElementById('magic-dealer-panel').style.display = 'flex';
    updateUI();
}


function closeMagicDealer() {
    gameState.magicDealerOpen = false;
    document.getElementById('magic-dealer-panel').style.display = 'none';
    updateUI();
}


function openCellar() {
    if (gameState.floor !== 0 || !gameState.player) return;
    if (gameState.shopOpen || gameState.charSheetOpen || gameState.gamblingOpen
        || gameState.brewmasterOpen || gameState.questBoardOpen || gameState.bardOpen
        || gameState.stashOpen || gameState.magicDealerOpen) return;
    gameState.cellarFindOpen = true;
    renderCellarPanel();
    document.getElementById('cellar-panel').style.display = 'flex';
    updateUI();
}


function closeCellar() {
    gameState.cellarFindOpen = false;
    document.getElementById('cellar-panel').style.display = 'none';
    updateUI();
}


function renderCellarPanel() {
    const body = document.getElementById('cellar-body');
    if (!body) return;

    if (gameState.cellarClaimed) {
        body.innerHTML = `
            <p class="cellar-flavor">The cellar is bare — whatever was hidden down here, you already found it this run.</p>
        `;
        return;
    }
    if (!gameState.cellarHasFind) {
        body.innerHTML = `
            <p class="cellar-flavor">Dust, empty crates, and the smell of old ale. Nothing here this time.</p>
        `;
        return;
    }

    body.innerHTML = `
        <p class="cellar-flavor">Something is hidden beneath the floorboards. Choose what to take — the rest crumbles to dust the moment you touch it.</p>
        <div id="cellar-choices"></div>
    `;
    const list = document.getElementById('cellar-choices');
    CELLAR_FIND_CHOICES.forEach(choice => {
        const button = document.createElement('button');
        button.className = 'cellar-choice-btn';
        button.innerHTML = `
            <span class="cellar-choice-icon">${choice.icon}</span>
            <span class="cellar-choice-info">
                <span class="cellar-choice-label">${escHtml(choice.label)}</span>
                <span class="cellar-choice-desc">${escHtml(choice.desc)}</span>
            </span>
        `;
        button.addEventListener('click', () => claimCellarFind(choice.id));
        list.appendChild(button);
    });
}


function claimCellarFind(choiceId) {
    if (gameState.cellarClaimed || !gameState.cellarHasFind) return;
    const choice = CELLAR_FIND_CHOICES.find(c => c.id === choiceId);
    if (!choice) return;
    choice.apply(gameState.player);
    gameState.cellarClaimed = true;
    addBurst(gameState.cellar.x, gameState.cellar.y, '#d4b97a');
    addFloatingText(gameState.player.x, gameState.player.y, choice.label, '#d4b97a', { style: 'crit-banner' });
    addMessage(`The cellar yields its secret: ${choice.label}.`);
    showEventCard('CELLAR FIND', choice.label, 'boss');
    renderCellarPanel();
    updateUI();
}


function showMagicTab(tab) {
    document.getElementById('magic-tab-artifacts').style.display = tab === 'artifacts' ? 'block' : 'none';
    document.getElementById('magic-tab-altar').style.display    = tab === 'altar'     ? 'block' : 'none';
    document.getElementById('magic-tab-btn-artifacts').classList.toggle('magic-tab-active', tab === 'artifacts');
    document.getElementById('magic-tab-btn-altar').classList.toggle('magic-tab-active', tab === 'altar');
    // Re-render the active tab content
    if (tab === 'artifacts') _renderArtifactsTab();
    else                     _renderAltarTab();
}


function renderMagicDealerPanel(activeTab = null) {
    const p = gameState.player;
    const goldEl = document.getElementById('magic-dealer-gold');
    if (goldEl) goldEl.textContent = `Gold: ${p.gold}g`;

    // Determine which tab is currently showing
    const altarEl = document.getElementById('magic-tab-altar');
    const currentTab = (altarEl && altarEl.style.display !== 'none') ? 'altar' : 'artifacts';
    const tab = activeTab || currentTab;
    showMagicTab(tab);
}


function _renderArtifactsTab() {
    const p = gameState.player;
    const listEl = document.getElementById('magic-stock-list');
    if (!listEl) return;
    if (!gameState.magicStock.length) {
        listEl.innerHTML = '<p class="magic-empty">The Dealer\'s shelves are bare.</p>';
        return;
    }
    listEl.innerHTML = gameState.magicStock.map((item, i) => {
        const canAfford = p.gold >= item.cost;
        if (item.type === 'relic') {
            const def = RELIC_DEFS[item.relicId];
            return `<div class="magic-item-row magic-relic-row${!canAfford ? ' magic-cant-afford' : ''}">
                <div class="magic-item-info">
                    <div class="magic-item-name">
                        <span class="magic-rarity-${def.rarity}">${escHtml(def.name)}</span>
                        <span class="magic-item-slot">Relic</span>
                    </div>
                    <span class="magic-item-desc">${escHtml(def.desc)}</span>
                </div>
                <button class="magic-buy-btn" onclick="buyMagicItem(${i})" ${!canAfford ? 'disabled' : ''}>
                    ${item.cost}g
                </button>
            </div>`;
        }
        let descLine = '';
        if (!item.identified) {
            descLine = '<span class="magic-item-mystery">Unidentified — could be cursed</span>';
        } else if (JEWELRY_SLOTS.includes(item.slot)) {
            descLine = `<span class="magic-item-desc">${escHtml(item.desc)} (+${item.bonus}${item.unit || ''})</span>`;
        } else {
            descLine = `<span class="magic-item-desc">+${item.bonus} ${item.slot === 'weapon' ? 'ATK' : 'DEF'}</span>`;
        }
        const rarityClass = `magic-rarity-${item.rarity}`;
        return `<div class="magic-item-row${!canAfford ? ' magic-cant-afford' : ''}">
            <div class="magic-item-info">
                <div class="magic-item-name">
                    <span class="${rarityClass}">${escHtml(item.name)}</span>
                    <span class="magic-item-slot">${capitalize(item.slot)}</span>
                </div>
                ${descLine}
            </div>
            <button class="magic-buy-btn" onclick="buyMagicItem(${i})" ${!canAfford ? 'disabled' : ''}>
                ${item.cost}g
            </button>
        </div>`;
    }).join('');
}


function _renderAltarTab() {
    const p = gameState.player;
    const listEl = document.getElementById('magic-altar-list');
    if (!listEl) return;

    const equipmentItems = p.inventory
        .map((item, i) => ({ item, i }))
        .filter(({ item }) => item.slot);

    if (!equipmentItems.length) {
        listEl.innerHTML = '<p class="magic-empty">No equipment in your inventory to work with.</p>';
        return;
    }

    listEl.innerHTML = equipmentItems.map(({ item, i }) => {
        const displayName = (item.cursed && !item.identified) ? '?? Item' : escHtml(item.name);
        const isCursed = item.cursed;
        const purifyCost = 75;
        const canPurify = isCursed && p.gold >= purifyCost;
        const enchCost = _enchantCost(item);
        const canEnchant = p.gold >= enchCost;
        const isMaxed = item.bonus >= 7;
        const isRisky = item.bonus >= 5;

        let enchLabel = isMaxed ? 'Max' : `Enchant +1 (${enchCost}g)`;
        if (isRisky && !isMaxed) enchLabel += ' ⚠';

        const rarityClass = item.rarity ? `magic-rarity-${item.rarity}` : '';
        const bonusText = JEWELRY_SLOTS.includes(item.slot)
            ? `+${item.bonus}${item.unit || ''}`
            : `+${item.bonus} ${item.slot === 'weapon' ? 'ATK' : 'DEF'}`;

        return `<div class="magic-altar-row">
            <div class="magic-item-info">
                <div class="magic-item-name">
                    <span class="${rarityClass}">${displayName}</span>
                    <span class="magic-item-slot">${capitalize(item.slot)} · ${bonusText}</span>
                </div>
                ${isCursed ? '<span class="magic-cursed-tag">Cursed</span>' : ''}
            </div>
            <div class="magic-altar-btns">
                ${isCursed
                    ? `<button class="magic-purify-btn" onclick="purifyItem(${i})" ${!canPurify ? 'disabled' : ''}>Purify (${purifyCost}g)</button>`
                    : ''}
                <button class="magic-enchant-btn" onclick="enchantItem(${i})" ${!canEnchant || isMaxed ? 'disabled' : ''}>${enchLabel}</button>
            </div>
        </div>`;
    }).join('');
}


function _enchantCost(item) {
    if (JEWELRY_SLOTS.includes(item.slot)) return 60 + item.bonus * 10;
    return (item.bonus + 1) * 25;
}


function buyMagicItem(stockIndex) {
    const p = gameState.player;
    const item = gameState.magicStock[stockIndex];
    if (!item) return;
    if (p.gold < item.cost) { addMessage("You can't afford that."); updateUI(); return; }
    p.gold -= item.cost;
    gameState.magicStock.splice(stockIndex, 1);
    if (item.type === 'relic') {
        addRelicToPouch(item.relicId);
        sfxItemPickup();
        const def = RELIC_DEFS[item.relicId];
        addMessage(`\u{1F52E} The Dealer hands over ${def ? def.name : 'a relic'}, guaranteed genuine.`);
        renderMagicDealerPanel();
        updateUI();
        return;
    }
    // Strip the shop-only `cost` field before adding to inventory
    const { cost: _cost, ...invItem } = item;
    addItemToInventory(invItem);
    sfxItemPickup();
    if (!invItem.identified) {
        addMessage('\u{1F52E} The Dealer slides the relic across the counter. "What it does… is your discovery."');
    } else {
        const label = JEWELRY_SLOTS.includes(invItem.slot)
            ? `${invItem.name} (+${invItem.bonus}${invItem.unit || ''})`
            : `${invItem.name} (${getGearStatLabel(invItem)})`;
        addMessage(`\u{1F52E} You purchase ${label}.`);
    }
    renderMagicDealerPanel();
    updateUI();
}


function purifyItem(inventoryIndex) {
    const p = gameState.player;
    const item = p.inventory[inventoryIndex];
    if (!item || !item.cursed) { addMessage("That item isn't cursed."); updateUI(); return; }
    const cost = 75;
    if (p.gold < cost) { addMessage(`Purification costs ${cost}g — you don't have enough.`); updateUI(); return; }
    p.gold -= cost;
    item.cursed = false;
    item.identified = true;
    if (item.trueName) item.name = item.trueName;
    sfxPotion();
    addMessage(`✨ The curse shatters — ${escHtml(item.name)} shines clean.`);
    recalculateStats();
    renderMagicDealerPanel();
    updateUI();
}


function enchantItem(inventoryIndex) {
    const p = gameState.player;
    const item = p.inventory[inventoryIndex];
    if (!item || !item.slot) return;
    if (item.bonus >= 7) { addMessage("That item cannot be enchanted further."); updateUI(); return; }
    const cost = _enchantCost(item);
    if (p.gold < cost) { addMessage(`Enchanting costs ${cost}g — you need more gold.`); updateUI(); return; }
    p.gold -= cost;

    if (item.bonus >= 5 && rng() < 0.45) {
        // Break
        p.inventory.splice(inventoryIndex, 1);
        sfxDeath();
        addMessage(`⚡ The enchantment overloads — ${escHtml(item.name)} shatters into dust!`);
        addMessage('"Happens more than you\'d think," the Dealer shrugs.');
        recalculateStats();
        renderMagicDealerPanel();
        updateUI();
        return;
    }

    item.bonus++;
    if (item.trueBonus !== undefined) item.trueBonus = item.bonus;
    sfxLevelUp();
    const bonusLabel = JEWELRY_SLOTS.includes(item.slot)
        ? `+${item.bonus}${item.unit || ''}`
        : getGearStatLabel(item);
    addMessage(`\u{1F52E} The Dealer cackles as ${escHtml(item.name)} absorbs a raw magical aura! (${bonusLabel})`);
    recalculateStats();
    renderMagicDealerPanel();
    updateUI();
}


function isAdjacentToMagicDealer() {
    return getDistance(gameState.player.x, gameState.player.y,
        gameState.magicDealer.x, gameState.magicDealer.y) <= 1;
}

// The Pit: fight captured dungeon creatures or standing champions for fame
// and gold. Crowd betting, persistent fame tiers, ironman stakes.
//
// Integration points:
//   defeatEnemy()  (combat.js)  — calls resolveArenaBout(true) when in bout
//   showGameOver() (ui.js)      — calls resolveArenaBout(false) for non-ironman
//   Player.move()  (entities.js)— enemy turns fire when inArenaBout
//   Player.attack()(entities.js)— skips tavern-interact branch when inArenaBout
//   useCaptureCage (items.js)   — calls tryCaptureEnemy(enemy)


// ── Constants ─────────────────────────────────────────────────────────────────

// ── Arena Seasons ────────────────────────────────────────────────────────────
// The Pit runs in four seasons, each with its own identity, roster, and
// reward multiplier. Season advances automatically as fame climbs. Tiers
// within each season are ranks (sub-progression visible in the panel header).

    {

        titleProgression: [

        titleProgression: [

];

// Flat list of fame tiers for legacy helpers (getArenaTier, getNextArenaTier)
const ARENA_FAME_TIERS = ARENA_SEASONS.flatMap(s => s.titleProgression);

function getArenaSeason() {
    const fame = getArenaFame();
    return ARENA_SEASONS.find(s => fame >= s.fameMin && fame <= s.fameMax) || ARENA_SEASONS[0];
}

const ARENA_CHAMPIONS = [
    // ── Bronze Season roster ─────────────────────────────────────────────
    { id: 'pit_goblin',    name: 'Pit Goblin',      type: 'goblin',      season: 'bronze',   fameReq: 0,   goldBase: 15,  fameBase: 8,   label: 'Easy',   stars: 1 },

// Gold multiplier on a winning bet, by difficulty label
const BOUT_ODDS = { Easy: 1.5, Medium: 2.0, Hard: 3.0, Boss: 5.0, Captured: 2.5 };

// The crowd bets more generously on a fighter they know. Each fame tier above
// Unknown adds a small multiplier to the base betting odds — a mechanical
// reward for reputation, so climbing the ranks pays off at the betting table,
// not just on the leaderboard. Capped so it stays a bonus, not a jackpot.
function getFameOddsBonus() {
    const tierIndex = ARENA_FAME_TIERS.findIndex(t => t.title === getArenaTier().title);
    // +6% per tier, hard-capped at +30% so deeper tier lists don't inflate
    // odds beyond the intended max — the cap is the design intent, not the formula.
    return 1 + Math.min(5, Math.max(0, tierIndex)) * 0.06;
}

function oddsFor(label) {
    const base = BOUT_ODDS[label] || 1.5;
    return Math.round(base * getFameOddsBonus() * 100) / 100;
}

const MAX_CAPTURED = 5;

// Crowd flavor lines — shown in the bet section when a bout is selected
const CROWD_LINES = [
    '"Gold changes hands in the stands. They\'re betting on your blood."',
    '"The crowd roars as the gate opens…"',
    '"Place your bets — the Pit awaits another soul."',
    '"They\'ve seen better fighters. They\'ve seen worse. Place your bet."',
    '"A hush falls. Then someone shouts a number."',
    '"The bookmaker squints at you and revises his odds."',
];


// ── Fame ──────────────────────────────────────────────────────────────────────

function getArenaFame() { return gameMeta.arenaFame || 0; }

function getArenaTier() {
    const fame = getArenaFame();
    let tier = ARENA_FAME_TIERS[0];
    for (const t of ARENA_FAME_TIERS) {
        if (fame >= t.fame) tier = t;
    }
    return tier;
}

function getNextArenaTier() {
    const fame = getArenaFame();
    return ARENA_FAME_TIERS.find(t => t.fame > fame) || null;
}

function gainArenaFame(amount) {
    const prevTier = getArenaTier();
    const prevSeason = getArenaSeason();
    gameMeta.arenaFame = (gameMeta.arenaFame || 0) + amount;
    gameMeta.arenaWins = (gameMeta.arenaWins || 0) + 1;
    saveMetaProgress();
    if (typeof earnRenown === 'function') earnRenown(4, 'arena victory');
    const newTier = getArenaTier();
    const newSeason = getArenaSeason();
    // Announce rank-up
    if (newTier.title !== prevTier.title) {
        addMessage(`\u2728 Arena rank: ${newTier.title}! New challengers await in the Pit.`);
        showEventCard('RANK UP', newTier.title, 'milestone');
    }
    // Announce season promotion (bigger deal)
    if (newSeason.id !== prevSeason.id) {
        addMessage(`\u{1F3C6} Season Promotion: You've entered the ${newSeason.name}! ${newSeason.flavor}`);
        showEventCard('SEASON UP', newSeason.name, 'milestone');
    }
}

function getAvailableChampions() {
    const fame = getArenaFame();
    // Show all opponents the player has unlocked (fameReq met), but cap
    // the visible list to the current season + one ahead so the panel
    // doesn't show opponents 4 seasons away that feel unreachable.
    const season = getArenaSeason();
    const seasonIds = ARENA_SEASONS.map(s => s.id);
    const currentIdx = seasonIds.indexOf(season.id);
    const visibleSeasons = new Set(seasonIds.slice(0, currentIdx + 2));
    return ARENA_CHAMPIONS.filter(c => fame >= c.fameReq && visibleSeasons.has(c.season));
}


// ── Capture Net ───────────────────────────────────────────────────────────────

function tryCaptureEnemy(enemy) {
    const p = gameState.player;
    if (!p) return false;

    const netIdx = p.inventory.findIndex(i => i.type === 'captureCage' && i.qty > 0);
    if (netIdx === -1) {
        addMessage('No Capture Net in your pack (key: 6).');
        updateUI();
        return false;
    }
    if (enemy.type === 'boss') {
        addMessage('Boss creatures cannot be caged — even the Pit has standards.');
        updateUI();
        return false;
    }
    if (enemy.hp > enemy.maxHp * 0.3) {
        addMessage(`${capitalize(enemy.name)} is too healthy to capture. Weaken it below 30% HP first.`);
        updateUI();
        return false;
    }
    if ((gameState.capturedCreatures || []).length >= MAX_CAPTURED) {
        addMessage(`Your cages are full (${MAX_CAPTURED} max). Fight a bout at the Arena to free a slot.`);
        updateUI();
        return false;
    }

    // Consume one net charge
    const net = p.inventory[netIdx];
    net.qty--;
    if (net.qty <= 0) p.inventory.splice(netIdx, 1);

    // 65% base success rate — rogues and assassins get +15% since stealth
    // and precision are on-brand for the capture fantasy.
    const bonus = (p.className === 'rogue' || p.subclass === 'assassin') ? 0.15 : 0;
    if (rng() > 0.65 + bonus) {
        addMessage(`The net shatters on impact — ${enemy.name} breaks free!`);
        addBurst(enemy.x, enemy.y, '#aaa397');
        enemyTurn();
        updateUI();
        return false;
    }

    // Success
    gameState.enemies = gameState.enemies.filter(e => e !== enemy);
    if (!gameState.capturedCreatures) gameState.capturedCreatures = [];
    gameState.capturedCreatures.push({
        type: enemy.type,
        name: enemy.name,
        color: enemy.color,
        glyph: enemy.glyph,
        hp: enemy.hp,
        maxHp: enemy.maxHp,
        atk: enemy.atk,
        def: enemy.def,
        floorCaptured: gameState.floor,
        goldBase: 25 + gameState.floor * 3,
        fameBase: 12 + Math.floor(gameState.floor / 2),
    });
    addBurst(enemy.x, enemy.y, '#c98bff');
    addFloatingText(enemy.x, enemy.y, 'CAPTURED!', '#c98bff', { style: 'crit-banner' });
    addMessage(`${capitalize(enemy.name)} thrashes in the net — caged for the Pit!`);
    sfxItemPickup();
    refreshEnemyIntents();
    enemyTurn();
    updateUI();
    return true;
}


// ── Panel ─────────────────────────────────────────────────────────────────────

function openArena() {
    if (!isArenaUnlocked()) {
        addMessage('"The Pit is for professionals," a voice rasps. "Survive Floor 20 first."');
        updateUI();
        return;
    }
    // First-ever entry plays the arena cutscene, then opens the panel. The
    // helper proceeds immediately on repeat visits (or if the video is missing),
    // so this never blocks access to the Pit.
    const showPanel = () => {
        gameState.arenaOpen = true;
        const panel = document.getElementById('arena-panel');
        if (panel) panel.style.display = 'flex';
        renderArenaPanel();
        updateUI();
    };
    if (typeof maybePlayArenaIntro === 'function') {
        maybePlayArenaIntro(showPanel);
    } else {
        showPanel();
    }
}

function closeArena() {
    gameState.arenaOpen = false;
    _pendingArenaBout = null;
    const panel = document.getElementById('arena-panel');
    if (panel) panel.style.display = 'none';
    updateUI();
}

// Tracks the bout the player has highlighted but not yet confirmed
let _pendingArenaBout = null;

function renderArenaPanel() {
    if (!gameState.arenaOpen) return;
    const p = gameState.player;
    const fame = getArenaFame();
    const tier = getArenaTier();
    const nextTier = getNextArenaTier();
    const season = getArenaSeason();
    const champions = getAvailableChampions();
    const captured = gameState.capturedCreatures || [];

    // Season banner — updates the panel's accent color and season name
    const seasonBanner = document.getElementById('arena-season-banner');
    if (seasonBanner) {
        seasonBanner.textContent = season.name;
        seasonBanner.style.color = season.color;
        seasonBanner.style.borderColor = season.color;
        const panel = document.getElementById('arena-panel');
        if (panel) panel.style.setProperty('--arena-season-tint', season.bgTint);
    }

    // Fame header
    const fameEl = document.getElementById('arena-fame-val');
    const titleEl = document.getElementById('arena-title-val');
    const nextEl = document.getElementById('arena-fame-next');
    const goldEl = document.getElementById('arena-gold-val');
    if (fameEl) fameEl.textContent = fame;
    if (titleEl) { titleEl.textContent = tier.title; titleEl.style.color = tier.color; }
    if (nextEl) nextEl.textContent = nextTier ? `${nextTier.fame - fame} fame to ${nextTier.title}` : 'Maximum Rank';
    if (goldEl) goldEl.textContent = `${p.gold}g`;

    // Captured creatures section
    const captureEl = document.getElementById('arena-captures');
    if (captureEl) {
        if (!captured.length) {
            captureEl.innerHTML = '<p class="arena-empty">No captured creatures. Use a Capture Net (key 6) in the dungeon on an enemy below 30% HP.</p>';
        } else {
            captureEl.innerHTML = captured.map((c, i) => {
                const goldReward = c.goldBase;
                const odds = oddsFor('Captured');
                return `<div class="arena-bout-row" onclick="selectArenaBout(${i}, 'capture')">
                    <div class="arena-bout-info">
                        <span class="arena-bout-glyph" style="color:${safeColor(c.color)}">${escHtml(c.glyph)}</span>
                        <div class="arena-bout-names">
                            <span class="arena-bout-name">${escHtml(c.name)}</span>
                            <span class="arena-bout-diff arena-diff-captured">Captured · Floor ${c.floorCaptured}</span>
                        </div>
                    </div>
                    <div class="arena-bout-rewards">
                        <span class="arena-bout-gold">+${goldReward}g</span>
                        <span class="arena-bout-fame">+${c.fameBase} fame</span>
                        <span class="arena-bout-odds">${odds}× bet</span>
                    </div>
                    <button class="arena-fight-btn" onclick="event.stopPropagation(); selectArenaBout(${i}, 'capture')">Enter Pit</button>
                </div>`;
            }).join('');
        }
    }

    // Champions section
    const champEl = document.getElementById('arena-champions');
    if (champEl) {
        if (!champions.length) {
            champEl.innerHTML = '<p class="arena-empty">No champions available yet. Earn 25 fame to unlock the roster.</p>';
        } else {
            const stars = n => '★'.repeat(n) + '☆'.repeat(4 - n);
            champEl.innerHTML = champions.map(c => {
                const goldReward = c.goldBase + Math.floor((gameState.bestFloor || 0) / 10) * 5;
                const odds = oddsFor(c.label);
                return `<div class="arena-bout-row" onclick="selectArenaBout('${escHtml(c.id)}', 'champion')">
                    <div class="arena-bout-info">
                        <span class="arena-bout-stars">${stars(c.stars)}</span>
                        <div class="arena-bout-names">
                            <span class="arena-bout-name">${escHtml(c.name)}</span>
                            <span class="arena-bout-diff arena-diff-${c.label.toLowerCase()}">${escHtml(c.label)}</span>
                        </div>
                    </div>
                    <div class="arena-bout-rewards">
                        <span class="arena-bout-gold">+${goldReward}g</span>
                        <span class="arena-bout-fame">+${c.fameBase} fame</span>
                        <span class="arena-bout-odds">${odds}× bet</span>
                    </div>
                    <button class="arena-fight-btn" onclick="event.stopPropagation(); selectArenaBout('${escHtml(c.id)}', 'champion')">Challenge</button>
                </div>`;
            }).join('');
        }
    }

    // ── Gauntlet roster ──────────────────────────────────────────────────
    const gauntletEl = document.getElementById('arena-gauntlets');
    if (gauntletEl) {
        const gauntlets = getAvailableGauntlets();
        if (!gauntlets.length) {
            gauntletEl.innerHTML = '<p class="arena-empty">No gauntlets available yet. Earn 25 fame to unlock the Bronze Gauntlet.</p>';
        } else {
            gauntletEl.innerHTML = gauntlets.map(g => {
                const maxGold = g.goldPerWave * g.waves;
                const maxFame = g.famePerWave * g.waves;
                return `<div class="arena-bout-row arena-gauntlet-row" onclick="selectGauntlet('${escHtml(g.id)}')">

                        <span class="arena-bout-stars">${'⚔'.repeat(Math.min(4, Math.ceil(g.waves / 2)))}</span>
                        <div class="arena-bout-names">
                            <span class="arena-bout-name">${escHtml(g.name)}</span>

                        <span class="arena-bout-fame">+${maxFame} fame</span>
                        <span class="arena-bout-odds">3× bet</span>

                    <button class="arena-fight-btn" onclick="event.stopPropagation(); selectGauntlet('${escHtml(g.id)}')">Enter</button>
                </div>`;
            }).join('');

    }

    // Hide bet section until something is selected
    const betSection = document.getElementById('arena-bet-section');
    if (betSection && !_pendingArenaBout) betSection.style.display = 'none';
}

// Gauntlet selection — reuses the bet UI, then starts the gauntlet.
function selectGauntlet(gauntletId) {
    const g = GAUNTLET_TIERS.find(t => t.id === gauntletId);
    if (!g) return;
    _pendingArenaBout = { isGauntlet: true, gauntletId, name: g.name, data: g };

    const nameEl = document.getElementById('arena-selected-name');
    const rewardEl = document.getElementById('arena-selected-reward');
    const flavorEl = document.getElementById('arena-crowd-flavor');
    const betSection = document.getElementById('arena-bet-section');
    if (nameEl) nameEl.textContent = `${g.name} (${g.waves} waves)`;
    if (rewardEl) rewardEl.innerHTML = `Survive all ${g.waves} waves for the full reward. <strong>You keep banked gold and fame even if you fall.</strong> Heal partially between waves.`;
    if (flavorEl) flavorEl.textContent = g.flavor;
    if (betSection) betSection.style.display = 'block';
}

function selectArenaBout(idOrIdx, type) {
    const p = gameState.player;
    let bout;

    if (type === 'champion') {
        const champ = ARENA_CHAMPIONS.find(c => c.id === idOrIdx);
        if (!champ) return;
        const goldReward = champ.goldBase + Math.floor((gameState.bestFloor || 0) / 10) * 5;
        bout = { type: 'champion', data: champ, goldReward, fameReward: champ.fameBase, odds: oddsFor(champ.label) };
    } else {
        const idx = parseInt(idOrIdx);
        const capture = (gameState.capturedCreatures || [])[idx];
        if (!capture) return;
        bout = { type: 'capture', data: capture, idx, goldReward: capture.goldBase, fameReward: capture.fameBase, odds: oddsFor('Captured') };
    }

    _pendingArenaBout = bout;

    const betSection = document.getElementById('arena-bet-section');
    if (!betSection) return;
    betSection.style.display = 'flex';

    const nameEl = document.getElementById('arena-selected-name');
    if (nameEl) nameEl.textContent = bout.data.name;

    const rewardEl = document.getElementById('arena-selected-reward');
    if (rewardEl) {
        const bonusPct = Math.round((getFameOddsBonus() - 1) * 100);
        const bonusNote = bonusPct > 0 ? ` (incl. +${bonusPct}% fame bonus)` : '';
        rewardEl.textContent = `+${bout.goldReward}g · +${bout.fameReward} fame · ${bout.odds}× bet payout on win${bonusNote}`;
    }

    const betInput = document.getElementById('arena-bet-input');
    if (betInput) {
        betInput.max = Math.min(p.gold, 500);
        betInput.value = 0;
    }

    const crowdEl = document.getElementById('arena-crowd-flavor');
    if (crowdEl) {
        crowdEl.textContent = CROWD_LINES[Math.floor(Math.random() * CROWD_LINES.length)];
    }

    // Scroll bet section into view
    betSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function confirmArenaBout() {
    if (!_pendingArenaBout) return;
    const p = gameState.player;
    const betInput = document.getElementById('arena-bet-input');
    const ironmanCheck = document.getElementById('arena-ironman-check');
    const rawBet = parseInt(betInput?.value || '0') || 0;
    const bet = Math.max(0, Math.min(rawBet, p.gold, 500));
    const ironman = ironmanCheck?.checked || false;

    if (bet > p.gold) {
        addMessage('Not enough gold for that bet.');
        return;
    }
    if (ironman && !confirm('Ironman Pit: a loss ends your current run permanently. Are you certain?')) return;

    const bout = _pendingArenaBout;
    closeArena();
    // Gauntlet vs single bout
    if (bout.isGauntlet) {
        startGauntlet(bout.gauntletId, bet);
    } else {
        startArenaBout(bout, bet, ironman);
    }
}


// ── Bout Lifecycle ────────────────────────────────────────────────────────────

function generateArenaFloor() {
    // Flat open pit: 13 wide × 8 tall interior, surrounded by walls.
    // Centered on the map so the canvas shows it cleanly without edge-hugging.
    const grid = Array.from({ length: MAP_HEIGHT }, () => Array(MAP_WIDTH).fill(1));
    for (let y = 5; y <= 12; y++)
        for (let x = 6; x <= 18; x++)
            grid[y][x] = 0;
    return grid;
}

function startArenaBout(bout, bet, ironman) {
    const p = gameState.player;

    // Persist everything we need to restore after the bout
    gameState.arenaBoutData = {
        bet,
        ironman,
        bout,
        odds: bout.odds,
        goldReward: bout.goldReward,
        fameReward: bout.fameReward,
        savedDungeon: gameState.dungeon,
        savedInCourtyard: gameState.inCourtyard,
        savedPlayerX: p.x,
        savedPlayerY: p.y,
        savedHp: p.hp,
    };

    // Deduct bet immediately (returned + winnings on win; forfeit on loss)
    if (bet > 0) p.gold = Math.max(0, p.gold - bet);

    // Swap to arena floor
    gameState.dungeon = generateArenaFloor();
    gameState.enemies = [];
    gameState.items = [];
    gameState.traps = [];
    gameState.interactables = [];
    gameState.effects = [];
    gameState.allies = [];
    gameState.decoy = null;
    gameState.inCourtyard = false;
    gameState.inArenaBout = true;
    gameState.arenaIronman = ironman;

    initRevealedGrid();
    revealAll();

    // Place player at west end, fully healed (fair fight)
    p.x = 7; p.y = 9;
    p.renderX = p.x * TILE_SIZE;
    p.renderY = p.y * TILE_SIZE;
    p.hp = p.maxHp;

    // Build the opponent
    const cd = bout.data;
    let opponentType = cd.type;
    // The 'boss' type doesn't exist in ENEMY_TYPES as a standalone —
    // use 'skeleton' as a heavy-hitting proxy for boss-tier champions
    if (opponentType === 'boss') opponentType = 'skeleton';

    const opponent = new Enemy(17, 9, opponentType);
    opponent.name = cd.name;

    if (bout.type === 'captured') {
        // Use the exact stats the creature had when captured
        opponent.hp = cd.hp;
        opponent.maxHp = cd.maxHp;
        opponent.atk = cd.atk;
        opponent.def = cd.def;
        opponent.color = cd.color;
    } else {
        // Champion: scale to be a meaningful challenge at the player's level
        const scale = Math.max(1, Math.floor(p.level * 0.8));
        opponent.hp = Math.ceil(opponent.hp * (1 + scale * 0.12));
        opponent.maxHp = opponent.hp;
        opponent.atk = Math.ceil(opponent.atk * (1 + scale * 0.08));
        // Boss-tier champion: extra stat boost and scary color
        if (bout.data.label === 'Boss') {
            opponent.hp = Math.ceil(opponent.hp * 1.5);
            opponent.maxHp = opponent.hp;
            opponent.atk = Math.ceil(opponent.atk * 1.3);
            opponent.color = '#ff4444';
        }
    }
    opponent.tookNoDamage = true;
    gameState.enemies.push(opponent);

    // Consume captured creature slot now that the bout has started
    if (bout.type === 'capture') {
        gameState.capturedCreatures.splice(bout.idx, 1);
    }

    refreshEnemyIntents();
    sfxBossEncounter();
    addMessage(`The iron gate slams shut. ${opponent.name} faces you across the Pit!`);
    if (bet > 0) addMessage(`${bet}g bet placed. The crowd adjusts their odds.`);
    showEventCard('PIT FIGHT', opponent.name, 'boss');
    updateUI();
}

function resolveArenaBout(won) {
    if (!gameState.arenaBoutData) return;

    // Destructure everything before we null the state
    const {
        bet, ironman, odds, goldReward, fameReward,
        savedDungeon, savedInCourtyard, savedPlayerX, savedPlayerY, savedHp
    } = gameState.arenaBoutData;
    const p = gameState.player;

    // Restore world
    gameState.dungeon = savedDungeon;
    gameState.inCourtyard = savedInCourtyard;
    gameState.inArenaBout = false;
    gameState.arenaIronman = false;
    gameState.arenaBoutData = null;
    gameState.enemies = [];
    gameState.items = [];
    gameState.effects = [];
    gameState.traps = [];
    gameState.allies = [];

    // Restore player position and HP
    p.x = savedPlayerX;
    p.y = savedPlayerY;
    p.renderX = p.x * TILE_SIZE;
    p.renderY = p.y * TILE_SIZE;

    initRevealedGrid();
    revealAll();
    refreshEnemyIntents();

    gameMeta.arenaBouts = (gameMeta.arenaBouts || 0) + 1;

    if (won) {
        const betWinnings = bet > 0 ? Math.floor(bet * odds) : 0;
        const totalGold = goldReward + betWinnings;
        p.gold += totalGold;
        p.hp = Math.min(p.maxHp, Math.max(p.hp, Math.ceil(savedHp * 0.5))); // restore to at least half pre-bout HP
        trackGoldPickup(totalGold);
        gainArenaFame(fameReward);
        saveMetaProgress();

        addFloatingText(p.x, p.y, `+${totalGold}g`, '#ffd65a');
        addFloatingText(p.x, p.y, `+${fameReward} fame`, '#c98bff', { offsetY: -18 });
        addMessage(`Victory! The crowd erupts. You earn ${goldReward}g${betWinnings > 0 ? ` + ${betWinnings}g from your bet` : ''}.`);
        showEventCard('PIT VICTORY', `+${fameReward} Fame`, 'milestone');
        sfxLevelUp();
        addCombatShake(20);
        triggerScreenFlash('kill');
    } else {
        // Non-ironman: survive at 1 HP, lose the bet (already deducted)
        p.hp = 1;
        saveMetaProgress();

        addMessage('Defeat. You are dragged from the Pit, bloodied but breathing.');
        if (bet > 0) addMessage(`Your ${bet}g wager is forfeit.`);
        showEventCard('DEFEATED', 'Dragged from the Pit', 'boss');
        sfxDeath();
    }

    updateUI();
}

// Called when player presses ESC during a bout — forfeits the bet, no death.
// For a gauntlet, surrendering banks the rewards earned so far (quit while ahead).
function forfeitArenaBout() {
    if (!gameState.inArenaBout || !gameState.arenaBoutData) return;
    if (gameState.arenaBoutData.isGauntlet) {
        const banked = gameState.arenaBoutData.bankedGold;
        addMessage(`You raise a hand and step back. The gauntlet ends — you walk away with ${banked}g banked.`);
        _resolveGauntlet(true); // treat surrender as a "win" so banked rewards pay out cleanly
        return;
    }
    addMessage('You signal surrender and are dragged from the Pit. Your bet is forfeit.');
    resolveArenaBout(false);
}


// ── Arena Gauntlet ───────────────────────────────────────────────────────────
// A multi-wave endurance challenge: fight escalating opponents back-to-back
// with only partial healing between rounds. Rewards bank per wave cleared,
// and you keep them even on defeat — quit-while-ahead tension. Unlocks by season.
const GAUNTLET_TIERS = [
    {
        id: 'bronze_gauntlet', name: 'Bronze Gauntlet', season: 'bronze', fameReq: 25,
        waves: 3, pool: ['goblin', 'slime', 'skeleton', 'archer'],
        goldPerWave: 25, famePerWave: 12, healBetween: 0.5,
        flavor: 'Three foes, one after another. Survive them all.',
    },
    {
        id: 'silver_gauntlet', name: 'Silver Gauntlet', season: 'silver', fameReq: 100,
        waves: 5, pool: ['skeleton', 'archer', 'spider', 'bat', 'cultist', 'brute'],
        goldPerWave: 45, famePerWave: 22, healBetween: 0.4,
        flavor: 'Five challengers. The crowd wants a show of endurance.',
    },
    {
        id: 'gold_gauntlet', name: 'Gold Gauntlet', season: 'gold', fameReq: 250,
        waves: 5, pool: ['brute', 'warden', 'thief', 'cultist', 'imp', 'ghoul'],
        goldPerWave: 80, famePerWave: 40, healBetween: 0.35,
        flavor: 'The deep-floor horrors, brought up to the sand. Five of them.',
    },
    {
        id: 'champion_gauntlet', name: 'Champion Gauntlet', season: 'champion', fameReq: 450,
        waves: 7, pool: ['warden', 'orc', 'darkknight', 'ghoul', 'lizardman', 'demon'],
        goldPerWave: 150, famePerWave: 75, healBetween: 0.3,
        flavor: 'Seven. No mercy. Only the Undying walk out of this one.',
    },
];

function getAvailableGauntlets() {
    const fame = getArenaFame();
    const season = getArenaSeason();
    const seasonIds = ARENA_SEASONS.map(s => s.id);
    const currentIdx = seasonIds.indexOf(season.id);
    const visibleSeasons = new Set(seasonIds.slice(0, currentIdx + 1));
    return GAUNTLET_TIERS.filter(g => fame >= g.fameReq && visibleSeasons.has(g.season));
}

function startGauntlet(gauntletId, bet) {
    const g = GAUNTLET_TIERS.find(t => t.id === gauntletId);
    if (!g || !gameState.player) return;
    const p = gameState.player;

    gameState.arenaBoutData = {
        bet: bet || 0, ironman: false,
        isGauntlet: true,
        gauntlet: g,
        currentWave: 0,
        bankedGold: 0,
        bankedFame: 0,
        odds: 3.0,
        savedDungeon: gameState.dungeon,
        savedInCourtyard: gameState.inCourtyard,
        savedPlayerX: p.x,
        savedPlayerY: p.y,
        savedHp: p.hp,
    };

    if (bet > 0) p.gold = Math.max(0, p.gold - bet);

    gameState.dungeon = generateArenaFloor();
    gameState.enemies = [];
    gameState.items = [];
    gameState.traps = [];
    gameState.interactables = [];
    gameState.effects = [];
    gameState.allies = [];
    gameState.decoy = null;
    gameState.inCourtyard = false;
    gameState.inArenaBout = true;
    gameState.arenaIronman = false;

    initRevealedGrid();
    revealAll();

    p.x = 7; p.y = 9;
    p.renderX = p.x * TILE_SIZE;
    p.renderY = p.y * TILE_SIZE;
    p.hp = p.maxHp;

    _spawnGauntletWave();
    sfxBossEncounter();
    addMessage(`${g.name}: ${g.flavor}`);
    showEventCard('GAUNTLET', `Wave 1 of ${g.waves}`, 'boss');
    updateUI();
}

function _spawnGauntletWave() {
    const data = gameState.arenaBoutData;
    if (!data || !data.isGauntlet) return;
    const g = data.gauntlet;
    const p = gameState.player;
    data.currentWave++;

    // Later waves pull from the harder end of the pool
    const poolIdx = Math.min(g.pool.length - 1,
        Math.floor((data.currentWave / g.waves) * g.pool.length));
    const type = g.pool[Math.min(poolIdx + Math.floor(rng() * 2), g.pool.length - 1)];

    const opponent = new Enemy(17, 9, type);
    const scale = Math.max(1, Math.floor(p.level * 0.7)) + data.currentWave;
    opponent.hp = Math.ceil(opponent.hp * (1 + scale * 0.10));
    opponent.maxHp = opponent.hp;
    opponent.atk = Math.ceil(opponent.atk * (1 + scale * 0.06));
    opponent.tookNoDamage = true;
    opponent._gauntletWave = data.currentWave;
    gameState.enemies.push(opponent);
    refreshEnemyIntents();

    addMessage(`Wave ${data.currentWave} of ${g.waves}: ${capitalize(opponent.name)} enters the Pit!`);
    if (data.currentWave > 1) {
        showEventCard('NEXT WAVE', `Wave ${data.currentWave} of ${g.waves}`, 'milestone');
    }
}

// Called from defeatEnemy when an arena enemy dies. Returns true if the
// gauntlet handled the kill (spawned next wave or finished), false otherwise.
function handleGauntletKill(enemy) {
    const data = gameState.arenaBoutData;
    if (!data || !data.isGauntlet) return false;

    const g = data.gauntlet;
    const p = gameState.player;

    data.bankedGold += g.goldPerWave;
    data.bankedFame += g.famePerWave;

    spawnDeathAnim(enemy);
    gameState.enemies = gameState.enemies.filter(e => e !== enemy);

    if (data.currentWave >= g.waves) {
        _resolveGauntlet(true);
        return true;
    }

    const healAmount = Math.ceil(p.maxHp * g.healBetween);
    p.hp = Math.min(p.maxHp, p.hp + healAmount);
    addFloatingText(p.x, p.y, `+${healAmount}`, '#58c26d');
    addMessage(`Wave cleared! You recover ${healAmount} HP. Banked: ${data.bankedGold}g, ${data.bankedFame} fame.`);
    sfxLevelUp();
    _spawnGauntletWave();
    updateUI();
    return true;
}

function _resolveGauntlet(won) {
    const data = gameState.arenaBoutData;
    if (!data) return;
    const g = data.gauntlet;
    const p = gameState.player;
    const {
        bet, bankedGold, bankedFame, currentWave,
        savedDungeon, savedInCourtyard, savedPlayerX, savedPlayerY, savedHp
    } = data;

    gameState.dungeon = savedDungeon;
    gameState.inCourtyard = savedInCourtyard;
    gameState.inArenaBout = false;
    gameState.arenaIronman = false;
    gameState.arenaBoutData = null;
    gameState.enemies = [];
    gameState.items = [];
    gameState.effects = [];
    gameState.traps = [];
    gameState.allies = [];

    p.x = savedPlayerX; p.y = savedPlayerY;
    p.renderX = p.x * TILE_SIZE;
    p.renderY = p.y * TILE_SIZE;

    initRevealedGrid();
    revealAll();
    refreshEnemyIntents();
    gameMeta.arenaBouts = (gameMeta.arenaBouts || 0) + 1;

    if (won) {
        const fullClear = currentWave >= g.waves;
        const completionBonus = fullClear ? Math.floor(bankedGold * 0.5) : 0;
        const betWinnings = (fullClear && bet > 0) ? Math.floor(bet * 3.0) : 0;
        const totalGold = bankedGold + completionBonus + betWinnings;
        p.gold += totalGold;

        addMessage(`Defeated on wave ${currentWave}. You keep your banked ${bankedGold}g and ${bankedFame} fame — but the full gauntlet eluded you.`);

// screen-shake hook above, just for crit/kill flashes instead of shake.
// Tracks its own active-flag/timer per kind (separate from shake's) so a

// other's removal timeout early.
function triggerScreenFlash(kind) {
    if (typeof gameSettings !== 'undefined' && gameSettings.reduceMotion) return;
    const cls = kind === 'kill' ? 'kill-flash' : 'crit-flash';
    const flagKey = `_${cls}Active`;
    const timerKey = `_${cls}Timer`;
    if (gameState[flagKey]) return;
    gameState[flagKey] = true;
    const wrap = document.getElementById('canvas-wrap');
    if (!wrap) { gameState[flagKey] = false; return; }
    wrap.classList.remove(cls);
    void wrap.offsetWidth;
    wrap.classList.add(cls);
    clearTimeout(gameState[timerKey]);

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Previously enemies snapped instantly to their new tile on every
    // move with zero interpolation, which read as a teleport rather
    // than a step.

        if (enemy.renderX === undefined) { enemy.renderX = enemy.x * TILE_SIZE; enemy.renderY = enemy.y * TILE_SIZE; }

    const shakeY = shake > 0.5 ? Math.sin(gameState.screenShakeAngle) * shake : 0;

        if (inTavernInterior) drawNoticeBoard();
        if (inTavernInterior) drawBard();
        if (inTavernInterior) drawStashChest();

        if (inTavernInterior) drawCellar();

        ctx.restore();

    // impact, so the screen should keep visibly rattling through the
    // freeze rather than also pausing.
    gameState.screenShakeAngle += 2.4;
    gameState.screenShake *= 0.82;
    if (gameState.screenShake < 0.5) gameState.screenShake = 0;

    // Hit-stop: pause the animation-tick clock for a few frames after a
    // high-impact hit (see triggerHitStop in combat.js) so the impact

    // instead of decaying away in a single ~16ms tick. Game logic is
    // never affected by this; combat math has already fully resolved

    // drives idle bob/torch flicker/every other ambient sine motion, so
    // freezing it (along with the hit-reaction decay below) is what
    // makes the whole scene visibly hold rather than just the hit flash.
    if (gameState.hitStopFrames > 0) {

        return;

    }
    if (gameState.player?.attackAnim?.life > 0) gameState.player.attackAnim.life--;
    if (gameState.player?.lungeAnim?.life > 0) gameState.player.lungeAnim.life--;
    gameState.frameTick++;

// Deterministic per-tile pseudo-noise (stable across frames, no per-frame randomness)
function _fogNoise(x, y) {
    const h = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return h - Math.floor(h); // 0..1

function _getFloorTexture(x, y) {
    // Mortar/grout base fills the full tile, then four flagstone slabs
    // are drawn inset on top — the gaps between slabs become the visible
    // seams, same trick as the brick wall above.
    const floorKey = `floor:${gameState.floor}:${x}:${y}`;
    return _getTileTextureCanvas(floorKey, offCtx => {
        offCtx.fillStyle = '#0e0d0c';
        offCtx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);

        const half = TILE_SIZE / 2;
        const seam = 2;
        for (let row = 0; row < 2; row++) {
            for (let col = 0; col < 2; col++) {
                const seed = _fogNoise(x * 2.9 + col * 5.1, y * 3.7 + row * 6.3 + gameState.floor);
                const base = 22 + Math.floor(seed * 16);
                offCtx.fillStyle = `rgb(${base}, ${base - 2}, ${base - 5})`;
                offCtx.fillRect(col * half + seam / 2, row * half + seam / 2, half - seam, half - seam);

                if (seed > 0.5) {
                    offCtx.fillStyle = 'rgba(255, 255, 255, 0.025)';
                    offCtx.fillRect(col * half + 4, row * half + 4, half * 0.4, half * 0.3);

function drawFloorTexture(x, y, tile) {
    const tx = x * TILE_SIZE;
    const ty = y * TILE_SIZE;
    const n = _fogNoise(x * 3.7 + gameState.floor * 11, y * 5.1);
    const n2 = _fogNoise(x * 1.3 + 4, y * 2.7 + 17);

    if (gameState.floor === 0 && gameState.inCourtyard) {
        const dirt = (x + y) % 3 === 0 ? '#3a3322' : '#332d1f';
        ctx.fillStyle = dirt;
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        if (n2 > 0.6) {
            ctx.fillStyle = 'rgba(120, 140, 70, 0.1)'; // sparse patches of grass
            ctx.fillRect(tx + 4 + n * 8, ty + 8, 10, 4);

    if (gameState.floor === 0 && !gameState.inArenaBout) {
        const plank = (x + y) % 2 === 0 ? '#3b2a1e' : '#342518';
        ctx.fillStyle = y === 4 && x >= 8 && x <= 16 ? TILE_COLORS.bar : plank;
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        ctx.strokeStyle = 'rgba(0,0,0,0.18)';
        ctx.beginPath();
        ctx.moveTo(tx, ty + TILE_SIZE - 1);
        ctx.lineTo(tx + TILE_SIZE, ty + TILE_SIZE - 1);

        if (n2 > 0.65) {
            ctx.fillStyle = 'rgba(255,220,160,0.04)';
            ctx.fillRect(tx + 6, ty + 10, 18, 3);
        }
        return;
    }

    // Arena bout — a sandy fighting pit, visually distinct from both the
    // tavern's wooden planks and the dungeon's cold stone. Warm packed sand
    // with scattered darker grit, so the bout reads as its own arena space.
    if (gameState.floor === 0 && gameState.inArenaBout) {
        const sand = (x + y) % 2 === 0 ? '#6b5836' : '#5f4e30';
        ctx.fillStyle = sand;
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        // Scattered grit / scuff marks
        if (n2 > 0.5) {
            ctx.fillStyle = `rgba(40, 30, 18, ${0.18 + n * 0.12})`;
            ctx.fillRect(tx + 5 + n * 12, ty + 7 + n2 * 8, 9, 4);
        }
        if (n > 0.7) {
            ctx.fillStyle = 'rgba(120, 90, 50, 0.15)'; // lighter sand drift
            ctx.fillRect(tx + 3, ty + 20, 14, 3);
        }
        // Faint blood-stain hints near the center rows — it IS a fighting pit
        if (y >= 8 && y <= 9 && n2 > 0.72) {
            ctx.fillStyle = 'rgba(120, 30, 25, 0.12)';
            ctx.fillRect(tx + 8, ty + 12, 16, 8);
        }
        return;
    }

    if (tile === 3) {
        ctx.fillStyle = '#2a1818';
        ctx.fillRect(tx, ty, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = `rgba(180, 40, 40, ${0.12 + n * 0.08})`;
        ctx.fillRect(tx + 2, ty + 2, TILE_SIZE - 4, TILE_SIZE - 4);

        ctx.fillStyle = `rgba(0, 0, 0, ${0.08 + n2 * 0.05})`;
        ctx.fillRect(tx + 3 + n * 10, ty + 6, 14, 2);
    }
