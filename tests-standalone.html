function showLevelChoices() {
    const panel = document.getElementById('levelup-panel');
    const options = document.getElementById('levelup-options');
    const levelEl = document.getElementById('levelup-level-num');
    if (!panel || !options) return;

    if (levelEl) levelEl.textContent = gameState.player.level;
    showEventCard('LEVEL UP!', `Level ${gameState.player.level}`, 'milestone');

    // Canvas impact — the modal CSS (pop animation, gold glow, spinning rays)
    // is already strong; these make the game world itself react at the moment
    // the modal appears, not just the overlay.
    if (gameState.player) {
        const p = gameState.player;
        addFloatingText(p.x, p.y, 'LEVEL UP!', '#ffd65a', { style: 'crit-banner', offsetY: -22 });
        addBurst(p.x, p.y, '#ffd65a');
        // Secondary bursts in cardinal directions — the "ripple" feel
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx, dy]) => {
            addBurst(p.x + dx, p.y + dy, '#ffd65a');
        });
        addCombatShake(18);
        triggerHitStop(10);
        triggerScreenFlash('crit');
    }

    const allChoices = [
        { icon: '\u2694', label: '+3 Attack', desc: 'Strike harder', apply: () => { gameState.player.baseAtk += 3; recalculateStats(); } },
        { icon: '\u2764', label: '+15 Max HP', desc: 'Fortify your body', apply: () => { gameState.player.maxHp += 15; gameState.player.hp = gameState.player.maxHp; } },
        { icon: '\u26E1', label: '+2 Defense', desc: 'Turn aside blows', apply: () => { gameState.player.baseDef += 2; recalculateStats(); } },
        { icon: '\u26A1', label: '+5% Crit Chance', desc: 'Find their weak points', apply: () => { gameState.player.levelCritBonus += 5; recalculateStats(); } },
        { icon: '\u2726', label: '+3% Lifesteal', desc: 'Drain life from foes', apply: () => { gameState.player.levelLifestealBonus += 3; recalculateStats(); } }
    ];
    if (gameState.player.maxMana > 0) {
        allChoices.push({ icon: '\u2728', label: '+6 Max Mana', desc: 'Expand your arcane well', apply: () => { gameState.player.maxMana += 6; gameState.player.mana = gameState.player.maxMana; } });
    }

    const choices = shuffle(allChoices).slice(0, 3);

    options.innerHTML = '';
    choices.forEach(choice => {
        const button = document.createElement('button');
        button.className = 'levelup-choice-btn';
        button.innerHTML = `
            <span class="levelup-choice-icon">${choice.icon}</span>
            <span class="levelup-choice-info">
                <span class="levelup-choice-label">${choice.label}</span>
                <span class="levelup-choice-desc">${choice.desc}</span>
            </span>
        `;
        button.addEventListener('click', () => {
            choice.apply();
            addFloatingText(gameState.player.x, gameState.player.y, 'LEVEL UP!', '#ffd65a', { style: 'crit-banner' });
            addMessage(`Training complete: ${choice.label}.`);
            if (gameState.pendingLevelChoices > 0) {
                gameState.pendingLevelChoices--;
                showLevelChoices();
            } else {
                gameState.awaitingLevelChoice = false;
                panel.style.display = 'none';
            }
            updateUI();
        });
        options.appendChild(button);
    });
    panel.style.display = 'flex';
    updateUI();
}


function shuffle(array) {
    const copy = [...array];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}


function renderRunEndScreen({ title, epitaph, isVictory = false, isNewBest = false, dailyResult = null }) {
    const goTitle = document.getElementById('game-over-title');
    if (goTitle) goTitle.textContent = title;

    const bestEl = document.getElementById('game-over-best');
    if (bestEl) {
        if (isVictory) {
            bestEl.textContent = '\u2726 The Dungeon of Ash is yours!';
            bestEl.classList.remove('game-over-new-best');
        } else if (isNewBest) {
            bestEl.textContent = '\u2726 New Record!';
            bestEl.classList.add('game-over-new-best');
        } else {
            bestEl.textContent = gameState.bestFloor > 0 ? `Best run: Floor ${gameState.bestFloor}` : '';
            bestEl.classList.remove('game-over-new-best');
        }
    }

    const goEl = document.getElementById('game-over');
    if (goEl) goEl.classList.toggle('game-over-new-best-glow', isNewBest || isVictory);

    const rs = gameState.runStats || createRunStats();
    const p = gameState.player;
    const floorReached = isVictory ? MAX_DUNGEON_FLOOR : gameState.floor;
    const summaryEl = document.getElementById('game-over-summary');
    if (summaryEl) {
        summaryEl.className = 'game-over-summary go-summary-wide';
        summaryEl.innerHTML = `
            <div class="go-stat"><small>Floor Reached</small><span>${floorReached}</span></div>
            <div class="go-stat"><small>Enemies Slain</small><span>${rs.enemiesSlain}</span></div>
            <div class="go-stat"><small>Bosses Defeated</small><span>${rs.bossesDefeated}</span></div>
            <div class="go-stat"><small>Gold Earned</small><span>${rs.goldEarned}</span></div>
            <div class="go-stat"><small>Legendary Items</small><span>${rs.legendaryFound}</span></div>
            <div class="go-stat"><small>Level</small><span>${p?.level || 1}</span></div>
        `;
    }

    const achEl = document.getElementById('game-over-achievements');
    if (achEl) {
        const unlocked = gameState.runAchievementsUnlocked || [];
        if (unlocked.length) {
            achEl.style.display = 'block';
            achEl.innerHTML = `<h4>Achievements This Run</h4>${unlocked.map(id => {
                const def = ACHIEVEMENT_DEFS.find(a => a.id === id);
                return def ? `<div class="go-achievement-unlock">\u2726 ${escHtml(def.name)}</div>` : '';
            }).join('')}`;
        } else {
            achEl.style.display = 'none';
            achEl.innerHTML = '';
        }
    }

    const epitaphEl = document.getElementById('game-over-epitaph');
    if (epitaphEl) epitaphEl.textContent = epitaph;

    const seedEl = document.getElementById('game-over-seed');
    if (seedEl) {
        if (gameState.runSeed) {
            seedEl.style.display = 'block';
            seedEl.innerHTML = `Seed: <span id="gameover-seed-code">${seedToCode(gameState.runSeed)}</span> <button class="cs-seed-copy-btn" onclick="copySeedCode()" title="Copy seed code">Copy</button>`;
        } else {
            seedEl.style.display = 'none';
        }
    }

    // "One more run" hook line — the most retention-critical moment in the
    // game. Frames how the run measured up so the player wants to go again.
    const hookEl = document.getElementById('game-over-hook');
    if (hookEl) {
        let hook = '';
        if (dailyResult) {
            // Daily-specific framing takes priority
            if (dailyResult.won) hook = '\u2728 You conquered today\u2019s Daily Challenge!';
            else if (dailyResult.isDailyBest) hook = `\u2728 New personal best for today\u2019s Daily: Floor ${dailyResult.floor}!`;
            else {
                const rec = getDailyRecord(gameState.dailyKey);
                hook = rec ? `Today\u2019s Daily best: Floor ${rec.floor}. Tomorrow brings a new dungeon.`
                           : `You took on today\u2019s Daily Challenge.`;
            }
        } else if (!isVictory && !isNewBest && gameState.bestFloor > 0) {
            const gap = gameState.bestFloor - gameState.floor;
            if (gap > 0 && gap <= 3) hook = `So close \u2014 just ${gap} floor${gap === 1 ? '' : 's'} from your record. One more?`;
            else if (gap > 3) hook = `Your record stands at Floor ${gameState.bestFloor}. Can you go deeper?`;
        } else if (isNewBest) {
            hook = 'You went deeper than ever before. How much further can you push?';
        }
        if (hook) {
            hookEl.style.display = 'block';
            hookEl.textContent = hook;
        } else {
            hookEl.style.display = 'none';
        }
    }

    // The "Descend Again" button reloads into a fresh run. For a daily run we
    // relabel it so the player knows a normal reload won't re-give the daily.
    const againBtn = document.getElementById('game-over-again-btn');
    if (againBtn) {
        againBtn.textContent = dailyResult ? 'Return to Tavern' : 'Descend Again';
    }

    document.getElementById('game-over').style.display = 'block';
}


function showVictory() {
    gameState.gameOver = true;
    clearActiveRun();
    gameMeta.runs++;
    saveMetaProgress();
    checkAchievements({ bestFloor: MAX_DUNGEON_FLOOR });
    if (typeof earnRenown === 'function') earnRenown(MAX_DUNGEON_FLOOR + 25, 'completing the dungeon');
    sfxLevelUp();
    showEventCard('VICTORY!', 'The Fallen God is defeated!', 'milestone');
    addMessage(`You have conquered ${DUNGEON_NAME} and broken the ash-curse!`);
    let dailyResult = null;
    if (gameState.isDailyRun && gameState.dailyKey) {
        const p = gameState.player;
        const isDailyBest = recordDailyResult(gameState.dailyKey, MAX_DUNGEON_FLOOR, true, p?.className, p?.subclass);
        dailyResult = { isDailyBest, floor: MAX_DUNGEON_FLOOR, won: true };
    }
    renderRunEndScreen({
        title: 'VICTORY!',
        epitaph: 'The ash settles. Legends will speak your name.',
        isVictory: true,
        dailyResult,
    });
    updateUI();
}


function showGameOver() {
    // Arena non-ironman loss: player survives the bout but doesn't die.
    // Ironman arena bouts fall through to the real death path below.
    if (gameState.inArenaBout && !gameState.arenaIronman) {
        // Gauntlet losses keep banked rewards via the gauntlet resolver.
        if (gameState.arenaBoutData && gameState.arenaBoutData.isGauntlet) {
            _resolveGauntlet(false);
        } else {
            resolveArenaBout(false);
        }
        return;
    }

    // Guard against double-firing: enemyTurn() iterates enemies with
    // .forEach, and `return` inside that callback only skips to the next
    // enemy rather than stopping the loop. If a second enemy later in the
    // array also deals lethal damage on the same turn, it would otherwise
    // call showGameOver() again and double-increment gameMeta.runs/deaths,
    // double-save meta progress, and re-render the run-end screen.
    if (gameState.gameOver) return;
    if (tryBerserkerDeathSave()) return;
    if (tryRelicLethalSave()) return;
    gameState.gameOver = true;
    gameState.activeBrew = null;
    gameState.activeSong = null;
    _stopBardLoop();
    clearActiveRun();
    gameMeta.runs++;
    gameMeta.deaths++;
    gameMeta.totalGold += (gameState.player ? gameState.player.gold : 0);
    saveMetaProgress();
    if (gameState.activeQuest && !gameState.activeQuest.completed) {
        gameState.activeQuest.failed = true;
    }
    sfxDeath();
    // Show the post-death onboarding hint once, so new players understand what
    // carries forward (bank gold, fame, renown, stash) vs what they lost.
    if (gameMeta.deaths <= 3) showFirstTimeHint('postDeath');
    const priorBest = gameState.bestFloor || 0;
    saveBestFloor(gameState.floor);
    const isNewBest = gameState.floor > priorBest;
    checkAchievements({ bestFloor: gameState.bestFloor });
    // Earn Renown for floors descended this run
    if (gameState.floor > 0 && typeof earnRenown === 'function') {
        earnRenown(gameState.floor, 'floors descended');
    }
    // Record to The Fallen — builds the persistent graveyard on the title screen
    if (typeof recordFallen === 'function' && gameState.player) {
        const lastEnemy = gameState.enemies && gameState.enemies.find(e => e.hp <= 0);
        const killedBy = lastEnemy
            ? `${lastEnemy.name || lastEnemy.type} on Floor ${gameState.floor}`
            : gameState.floor > 0 ? `the depths of Floor ${gameState.floor}` : 'the darkness';
        recordFallen(gameState.player, gameState.floor, killedBy);
    }

    // Record the daily result if this was a Daily Challenge run, so the death
    // screen can show whether it beat the player's best for today.
    let dailyResult = null;
    if (gameState.isDailyRun && gameState.dailyKey) {
        const p = gameState.player;
        const isDailyBest = recordDailyResult(gameState.dailyKey, gameState.floor, false, p?.className, p?.subclass);
        dailyResult = { isDailyBest, floor: gameState.floor };
    }

    renderRunEndScreen({
        title: 'RUN ENDED',
        epitaph: pickEpitaph(gameState.floor),
        isNewBest,
        dailyResult,
    });
    updateUI();
}


function pickEpitaph(floor) {
    if (floor <= 0) return GAME_OVER_EPITAPHS[0];
    return GAME_OVER_EPITAPHS[floor % GAME_OVER_EPITAPHS.length];
}


function addMessageAndUpdate(message) {
    addMessage(message);
    updateUI();
}


function addMessage(message) {
    gameState.messages.push(message);
    gameState.messages = gameState.messages.slice(-60);
    renderMessages();
}


function showEventCard(title, detail, type = 'combat') {
    const container = document.getElementById('event-cards');
    if (!container) return;
    const card = document.createElement('div');
    card.className = `event-card event-${type}`;
    card.innerHTML = `<div class="event-card-title">${escHtml(title)}</div><div class="event-card-detail">${escHtml(detail)}</div>`;
    container.appendChild(card);

let logUnread = 0;

let logUnreadHasDamage = false;


// The log is now always visible (no dropdown to open/close), but we
// still track whether the person has scrolled away from the bottom so
// new-message badges only appear when something might be missed.
function isLogScrolledToBottom() {
    const log = document.getElementById('message-log');
    if (!log) return true;
    return log.scrollHeight - log.scrollTop - log.clientHeight < 24;
}


function clearLogUnread() {
    logUnread = 0;
    logUnreadHasDamage = false;
    const badge = document.getElementById('log-unread-badge');
    if (badge) {
        badge.style.display = 'none';
        badge.textContent = '';
        badge.classList.remove('log-badge-danger');
    }
}


// Classifies a log line into a category for color-coding, purely by
// pattern-matching the rendered text — no call-site changes required
// across the ~150 addMessage() calls throughout the file. Checked in
// priority order: crit > telegraph > poison/burn > generic in/out.
function classifyMessage(message) {
    const m = message.toLowerCase();
    if (/critical!/.test(m)) return 'crit';
    if (/telegraphs|draws its bow|winds up|brace yourself/.test(m)) return 'telegraph';
    if (/poison courses through you|the burn sears you|poisoned!|poisons you|burning \d+ turns?\)/.test(m)) return 'poison';
    if (/falls\.|achievement|level up|begin|begins "/.test(m)) return 'milestone';
    if (/hits you for|bites for|slam connects|reflect.*damage back at you|stunned and cannot move/.test(m) && !/reflect .* damage back at the/.test(m)) return 'damage-in';
    if (/you hit the|backstab lands|scorches the|reflect \d+ damage back at the/.test(m)) return 'damage-out';
    // Checked before 'loot' — "not enough gold to buy" and similar failure
    // phrasing contain loot-ish substrings (e.g. "buy ") that would
    // otherwise misclassify a warning as a successful purchase.
    if (/cursed|fail|not enough|no .* left|no .* in inventory|already at full/.test(m)) return 'warn';
    if (/found \d+ gold|picked up|buy |bought|donate|added\.|swaps in|^sold /.test(m)) return 'loot';
    if (/heal for|heal[s]? you|restored \d+ hp|absorbs some of the blow|antidote|cleared!|drink a health potion/.test(m)) return 'heal';
    if (/bounty|quest/i.test(message)) return 'quest';
    return 'default';
}


function renderMessages() {
    const log = document.getElementById('message-log');
    const wasAtBottom = isLogScrolledToBottom();
    log.innerHTML = '';
    gameState.messages.forEach(message => {
        const entry = document.createElement('div');
        entry.className = `log-entry log-${classifyMessage(message)}`;
        entry.textContent = message;
        log.appendChild(entry);
    });
    if (wasAtBottom) {
        log.scrollTop = log.scrollHeight;
        clearLogUnread();
    } else {
        logUnread++;
        const lastCategory = classifyMessage(gameState.messages[gameState.messages.length - 1] || '');
        if (lastCategory === 'damage-in') logUnreadHasDamage = true;
        const badge = document.getElementById('log-unread-badge');
        if (badge) {
            badge.textContent = logUnread > 9 ? '9+' : logUnread;
            badge.style.display = 'inline-block';
            badge.classList.toggle('log-badge-danger', logUnreadHasDamage);
        }
    }
}


function updateUI() {
    if (!gameState.player) return;

    const player = gameState.player;
    const scDef = player.subclass
        ? (SUBCLASSES[player.className] || []).find(s => s.id === player.subclass)
        : null;
    const heroLabel = [player.name, scDef ? scDef.name : capitalize(player.className)].filter(Boolean).join(' — ');
    document.getElementById('player-class').textContent = heroLabel;
    document.getElementById('player-level').textContent = player.level;
    document.getElementById('player-xp').textContent = `${player.xp}/${getXpToLevel()}`;
    document.getElementById('player-hp').textContent = player.hp;
    document.getElementById('player-max-hp').textContent = player.maxHp;
    document.getElementById('player-mana').textContent = player.mana;
    document.getElementById('player-max-mana').textContent = player.maxMana;
    document.getElementById('player-atk').textContent = player.atk;
    document.getElementById('player-def').textContent = player.def;
    document.getElementById('floor-level').textContent = gameState.floor === 0 ? 'Tavern' : `${gameState.floor}/${MAX_DUNGEON_FLOOR}`;

    const xpPct = Math.max(0, Math.min(100, Math.round((player.xp / getXpToLevel()) * 100)));
    const topLvl = document.getElementById('top-player-level');
    const topXpFill = document.getElementById('top-xp-fill');
    const topXpPct = document.getElementById('top-xp-pct');
    if (topLvl) topLvl.textContent = player.level;
    if (topXpFill) topXpFill.style.width = `${xpPct}%`;
    if (topXpPct) topXpPct.textContent = `${xpPct}%`;
    renderDungeonProgress();

    const manaRow = document.getElementById('mana-row');
    manaRow.style.display = player.maxMana > 0 ? 'flex' : 'none';
    document.getElementById('hp-fill').style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
    document.getElementById('mana-fill').style.width = player.maxMana > 0 ? `${Math.max(0, (player.mana / player.maxMana) * 100)}%` : '0%';
    const xpFill = document.getElementById('xp-fill');
    if (xpFill) xpFill.style.width = `${Math.max(0, Math.min(100, (player.xp / getXpToLevel()) * 100))}%`;

    document.getElementById('ability-text').innerHTML = getAbilityHint();
    renderInventory();
    renderEquipment();
    renderRelicsPanel();
    renderRunSnapshot();
    renderMinimap();
    renderStatusBar();
    const scMeter = document.getElementById('subclass-meter');
    if (scMeter) scMeter.innerHTML = getSubclassMeterHtml();
    renderEnemyIntents();
    renderSideStashSummary();
    renderSideQuestSummary();
    const tavernBtn = document.getElementById('tavern-return-btn');
    if (tavernBtn) tavernBtn.disabled = gameState.floor === 0;
    if (!gameState.gameOver && gameState.floor > 0) saveActiveRun();
}

// Read-only summary of the shared stash, shown in the right column's

// inventory grid; visit the chest in the tavern to actually move items.

// Read-only summary of the active Notice Board bounty, shown in the
// right column's Quests tab.
function renderSideQuestSummary() {
    const el = document.getElementById('side-quest-summary');
    if (!el) return;
    const q = gameState.activeQuest;
    if (!q) {
        el.innerHTML = '<div class="item-empty">No active bounty. Visit the Notice Board in the tavern.</div>';

    }

function renderStatusBar() {
    const bar = document.getElementById('status-bar');
    if (!bar || !gameState.player) return;
    const statuses = gameState.player.statuses;
    const brewBadge = gameState.activeBrew
        ? `<span class="status-badge brew-badge">${gameState.activeBrew.icon} ${gameState.activeBrew.name} (${gameState.activeBrew.duration}fl)</span>`
        : '';
    let questBadge = '';
    if (gameState.activeQuest) {
        const q = gameState.activeQuest;
        if (q.failed) {
            questBadge = `<span class="status-badge quest-badge quest-failed">&#x274C; ${q.label} — Failed</span>`;
        } else if (q.completed) {
            questBadge = `<span class="status-badge quest-badge quest-done">&#x2713; ${q.label} — Done!</span>`;
        } else if (q.type === 'kill_count') {
            questBadge = `<span class="status-badge quest-badge">&#x1F4DC; ${q.label}: ${q.currentAmount}/${q.targetAmount}</span>`;
        } else {
            questBadge = `<span class="status-badge quest-badge">&#x1F4DC; ${q.label}</span>`;
        }
    }
    const songBadge = gameState.activeSong
        ? `<span class="status-badge song-badge">&#9834; ${escHtml(gameState.activeSong.title)}</span>`
        : '';
    const overhealBadge = gameState.player.overheal > 0
        ? `<span class="status-badge" style="--sc:#fff3b0">&#x2728; Overheal +${gameState.player.overheal} (${gameState.player.overhealTurns})</span>`
        : '';
    if (!statuses.length && !brewBadge && !questBadge && !songBadge && !overhealBadge) { bar.innerHTML = ''; return; }
    bar.innerHTML = statuses.map(s => {
        const meta = STATUS_META[s.type] || {};
        return `<span class="status-badge" style="--sc:${meta.color || '#fff'}">${meta.icon || '?'} ${meta.label || s.type} (${s.turns})</span>`;
    }).join('') + overhealBadge + brewBadge + songBadge + questBadge;
}


function getAbilityHint() {
    if (gameState.awaitingLevelChoice) return 'Choose a level-up bonus to continue';
    if (gameState.shopOpen) return 'ESC: Close shop';
    if (gameState.charSheetOpen) return 'C or ESC: Close sheet';
    if (gameState.helpOpen) return 'H or ESC: Close help';
    if (gameState.gamblingOpen) return 'ESC: Leave dice table';
    if (gameState.brewmasterOpen) return 'ESC: Leave the Brewmaster';
    if (gameState.questBoardOpen) return 'ESC: Close Notice Board';
    if (gameState.bardOpen) return "ESC: Close Bard's Corner";
    if (gameState.stashOpen) return 'ESC: Close Shared Stash';
    if (gameState.magicDealerOpen) return 'ESC: Close Magic Dealer';
    // Contextual navigation prompt — when standing next to a tavern point of
    // interest, tell the player exactly what Space will do here.
    if (gameState.floor === 0 && gameState.player && typeof getAdjacentInteractable === 'function') {
        const adj = getAdjacentInteractable();
        if (adj) {
            return `<strong style="color:${safeColor(adj.color)}">[Space]</strong> ${escHtml(adj.verb)} ${escHtml(adj.label)}`;
        }
    }
    if (gameState.floor === 0 && gameState.player && isAdjacentToBartender()
        && !gameState.tavernUpgrades.velvetChairs) {
        return `G: Donate 50g to bartender (${Math.max(0, 200 - gameState.tavernUpgrades.goldDonated)}g needed for velvet chairs)`;
    }
    const ability = gameState.player.ability;
    return `Ability: <strong>${escHtml(ability)}</strong> &middot; Gold: ${gameState.player.gold}g`;
}


// Renders the right-column inventory as a tight square slot grid.
// Each slot gets a `rarity-<tier>` class straight from the item's own
// metadata (item.rarity), so new tiers (e.g. legendary) just work as
// soon as anything in the data layer starts producing them — no
// changes needed here.
// Renders both halves of the Relics tab — attuned (equipped, max 5) and
// pouch (benched/unequipped). Clicking a pouch relic attunes it; clicking
// an attuned relic benches it. Mirrors the clickable item-slot pattern
// used by the main inventory grid.
function renderRelicsPanel() {
    const p = gameState.player;
    if (!p) return;
    const equippedEl = document.getElementById('relics-equipped');
    const pouchEl = document.getElementById('relics-pouch');
    const countEl = document.getElementById('relics-equipped-count');
    if (!equippedEl || !pouchEl) return;

    if (countEl) countEl.textContent = p.relics.length;

    function buildSlot(relic, { onClick, extraHint }) {
        const def = RELIC_DEFS[relic.id];
        const slot = document.createElement('div');
        const rarity = def ? def.rarity : 'common';
        slot.className = `item-slot rarity-${rarity}`;
        const chargeNote = (def && def.kind === 'trigger' && !relic.charged) ? ' (spent)' : '';
        slot.title = `${def ? def.name : 'Unknown Relic'}${chargeNote}${extraHint ? ' — ' + extraHint : ''}`;
        slot.innerHTML = `
            <span class="item-slot-name">${def ? def.name : 'Unknown'}${chargeNote}</span>
            <span class="item-slot-icon">${def ? def.glyph : '?'}</span>
        `;
        if (def && def.kind === 'trigger' && !relic.charged) slot.classList.add('relic-spent');
        slot.classList.add('equip-row');
        slot.addEventListener('click', onClick);
        return slot;
    }

    equippedEl.innerHTML = '';
    if (!p.relics.length) {
        equippedEl.innerHTML = '<div class="item-empty">No relics attuned yet.</div>';
    } else {
        p.relics.forEach((relic, i) => {
            equippedEl.appendChild(buildSlot(relic, {
                extraHint: 'click to bench',
                onClick: () => unequipRelic(i)
            }));
        });
    }

    pouchEl.innerHTML = '';
    if (!p.relicPouch.length) {
        pouchEl.innerHTML = '<div class="item-empty">Pouch is empty.</div>';
    } else {
        p.relicPouch.forEach((relic, i) => {
            pouchEl.appendChild(buildSlot(relic, {
                extraHint: 'click to attune',
                onClick: () => equipRelic(relic.id, i)
            }));
        });
    }
}



// Compact glance-strip shown beneath the inventory grid on the Items tab,
// so that tab isn't mostly empty space below a 3-4 slot grid. Surfaces
// state the player would otherwise have to click into other tabs to see
// (relics attuned, active quest progress, active brew/song) rather than
// duplicating full tab content.
function renderRunSnapshot() {
    const el = document.getElementById('run-snapshot');
    if (!el) return;
    const p = gameState.player;
    if (!p) { el.innerHTML = ''; return; }

    const rows = [];

    // Active dungeon event — surfaced at the top of the snapshot so it's never
    // forgotten mid-run. The event shapes the whole descent; the player should
    // always be able to glance and remember what they're dealing with.
    const activeEv = typeof getDungeonEvent === 'function' ? getDungeonEvent() : null;
    if (activeEv) {
        rows.push(`<div class="gear-row"><span>Dungeon Event</span><span class="status-badge" style="--sc:${safeColor(activeEv.color)}">${escHtml(activeEv.icon)} ${escHtml(activeEv.name)}</span></div>`);
    }

    rows.push(`<div class="gear-row"><span>Relics Attuned</span><span class="status-badge" style="--sc:#c98bff">${p.relics.length}/${RELIC_MAX_SLOTS}</span></div>`);

    const q = gameState.activeQuest;
    if (q) {
        let badge;
        if (q.failed) badge = '<span class="status-badge" style="--sc:#e14b4b">Failed</span>';
        else if (q.completed) badge = '<span class="status-badge" style="--sc:#58c26d">Complete</span>';
        else if (q.type === 'kill_count') badge = `<span class="status-badge" style="--sc:#c49eff">${q.currentAmount}/${q.targetAmount}</span>`;
        else badge = '<span class="status-badge" style="--sc:#c49eff">In progress</span>';
        rows.push(`<div class="gear-row"><span>${escHtml(q.label)}</span>${badge}</div>`);
    } else {
        rows.push(`<div class="gear-row"><span>Bounty</span><span class="status-badge" style="--sc:#888">None active</span></div>`);
    }

    if (gameState.activeBrew) {
        rows.push(`<div class="gear-row"><span>${escHtml(gameState.activeBrew.name)}</span><span class="status-badge" style="--sc:#ffd65a">${gameState.activeBrew.duration}fl left</span></div>`);
    }

    if (gameState.activeSong) {
        rows.push(`<div class="gear-row"><span>${escHtml(gameState.activeSong.title)}</span><span class="status-badge" style="--sc:#55c7ff">Playing</span></div>`);
    }

    rows.push(`<div class="gear-row"><span>Best Floor</span><span class="status-badge" style="--sc:#ffd65a">${gameState.bestFloor || 0}</span></div>`);

    // Arena fame — only once the Pit is unlocked, so it doesn't show as a
    // mysterious empty stat for players who haven't reached it yet. Surfacing
    // rank here (not just inside the arena panel) is what makes reputation
    // feel like a persistent part of the character rather than a menu number.
    if (typeof isArenaUnlocked === 'function' && isArenaUnlocked()) {
        const tier = getArenaTier();
        const fame = getArenaFame();
        rows.push(`<div class="gear-row"><span>Arena Rank</span><span class="status-badge" style="--sc:${tier.color}">${escHtml(tier.title)} · ${fame}</span></div>`);
    }

    // Tavern Renown — always shown so the player can see it growing.
    const renown = gameMeta.tavernRenown || 0;
    const nextM = typeof getNextRenownMilestone === 'function' ? getNextRenownMilestone() : null;
    const renownLabel = nextM ? `${renown} / ${nextM.renown}` : `${renown} ✦`;
    rows.push(`<div class="gear-row"><span>Tavern Renown</span><span class="status-badge" style="--sc:#d4a96a">${renownLabel}</span></div>`);

    // Next Goals — explicit targets to chase, drawn from current progression.
    // Turns the rich-but-implicit meta-progression into something the player
    // can see themselves working toward (a proven return driver).
    if (typeof getNextGoals === 'function') {
        const goals = getNextGoals();
        if (goals.length) {
            rows.push('<div class="snapshot-goals-label">Next Goals</div>');
            goals.forEach(g => {
                rows.push(`<div class="snapshot-goal"><span class="snapshot-goal-icon" style="color:${safeColor(g.color)}">${g.icon}</span><span class="snapshot-goal-text">${escHtml(g.label)}</span></div>`);
            });
        }
    }

    el.innerHTML = rows.join('');
}


function renderInventory() {
    const inventory = document.getElementById('inventory');
    inventory.innerHTML = '';
    if (gameState.player.inventory.length === 0) {
        inventory.innerHTML = '<div class="item-empty">No items yet.</div>';
        return;
    }

    const CONSUMABLE_ICONS = { potion: '+', antidote: '!', smokeBomb: '*', rageDraught: '^', identifyScroll: '?' };

    gameState.player.inventory.slice(0, 8).forEach(item => {
        const slot = document.createElement('div');
        const isConsumable = CONSUMABLE_TYPES.includes(item.type);
        let displayName, qty, icon;

        if (isConsumable) {
            displayName = item.name;
            qty = `x${item.qty}`;
            icon = CONSUMABLE_ICONS[item.type] || '?';
        } else {
            const hidden = item.cursed && !item.identified;
            displayName = hidden ? '?? Item' : item.name;
            qty = hidden ? '+??' : `+${item.bonus}${item.unit || ''}`;
            icon = getGearIcon(item.slot);
        }

        slot.className = `item-slot rarity-${item.rarity || 'common'}`;
        slot.innerHTML = `
            <span class="item-slot-name">${displayName} ${qty}</span>
            <span class="item-slot-icon">${icon}</span>
            <span class="item-slot-qty">${qty}</span>
        `;
        if (item.type === 'equipment') {
            slot.classList.add('equip-row');
            const hintName = (item.cursed && !item.identified) ? '?? Item' : (item.desc ? `${item.desc} \u2014 click to equip` : 'Click to equip');
            slot.title = hintName;
            slot.addEventListener('click', () => equipFromInventory(item));
        }
        inventory.appendChild(slot);
    });
}


function renderEquipment() {
    const equipment = document.getElementById('equipment');
    const eq = migrateEquipment(gameState.player.equipment);
    gameState.player.equipment = eq;

    // Three rows, each centered independently — sidesteps the column-count
    // mismatch between a 1-item row (helmet) and a 4-item row (jewelry)
    // that previously left helmet pinned off-center with dead space beside it.
    const rows = [
        ['ring1', 'helmet', 'ring2'],
        ['shield', 'chest', 'weapon'],
        ['amulet', 'boots']
    ];

    function renderSlot(key) {
        const item = eq[key];
        const label = SLOT_LABELS[key];
        const icon = SLOT_GLYPHS[key];
        const rarity = item?.rarity || 'common';
        const hidden = item?.cursed && !item?.identified;
        const title = item
            ? (hidden ? '?? Item' : `${item.name} ${getGearStatLabel(item)}`)
            : label;
        const inner = item
            ? `<span class="doll-glyph rarity-${rarity}">${item.glyph || icon}</span><small class="doll-name rarity-${rarity}">${hidden ? '??' : item.name.split(' ').slice(-1)[0]}</small>`
            : `<span class="doll-empty">${icon}</span><small class="doll-name">${label}</small>`;
        return `<div class="doll-slot rarity-${item ? rarity : 'common'}" title="${escHtml(title)}">${inner}</div>`;
    }

    equipment.innerHTML = `<div class="paper-doll">${rows.map(row =>
        `<div class="doll-row">${row.map(renderSlot).join('')}</div>`
    ).join('')}</div>`;
}


function getMinimapCellStyle(x, y) {
    if (!gameState.revealed[y]?.[x]) return { bg: '#080808', title: 'Unexplored', cls: '' };
    const tile = gameState.dungeon[y][x];
    if (isPlayerAt(x, y)) return { bg: '#4fc3f7', title: 'You', cls: 'minimap-player' };

    const enemy = findEnemyAt(x, y, 0);
    if (enemy) {
        const isBoss = enemy.type === 'boss';
        return {
            bg: isBoss ? '#ff6b35' : '#c62828',
            title: `${enemy.name} (${enemy.hp}/${enemy.maxHp})`,
            cls: isBoss ? 'minimap-boss' : 'minimap-enemy'
        };
    }

    const interactable = findInteractableAt(x, y);
    if (interactable) {
        const meta = WORLD_OBJECTS[interactable.kind];
        if (interactable.kind.startsWith('event_')) return { bg: '#62b9ff', title: meta?.label || 'Rare Event', cls: 'minimap-event' };
        if (interactable.kind.startsWith('chest_')) return { bg: meta?.color || '#c8a060', title: meta?.label || 'Chest', cls: 'minimap-chest' };
        if (interactable.kind.startsWith('discovery_')) return { bg: meta?.color || '#55c7ff', title: meta?.label || 'Discovery', cls: 'minimap-discovery' };
    }

    if (findItemAt(x, y)) return { bg: '#ffd65a', title: 'Item', cls: 'minimap-item' };
    if (tile === 3) return { bg: '#553232', title: 'Trap', cls: 'minimap-trap' };
    if (tile === 2) return { bg: '#9c6dff', title: 'Descend Stairs', cls: 'minimap-descend' };
    if (tile === TILE_ASCEND) return { bg: '#ffd65a', title: 'Ascend Stairs', cls: 'minimap-ascend' };
    if (tile === TILE_TAVERN_EXIT) return { bg: '#ffd65a', title: 'Tavern Exit', cls: 'minimap-ascend' };
    if (tile === 1) return { bg: '#555', title: 'Wall', cls: 'minimap-wall' };

    if (gameState.floor === 0) {
        const npcs = [
            gameState.innkeeper, gameState.merchant, gameState.blacksmith,
            gameState.trainer, gameState.bank, gameState.questBoard,
            gameState.dungeonEntrance, gameState.gambler, gameState.brewmaster,
            gameState.bard, gameState.magicDealer
        ];
        const npc = npcs.find(n => n && n.x === x && n.y === y);
        if (npc) return { bg: '#c8a060', title: npc.name, cls: 'minimap-npc' };
    }

    return { bg: '#1c1c1c', title: 'Floor', cls: 'minimap-floor' };
}


function getExploredPercent() {
    if (gameState.floor === 0) return 100;
    let total = 0;
    let seen = 0;
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (gameState.dungeon[y][x] === 1) continue;
            total++;
            if (gameState.revealed[y][x]) seen++;
        }
    }
    return total ? Math.round((seen / total) * 100) : 0;
}


function renderMinimap() {
    const minimap = document.getElementById('minimap');
    const floorEl = document.getElementById('minimap-floor');
    const exploredEl = document.getElementById('minimap-explored');
    if (!minimap) return;

    if (floorEl) {
        floorEl.textContent = gameState.floor === 0

    minimap.style.gridTemplateRows = `repeat(${MAP_HEIGHT}, 1fr)`;

        }
    }
}


// Tracks whether the crash banner is currently showing, so repeated
// failures (e.g. a bug that throws on every single frame) don't spam
// the DOM with duplicate banners or repeatedly steal focus.
let _renderCrashShown = false;

let _renderCrashLogCount = 0;


function gameLoop() {
    try {
        draw();
    } catch (err) {
        // Log generously at first so the first occurrence is fully diagnosable,
        // then throttle — a bug that throws on every single frame (60/sec)
        // would otherwise flood the console and make it useless for finding
        // anything else.
        _renderCrashLogCount++;
        if (_renderCrashLogCount <= 3 || _renderCrashLogCount % 300 === 0) {
            console.error(`Rendering error in gameLoop (occurrence #${_renderCrashLogCount}) — frame skipped, loop continues:`, err);
        }
        if (!_renderCrashShown) {
            _renderCrashShown = true;
            showRenderCrashBanner();
        }
    }
    requestAnimationFrame(gameLoop);
}


// A rendering bug should never permanently freeze the game on a paying
// player's machine with zero explanation — that previously happened
// because gameLoop() had no error boundary, so one bad frame silently
// broke the requestAnimationFrame chain forever. This keeps the loop
// alive (the game keeps responding to input even if a visual glitch
// shows up) and tells the player something went wrong without dumping
// a raw stack trace on them. Full detail goes to the console for the
// developer to find via bug reports or Steam's crash logs.
function showRenderCrashBanner() {
    if (document.getElementById('render-crash-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'render-crash-banner';
    banner.innerHTML = `
        <span>A display glitch occurred. Your progress is safe — reloading is recommended.</span>
        <button onclick="window.location.reload()">Reload</button>
        <button onclick="document.getElementById('render-crash-banner').remove()">Dismiss</button>
    `;
    document.body.appendChild(banner);
}


function handleAction() {
    if (gameState.floor === 0) { interactInTavern(); return; }
    if (tryStairsInteraction()) return;
    if (tryOpenChest()) {

}


function clearArea(centerX, centerY, radius) {
    for (let y = centerY - radius; y <= centerY + radius; y++) {
        for (let x = centerX - radius; x <= centerX + radius; x++) {
            if (x > 0 && x < MAP_WIDTH - 1 && y > 0 && y < MAP_HEIGHT - 1) {
                gameState.dungeon[y][x] = 0;
            }
        }
    }
}


function getXpToLevel() {

function getDistance(ax, ay, bx, by) {

function isPlayerAt(x, y) {

function capitalize(value) {
    return value.charAt(0).toUpperCase() + value.slice(1);
}


function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}


// Validates that a value is a safe CSS color before it's interpolated into a
// style="color:..." attribute in an innerHTML string. Every color in the game
// is currently a developer-controlled hex/keyword literal, so this is purely
// defensive hardening: it guarantees that if a color value ever starts coming
// from dynamic or persisted data, a malformed value can't break out of the
// attribute and inject markup. Accepts #rgb/#rrggbb(/aa) hex, rgb()/rgba()/
// hsl()/hsla() functional notation, and plain alphabetic keywords (e.g.
// 'gold', 'red'); anything else falls back to a neutral default.
function safeColor(value, fallback = '#e8e8f0') {
    if (typeof value !== 'string') return fallback;
    const v = value.trim();
    if (/^#[0-9a-fA-F]{3,8}$/.test(v)) return v;
    if (/^(rgb|rgba|hsl|hsla)\([0-9.,%\s/]+\)$/.test(v)) return v;
    if (/^[a-zA-Z]+$/.test(v)) return v;
    return fallback;
}

// Copies the active run's seed code so it's easy to share with friends.
// navigator.clipboard requires a secure context (https:// or localhost) —
// it's unavailable under file://, which is how this game is normally
// distributed and played, so this always has a fallback: select the code
// text and let the browser's native copy shortcut work, with a message
// telling the player to use it. Either path confirms success visibly
// rather than failing silently if the Clipboard API call rejects.
function copySeedCode() {
    if (!gameState.runSeed) return;
    const code = seedToCode(gameState.runSeed);
    const codeEl = document.getElementById('charsheet-seed-code') || document.getElementById('gameover-seed-code');

    const showCopied = () => addMessageAndUpdate(`Seed code ${code} copied to clipboard.`);
    const showSelectFallback = () => {
        if (codeEl) {
            const range = document.createRange();
            range.selectNodeContents(codeEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }
        addMessageAndUpdate(`Seed code ${code} selected — press Ctrl+C (or Cmd+C) to copy.`);
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(showCopied).catch(showSelectFallback);
    } else {
        showSelectFallback();
    }
}


function renderCharSheet() {
    const p = gameState.player;
    p.equipment = migrateEquipment(p.equipment);
    const body = document.getElementById('charsheet-body');
    const wBonus = p.equipment.weapon ? p.equipment.weapon.bonus : 0;
    let aBonus = 0;
    DEF_GEAR_SLOTS.forEach(slot => { if (p.equipment[slot]) aBonus += p.equipment[slot].bonus; });

    function row(label, value, note) {
        return `<div class="cs-row"><span class="cs-label">${label}</span><span class="cs-value">${value}${note ? `<span class="cs-note">${note}</span>` : ''}</span></div>`;
    }

    function slotDetail(item, fallback) {
        if (!item) return `<span class="cs-value rarity-common">${fallback}</span>`;
        const hidden = item.cursed && !item.identified;
        const name = hidden ? '?? Item' : item.name;
        const stat = hidden ? '+??' : `+${item.bonus}${item.unit || ''}`;
        const tag = (item.cursed && item.identified) ? ' <span class="cursed-tag">CURSED</span>' : '';
        const desc = (!hidden && item.desc) ? ` — ${item.desc}` : '';
        return `<span class="cs-value rarity-${item.rarity}">${name} ${stat}${tag}${desc}</span>`;
    }

    const statusHtml = p.statuses.length
        ? p.statuses.map(s => {
            const meta = STATUS_META[s.type] || {};
            return `<span class="status-badge" style="--sc:${meta.color || '#888'}">${meta.icon || '?'} ${meta.label || s.type} (${s.turns})</span>`;
        }).join(' ')
        : '<span class="cs-muted">None</span>';

    const csCharDef = p.subclass ? (SUBCLASSES[p.className] || []).find(s => s.id === p.subclass) : null;
    const csClassLabel = capitalize(p.className) + (csCharDef ? ` — ${csCharDef.name}` : '');

    body.innerHTML = `
        <div class="cs-section">
            ${p.name ? row('Name', escHtml(p.name)) : ''}
            ${row('Class', csClassLabel)}
            ${row('Level', p.level)}
            ${row('XP', `${p.xp} / ${getXpToLevel()}`)}
            ${row('Gold', `${p.gold}g`)}
            ${row('Seed Code', `<span id="charsheet-seed-code">${gameState.runSeed ? seedToCode(gameState.runSeed) : '—'}</span> <button class="cs-seed-copy-btn" onclick="copySeedCode()" title="Copy seed code">Copy</button>`)}
        </div>
        <div class="cs-divider"></div>
        <div class="cs-section">
            <div class="cs-heading">Combat Stats</div>
            ${row('HP', `${p.hp} / ${p.maxHp}`)}
            ${row('Attack', p.atk, `(base ${p.baseAtk} + weapon ${wBonus})`)}
            ${row('Defense', p.def, `(base ${p.baseDef} + gear ${aBonus})`)}
            ${row('Crit Chance', `${p.critChance}%`)}
            ${row('Lifesteal', `${p.lifesteal}%`)}
            ${row('Gold Find', `${p.goldFind}%`)}
            ${row('Thorns', `${p.thorns}%`)}
            ${p.maxMana > 0 ? row('Mana', `${p.mana} / ${p.maxMana}`) : ''}
            ${p.maxMana > 0 ? row('Mana Regen', `+${1 + p.manaRegenBonus}/turn`) : ''}
        </div>
        <div class="cs-divider"></div>
        <div class="cs-section">
            <div class="cs-heading">Status Effects</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${statusHtml}</div>
        </div>
        <div class="cs-divider"></div>
        <div class="cs-section">
            <div class="cs-heading">Equipment</div>
            ${GEAR_SLOTS.map(slot => `<div class="cs-gear-row"><span class="cs-label">${SLOT_LABELS[slot]}</span>${slotDetail(p.equipment[slot], 'Empty')}</div>`).join('')}
        </div>
    `;
}

// Applies a saved tavern-upgrades object onto gameState.tavernUpgrades.
// Previously duplicated verbatim in both loadTavernUpgrades() and
// loadMetaProgress() — any new purchasable upgrade had to be wired in
// two places, and the two copies could silently drift apart.
function _applyTavernUpgradesSave(src) {
    if (!src || typeof src !== 'object') return;
    if (src.skeletonKingSkull) gameState.tavernUpgrades.skeletonKingSkull = true;
    if (src.velvetChairs) {
        gameState.tavernUpgrades.velvetChairs = true;
        gameState.tavernUpgrades.chandelier = true;
    }
    if (src.chandelier) gameState.tavernUpgrades.chandelier = true;
    if (src.royalRug) gameState.tavernUpgrades.royalRug = true;
    if (typeof src.goldDonated === 'number') gameState.tavernUpgrades.goldDonated = src.goldDonated;
    if (typeof src.bankGold === 'number') gameState.tavernUpgrades.bankGold = src.bankGold;
    if (Array.isArray(src.defeatedMilestones)) {
        gameState.tavernUpgrades.defeatedMilestones = src.defeatedMilestones.slice();
    }
    INNKEEPER_UPGRADES.forEach(up => {
        if (src[up.id]) gameState.tavernUpgrades[up.id] = true;
    });
    // Legendary guest one-time reward flags
    ['guestChroniclerVisited', 'guestSurvivorVisited', 'guestWitnessVisited',
     'guestKnightVisited', 'guestLegendVisited'].forEach(key => {
        if (src[key]) gameState.tavernUpgrades[key] = true;
    });
}

// bestFloor is also bundled into SAVE_KEY_META (see saveMetaProgress), but
// kept in its own standalone localStorage key as well so it survives even if
// the meta bundle ever fails to parse — it gates the Arena unlock and
// milestone tracking, so it's worth the redundancy. Synchronous localStorage
// (not the old async window.storage, which only exists in the hosted preview
// environment and silently no-ops once the game is packaged for desktop).
function saveBestFloor(floor) {
    if (floor <= gameState.bestFloor) return;
    const crossedArenaThreshold = gameState.bestFloor < 20 && floor >= 20;
    gameState.bestFloor = floor;
    try {
        localStorage.setItem(SAVE_KEY_BEST_FLOOR, String(floor));
    } catch (e) {
        if (!(e instanceof DOMException)) console.warn('saveBestFloor failed:', e);
    }
    saveMetaProgress();
    checkAchievements({ bestFloor: gameState.bestFloor });
    // The Pit unlocks at bestFloor >= 20 — tell the player the first time
    // they cross that line, since the gate is in the courtyard where they
    // might not think to look. Guarded by its own hintsSeen id too, so a
    // player who somehow re-crosses doesn't get it twice.
    if (crossedArenaThreshold) showFirstTimeHint('arena');
}


function loadBestFloor() {
    try {
        const raw = localStorage.getItem(SAVE_KEY_BEST_FLOOR);
        if (raw !== null) {
            const parsed = parseInt(raw, 10);
            // Take whichever source has the higher value — the meta bundle may
            // already have loaded a bestFloor, and we never want to regress it.
            if (!Number.isNaN(parsed)) gameState.bestFloor = Math.max(gameState.bestFloor || 0, parsed);
        }
    } catch (e) {
        if (!(e instanceof DOMException)) console.warn('loadBestFloor failed:', e);
    }
    renderBestFloor();
}

function loadActiveRun() {
    try {
        const raw = localStorage.getItem(SAVE_KEY_RUN);
        if (!raw) return false;
        const save = JSON.parse(raw);
        if (!save || save.v !== 1 || !save.player || typeof save.floor !== 'number') return false;

        // Restore run scalars
        gameState.floor  = save.floor;
        gameState.dungeon  = save.dungeon;
        gameState.revealed = save.revealed;
        gameState.rooms    = save.rooms;
        gameState.items    = save.items;
        gameState.messages = save.messages || [];
        gameState.effects  = [];
        // Re-arm the PRNG from the saved seed so the char sheet still
        // shows the right code and any further rolls this session at
        // least come from a known, named seed. Note this restores the
        // generator, not its exact position in the sequence — a save
        // mid-run re-arms at sequence position 0, not the exact draw
        // count reached before saving. Fine for "type in this code and
        // get the same dungeon," not bit-for-bit continuation of the
        // pre-save sequence. Saves from before 1.6.0 won't have a
        // runSeed at all; mint one so seedToCode() always has something
        // valid to display rather than showing "—" for an old save.
        seedRun(save.runSeed != null ? save.runSeed : generateRandomSeed());
        // Saves from before this feature existed won't have
        // cellarHasFind at all — default to false rather than
        // re-rolling, since re-rolling on every load would let a
        // player save-scum for a better outcome by repeatedly saving
        // and reloading until the roll favors them.
        gameState.cellarHasFind = save.cellarHasFind === true;
        gameState.cellarClaimed = save.cellarClaimed === true;
        gameState.activeBrew  = save.activeBrew  || null;
        gameState.activeSong  = save.activeSong  || null;
        gameState.activeQuest = save.activeQuest || null;
        gameState.generatedBounties = save.generatedBounties || [];
        gameState.decorations = save.decorations || [];
        gameState.interactables = save.interactables || [];
        gameState.traps = save.traps || [];
        gameState.allies = save.allies || [];
        gameState.decoy = save.decoy || null;
        gameState.trainerBought = save.trainerBought || { hp: false, atk: false };
        gameState.capturedCreatures = save.capturedCreatures || [];
        gameState.dungeonEvent = save.dungeonEvent || null;
        // Clear any stale arena mid-bout state — bouts are not persisted
        gameState.inArenaBout = false;
        gameState.arenaBoutData = null;
        // Restore floor exploration cache if present
        gameState.floorCache = save.floorCache || {};
        gameState.floorCacheOrder = save.floorCacheOrder || [];
        if (gameState.floor > 0 && gameState.decorations.length === 0) placeDecorations();
        else buildDecorGrid();

        // Reset all UI/modal flags
        gameState.gameOver = false;
        gameState.awaitingLevelChoice = false;
        gameState.pendingLevelChoices = 0;
        gameState.shopOpen = gameState.charSheetOpen = gameState.gamblingOpen = false;
        gameState.brewmasterOpen = gameState.questBoardOpen = false;
        gameState.bardOpen = gameState.stashOpen = false;
        gameState.magicDealerOpen = false;
        gameState.cellarFindOpen = false;
        gameState.blacksmithOpen = gameState.trainerOpen = false;
        gameState.bankOpen = gameState.innOpen = false;
        gameState.tavernConfirmOpen = false;

        // Reconstruct Player — create fresh instance so prototype methods exist,
        // then overwrite every field with the saved values
        const pd = save.player;
        const player = new Player(pd.className, pd.subclass, pd.name);
        Object.assign(player, pd);
        if (pd.sc) player.sc = JSON.parse(JSON.stringify(pd.sc));
        player.renderX = pd.x * TILE_SIZE;
        player.renderY = pd.y * TILE_SIZE;
        player.equipment = migrateEquipment(player.equipment);
        gameState.player = player;
        gameState.runStats = save.runStats || createRunStats();
        gameState.runAchievementsUnlocked = save.runAchievementsUnlocked || [];

        // Reconstruct Enemies — same pattern
        gameState.enemies = save.enemies.map(ed => {
            const e = new Enemy(ed.x, ed.y, ed.type);
            Object.assign(e, ed);
            e.flash = 0;
            e.hitFlash = 0;
            return e;
        });

        // Re-derive all computed stats (gear + song + brew carry through via saved base values)
        recalculateStats();

        // Resume bard music if a song was playing
        if (gameState.activeSong) {
            const track = SONG_TRACKS.find(t => t.id === gameState.activeSong.id);
            if (track) _startBardLoop(track);
        }

        // Show game UI, skip class-select and the title screen
        const titleEl = document.getElementById('title-screen');
        if (titleEl) titleEl.style.display = 'none';
        const csEl = document.getElementById('class-select');
        csEl.style.display = 'none';
        document.getElementById('game-ui').style.display = 'grid';
        document.getElementById('game-over').style.display = 'none';
        document.body.classList.add('in-run');

        if (!gameState.frameStarted) {
            gameState.frameStarted = true;
            requestAnimationFrame(gameLoop);
        }

        refreshEnemyIntents();
        addMessage(`Run restored — welcome back to floor ${save.floor}.`);
        renderMessages();
        updateUI();
        return true;
    } catch (e) {
        console.warn('loadActiveRun failed:', e);
        clearActiveRun();
        return false;
    }
}

function _getSavedRunSummary() {
    try {
        const raw = localStorage.getItem(SAVE_KEY_RUN);
        const save = raw ? JSON.parse(raw) : null;
        if (!save) return null;
        const sc = SUBCLASSES[save.player.className]?.find(s => s.id === save.player.subclass);
        const displayName = save.player.name || sc?.name || capitalize(save.player.className);
        const potionCount = (save.player.inventory || [])
            .filter(i => i.type === 'potion')
            .reduce((sum, i) => sum + (i.qty || 0), 0);
        return {
            displayName,
            floorLabel: save.floor > 0 ? `Floor ${save.floor}` : 'The Tavern',
            gold: save.player.gold,
            potionCount,
        };
    } catch (_) { return null; }
}


function _updateContinueButton() {
    const wrapper = document.getElementById('continue-run-wrapper');
    const noRunPrompt = document.getElementById('cs-no-run-prompt');
    if (!wrapper) return;
    if (hasSavedRun()) {
        wrapper.style.display = 'block';
        if (noRunPrompt) noRunPrompt.style.display = 'none';
        const summary = _getSavedRunSummary();
        if (summary) {
            const nameEl = document.getElementById('continue-name');
            const floorEl = document.getElementById('continue-floor-label');
            const goldEl = document.getElementById('continue-gold');
            const potionEl = document.getElementById('continue-potions');
            if (nameEl) nameEl.textContent = summary.displayName;
            if (floorEl) floorEl.textContent = summary.floorLabel;
            if (goldEl) goldEl.textContent = `${summary.gold} Gold`;
            if (potionEl) potionEl.textContent = `${summary.potionCount} Potion${summary.potionCount === 1 ? '' : 's'}`;
        }
    } else {
        wrapper.style.display = 'none';
        if (noRunPrompt) noRunPrompt.style.display = 'block';
    }
}

    try {

function loadMetaProgress() {
    let loadedFromBundle = false;
    try {
        const raw = localStorage.getItem(SAVE_KEY_META);
        if (raw) {
            const meta = JSON.parse(raw);
            if (meta && typeof meta === 'object') {
                if (typeof meta.bestFloor === 'number') gameState.bestFloor = meta.bestFloor;
                if (meta.tavernUpgrades) {
                    _applyTavernUpgradesSave(meta.tavernUpgrades);
                }
                if (Array.isArray(meta.sharedStash)) {
                    gameSharedStash.length = 0;
                    gameSharedStash.push(...meta.sharedStash.slice(0, STASH_MAX));
                }
                if (meta.meta && typeof meta.meta === 'object') {
                    if (typeof meta.meta.totalGold === 'number')   gameMeta.totalGold   = meta.meta.totalGold;
                    if (typeof meta.meta.runs === 'number')        gameMeta.runs        = meta.meta.runs;
                    if (typeof meta.meta.deaths === 'number')      gameMeta.deaths      = meta.meta.deaths;
                    if (typeof meta.meta.bossesSlain === 'number') gameMeta.bossesSlain = meta.meta.bossesSlain;
                    if (typeof meta.meta.arenaFame   === 'number') gameMeta.arenaFame   = meta.meta.arenaFame;
                    if (typeof meta.meta.arenaBouts  === 'number') gameMeta.arenaBouts  = meta.meta.arenaBouts;
                    if (typeof meta.meta.arenaWins   === 'number') gameMeta.arenaWins   = meta.meta.arenaWins;
                    if (meta.meta.hintsSeen) gameMeta.hintsSeen = { ...meta.meta.hintsSeen };
                    if (meta.meta.dailyRecords) gameMeta.dailyRecords = { ...meta.meta.dailyRecords };
                    if (meta.meta.bestiary) gameMeta.bestiary = { ...meta.meta.bestiary };
                    if (meta.meta.casinoJackpot != null) gameMeta.casinoJackpot = meta.meta.casinoJackpot;
                    if (meta.meta.casinoJackpotLastClaimed != null) gameMeta.casinoJackpotLastClaimed = meta.meta.casinoJackpotLastClaimed;
                    if (meta.meta.casinoJackpotLastBumped != null) gameMeta.casinoJackpotLastBumped = meta.meta.casinoJackpotLastBumped;
                    if (meta.meta.casinoWheelSpins != null) gameMeta.casinoWheelSpins = meta.meta.casinoWheelSpins;
                    if (meta.meta.casinoWheelBigWins != null) gameMeta.casinoWheelBigWins = meta.meta.casinoWheelBigWins;
                    if (meta.meta.tavernRenown != null) gameMeta.tavernRenown = meta.meta.tavernRenown;
                    if (Array.isArray(meta.meta.fallen)) gameMeta.fallen = meta.meta.fallen;
                    if (meta.meta.achievements) gameMeta.achievements = { ...meta.meta.achievements };
                    if (meta.meta.stats) gameMeta.stats = { ...gameMeta.stats, ...meta.meta.stats };
                }
                loadedFromBundle = true;
            }
        }
    } catch (_) {}

    if (!loadedFromBundle) {
        // Backward compat: individual legacy keys
        loadTavernUpgrades();

// ── Minimal test framework ──────────────────────────────────────────────────
const groups = [];
let current = null;
function describe(name, fn) { current = { name, cases: [] }; groups.push(current); try { fn(); } catch (e) { current.cases.push({ ok:false, name:'(threw during setup)', detail:String(e && e.stack || e) }); } }
function it(name, fn) { try { fn(); current.cases.push({ ok:true, name }); } catch (e) { current.cases.push({ ok:false, name, detail:String(e && e.message || e) }); } }
function assert(cond, msg) { if (!cond) throw new Error(msg || 'assertion failed'); }
function eq(a, b, msg) { if (a !== b) throw new Error((msg||'expected equality') + ` — got ${JSON.stringify(a)}, expected ${JSON.stringify(b)}`); }
function deepEq(a, b, msg) { const sa=JSON.stringify(a), sb=JSON.stringify(b); if (sa!==sb) throw new Error((msg||'expected deep equality') + `\n  A=${sa}\n  B=${sb}`); }

// ── Stale-file guard ────────────────────────────────────────────────────────
// If the browser is serving cached/older js/ files, recent functions won't
// exist and tests fail with cryptic "X is not defined". Detect that up front
// and show a plain-language banner telling the user to hard-refresh, instead
// of leaving them to decode the failures. Lists the specific recent globals
// this test build expects so a partial/mismatched copy is obvious.
(function checkFreshness() {
    const expected = {
        'oddsFor (arena.js)': typeof oddsFor,
        'getFameOddsBonus (arena.js)': typeof getFameOddsBonus,
        'getDailySeed (data.js)': typeof getDailySeed,
        'recordBestiaryKill (data.js)': typeof recordBestiaryKill,
        'getNextGoals (data.js)': typeof getNextGoals,
        'effectiveVolume (data.js)': typeof effectiveVolume,
    };
    const missing = Object.entries(expected).filter(([, t]) => t !== 'function').map(([n]) => n);
    if (missing.length) {
        const sum = document.getElementById('summary');
        sum.className = 'fail';
        sum.innerHTML = `\u26A0 Stale game files detected — your browser is running OLD JavaScript.<br>`
            + `<span style="font-weight:400;font-size:13px">`
            + `Missing: ${missing.join(', ')}.<br>`
            + `Fix: <b>hard-refresh</b> this page (Ctrl+Shift+R / Cmd+Shift+R), and confirm your <code>js/</code> folder has the latest files. `
            + `Then re-run. The test results below are unreliable until this is resolved.</span>`;
    }
})();

// ── 1. Seed determinism ─────────────────────────────────────────────────────
// The "share a seed, get the same dungeon" promise depends on the RNG stream
// being identical for identical seeds. This catches any change that shifts the
// number of rng() draws during generation.
describe('Seed determinism', () => {
    it('same seed → identical rng() sequence', () => {
        seedRun(123456);
        const a = Array.from({length:50}, () => rng());
        seedRun(123456);
        const b = Array.from({length:50}, () => rng());
        deepEq(a, b, 'rng sequence diverged for identical seed');
    });

    it('different seeds → different sequence', () => {
        seedRun(111);
        const a = Array.from({length:20}, () => rng());
        seedRun(222);
        const b = Array.from({length:20}, () => rng());
        assert(JSON.stringify(a) !== JSON.stringify(b), 'two different seeds produced identical streams');
    });

    it('seed code round-trips (seedToCode → codeToSeed)', () => {
        [1, 123456, 4294967295, 999].forEach(s => {
            const code = seedToCode(s);
            const back = codeToSeed(code);
            eq(back, s >>> 0, `seed ${s} did not round-trip (code=${code})`);
        });
    });

    it('same seed → identical dungeon layout', () => {
        // Generate floor 1 twice from the same seed and compare the tile grids.
        function genFloor1(seed) {
            seedRun(seed);
            gameState.floor = 1;
            gameState.player = { x:2, y:2, subclass:null, className:'warrior', level:1 };
            generateDungeon();
            return gameState.dungeon.map(r => [...r]);
        }
        const a = genFloor1(7777);
        const b = genFloor1(7777);
        deepEq(a, b, 'identical seed produced different dungeon layouts');
    });
});

// ── 2. Save round-trip ──────────────────────────────────────────────────────
// A save-format regression silently corrupts a player's run. This serializes a
// known state, reloads it, and asserts the player and floor survive intact.
describe('Save round-trip', () => {
    it('active run survives save → load', () => {
        // Build a known run state
        seedRun(42);
        gameState.floor = 3;
        gameState.player = new Player('mage', 'elementalist', 'TestWizard');
        gameState.player.hp = 37; gameState.player.maxHp = 60;
        gameState.player.gold = 215; gameState.player.level = 4;
        gameState.player.x = 5; gameState.player.y = 6;
        gameState.player.inventory = [{ type:'potion', name:'Health Potion', qty:2 }];
        generateDungeon();
        gameState.enemies = [];
        gameState.messages = ['test message'];
        gameState.gameOver = false;

        // Round-trip through localStorage
        clearActiveRun();
        saveActiveRun();
        // Wipe the live state to prove load actually restores it
        const savedGold = gameState.player.gold;
        const savedFloor = gameState.floor;
        gameState.player.gold = 0;
        gameState.floor = 0;

        const ok = loadActiveRun();
        assert(ok, 'loadActiveRun() returned false on a save we just wrote');
        eq(gameState.floor, savedFloor, 'floor not restored');
        eq(gameState.player.gold, savedGold, 'gold not restored');
        eq(gameState.player.className, 'mage', 'className not restored');
        eq(gameState.player.subclass, 'elementalist', 'subclass not restored');
        eq(gameState.player.level, 4, 'level not restored');
        assert(Array.isArray(gameState.player.inventory), 'inventory missing after load');
        eq(gameState.player.inventory[0]?.qty, 2, 'inventory item qty not restored');
    });

    it('save carries a version field', () => {
        saveActiveRun();
        const raw = localStorage.getItem(SAVE_KEY_RUN);
        assert(raw, 'no active-run save was written');
        const parsed = JSON.parse(raw);
        eq(parsed.v, 1, 'save version field is not 1');
    });

    it('bestFloor persists via localStorage (not window.storage)', () => {
        gameState.bestFloor = 0;
        saveBestFloor(18);
        eq(localStorage.getItem(SAVE_KEY_BEST_FLOOR), '18', 'bestFloor not written to localStorage');
        gameState.bestFloor = 0;
        loadBestFloor();
        eq(gameState.bestFloor, 18, 'bestFloor not restored from localStorage');
        // And confirm the old async API is truly gone
        eq(typeof window.storage, 'undefined', 'window.storage still present — packaging risk remains');
    });
});

// ── 4. Save migration / robustness ───────────────────────────────────────────
// The save format carries a `v:` field. These confirm the load path rejects
// incompatible/garbage saves cleanly rather than crashing or corrupting state.
describe('Save migration & robustness', () => {
    it('rejects a save with a future/unknown version', () => {
        localStorage.setItem(SAVE_KEY_RUN, JSON.stringify({ v: 999, player:{}, floor:2 }));
        const ok = loadActiveRun();
        eq(ok, false, 'loadActiveRun should reject an unknown save version');
    });

    it('rejects a structurally invalid save without throwing', () => {
        localStorage.setItem(SAVE_KEY_RUN, JSON.stringify({ v: 1, floor: 'not-a-number' }));
        let threw = false, ok = null;
        try { ok = loadActiveRun(); } catch (_) { threw = true; }
        assert(!threw, 'loadActiveRun threw on a malformed save instead of returning false');
        eq(ok, false, 'malformed save should load as false');
    });

    it('rejects outright garbage in the save slot', () => {
        localStorage.setItem(SAVE_KEY_RUN, '{ this is not valid json');
        let threw = false, ok = null;
        try { ok = loadActiveRun(); } catch (_) { threw = true; }
        assert(!threw, 'loadActiveRun threw on non-JSON instead of returning false');
        eq(ok, false, 'garbage save should load as false');
    });
});

// ── 3. Arena bout lifecycle ─────────────────────────────────────────────────
// New code with heavy state-swapping. A bout swaps the dungeon grid and must
// restore the world exactly on win OR loss, and never leave the player dead on
// a non-ironman loss.
describe('Arena bout lifecycle', () => {
    function setupArenaPlayer() {
        seedRun(99);
        gameState.floor = 0;
        gameState.inCourtyard = true;
        gameState.bestFloor = 25; // arena unlocked
        gameState.player = new Player('warrior', 'gladiator', 'Pit Fighter');
        gameState.player.hp = 80; gameState.player.maxHp = 100;
        gameState.player.gold = 100;
        gameState.player.x = 6; gameState.player.y = 12;
        gameState.capturedCreatures = [];
        gameState.enemies = [];
        gameState.dungeon = generateArenaFloor ? [] : [];
    }

    it('isArenaUnlocked respects bestFloor gate for non-gladiators', () => {
        // Use a non-gladiator so the class bypass doesn't mask the floor gate
        gameState.player = new Player('warrior', 'knight', 'Gate Tester');
        gameState.bestFloor = 10; eq(isArenaUnlocked(), false, 'arena unlocked too early');
        gameState.bestFloor = 20; eq(isArenaUnlocked(), true, 'arena did not unlock at 20');
    });

    it('gladiator unlocks the arena from level 1 regardless of floor', () => {
        gameState.player = new Player('warrior', 'gladiator', 'Pit Born');
        gameState.bestFloor = 0;
        eq(isArenaUnlocked(), true, 'gladiator should have Pit access at floor 0');
        gameState.bestFloor = 5;
        eq(isArenaUnlocked(), true, 'gladiator access should not depend on floor');
        // And a non-gladiator at the same floor stays locked
        gameState.player = new Player('warrior', 'knight', 'Earner');
        eq(isArenaUnlocked(), false, 'non-gladiator should still be gated at low floor');
    });

    it('win restores world and awards gold + fame', () => {
        setupArenaPlayer();
        const champ = ARENA_CHAMPIONS[0];
        const bout = { type:'champion', data:champ, goldReward:champ.goldBase, fameReward:champ.fameBase, odds:1.5 };
        const startGold = gameState.player.gold;
        const startFame = getArenaFame();

        startArenaBout(bout, 0, false);
        assert(gameState.inArenaBout === true, 'inArenaBout not set after start');
        assert(gameState.enemies.length === 1, 'opponent not spawned');

        resolveArenaBout(true);
        eq(gameState.inArenaBout, false, 'inArenaBout not cleared after win');
        eq(gameState.floor, 0, 'floor not restored to tavern after bout');
        assert(gameState.player.gold > startGold, 'no gold awarded on win');
        assert(getArenaFame() > startFame, 'no fame awarded on win');
    });

    it('non-ironman loss leaves player alive at 1 HP', () => {
        setupArenaPlayer();
        const champ = ARENA_CHAMPIONS[0];
        const bout = { type:'champion', data:champ, goldReward:champ.goldBase, fameReward:champ.fameBase, odds:1.5 };
        startArenaBout(bout, 50, false); // bet 50, non-ironman
        resolveArenaBout(false);
        eq(gameState.inArenaBout, false, 'inArenaBout not cleared after loss');
        eq(gameState.player.hp, 1, 'non-ironman loss should leave player at 1 HP, not dead');
        eq(gameState.gameOver, false, 'non-ironman loss should not end the run');
    });

    it('captured creature is consumed when its bout starts', () => {
        setupArenaPlayer();
        gameState.capturedCreatures = [{
            type:'goblin', name:'Caged Goblin', color:'#d32f2f', glyph:'G',
            hp:18, maxHp:18, atk:5, def:2, floorCaptured:5, goldBase:40, fameBase:14
        }];
        const bout = { type:'capture', data:gameState.capturedCreatures[0], idx:0,
                       goldReward:40, fameReward:14, odds:2.5 };
        startArenaBout(bout, 0, false);
        eq(gameState.capturedCreatures.length, 0, 'captured creature not consumed at bout start');
        resolveArenaBout(true);
    });

    it('courtyard interaction only opens the arena, never a tavern NPC', () => {
        // Regression guard: tavern-interior NPCs keep their tavern coordinates
        // while you're in the courtyard. Standing on a tile that collides with
        // one (e.g. the gambler at 5,14, near the Pit gate) must NOT open it.
        seedRun(7);
        gameState.floor = 0;
        gameState.inCourtyard = true;
        gameState.bestFloor = 25;
        gameState.player = new Player('warrior', 'gladiator', 'Pit Fighter');
        gameState.gamblingOpen = false;
        gameState.arenaOpen = false;
        // Stand adjacent to where the gambler WOULD be in the tavern (5,14)
        gameState.player.x = 5; gameState.player.y = 13;
        interactInTavern();
        eq(gameState.gamblingOpen, false, 'courtyard Space must not open the dice table');

        // Standing on the arena gate SHOULD open the arena
        gameState.player.x = gameState.arenaGate.x; gameState.player.y = gameState.arenaGate.y - 1;
        interactInTavern();
        eq(gameState.arenaOpen, true, 'courtyard Space at the gate should open the arena');
        if (typeof closeArena === 'function') closeArena();
    });

    it('starting a bout swaps to the arena floor and leaves tavern/courtyard state', () => {
        // Regression guard for the "tavern renders behind the arena" bug: a bout
        // must set inArenaBout, clear inCourtyard, and replace the dungeon grid
        // with the arena pit — the render gates key off exactly these.
        setupArenaPlayer();
        gameState.dungeon = [['tavern-marker']]; // sentinel "old" grid
        const champ = ARENA_CHAMPIONS[0];
        const bout = { type:'champion', data:champ, goldReward:champ.goldBase, fameReward:champ.fameBase, odds:1.5 };
        startArenaBout(bout, 0, false);
        eq(gameState.inArenaBout, true, 'bout should set inArenaBout');
        eq(gameState.inCourtyard, false, 'bout should clear inCourtyard');
        assert(gameState.dungeon[0]?.[0] !== 'tavern-marker', 'bout should replace the dungeon grid with the arena floor');
        // The arena floor is the generated pit: a known interior tile is open (0)
        eq(gameState.dungeon[9]?.[12], 0, 'arena pit interior should be walkable floor');
        resolveArenaBout(true);
        eq(gameState.inArenaBout, false, 'resolving should clear inArenaBout');
    });
});

// ── 8. Settings ──────────────────────────────────────────────────────────────
// Volume/mute logic and persistence — a wrong effectiveVolume() means silent
// audio or ignored mute, and broken persistence means settings reset every run.
describe('Settings', () => {
    it('effectiveVolume respects mute and volume', () => {
        gameSettings.muted = false; gameSettings.masterVolume = 0.5;
        eq(effectiveVolume(), 0.5, 'unmuted should return the volume');
        gameSettings.muted = true;
        eq(effectiveVolume(), 0, 'muted should return 0 regardless of volume');
        gameSettings.muted = false;
    });

    it('settings persist via save/load round-trip', () => {
        gameSettings.masterVolume = 0.33;
        gameSettings.muted = true;
        gameSettings.screenShake = false;
        gameSettings.reduceMotion = true;
        saveSettings();
        // Reset to defaults, then reload
        gameSettings = { ...DEFAULT_SETTINGS };
        loadSettings();
        eq(gameSettings.masterVolume, 0.33, 'volume not persisted');
        eq(gameSettings.muted, true, 'mute not persisted');
        eq(gameSettings.screenShake, false, 'screenShake not persisted');
        eq(gameSettings.reduceMotion, true, 'reduceMotion not persisted');
    });

    it('load merges over defaults for missing keys', () => {
        // Simulate an older save that only had volume
        localStorage.setItem(SAVE_KEY_SETTINGS, JSON.stringify({ masterVolume: 0.9 }));
        gameSettings = { ...DEFAULT_SETTINGS };
        loadSettings();
        eq(gameSettings.masterVolume, 0.9, 'persisted key not applied');
        eq(gameSettings.screenShake, DEFAULT_SETTINGS.screenShake, 'missing key should fall back to default');
    });

    it('volume clamps to 0..1 on load', () => {
        localStorage.setItem(SAVE_KEY_SETTINGS, JSON.stringify({ masterVolume: 5 }));
        gameSettings = { ...DEFAULT_SETTINGS };
        loadSettings();
        assert(gameSettings.masterVolume <= 1, 'volume should clamp to <= 1');
    });

    it('reduceMotion suppresses screen shake', () => {
        // Fully self-contained: set every flag this depends on explicitly,
        // since earlier tests may have left gameState/gameSettings dirty.
        gameState.screenShake = 0;
        gameSettings.screenShake = true;
        gameSettings.reduceMotion = true;
        addCombatShake(20);
        eq(gameState.screenShake, 0, 'reduceMotion should suppress shake');
        // With shake on and motion not reduced, shake applies
        gameState.screenShake = 0;
        gameSettings.reduceMotion = false;
        gameSettings.screenShake = true;
        addCombatShake(20);
        eq(gameState.screenShake, 20, 'shake should apply when motion not reduced');
    });
});

// ── 9. Daily Challenge ────────────────────────────────────────────────────────
// The shared-seed-per-day promise depends on the seed being a pure function of
// the date, and the "beat your best" loop depends on records keeping the best.
describe('Daily Challenge', () => {
    it('daily seed is deterministic per date and varies by date', () => {
        const a = getDailySeed('2026-06-22');
        const b = getDailySeed('2026-06-22');
        eq(a, b, 'same date should yield the same seed');
        const c = getDailySeed('2026-06-23');
        assert(a !== c, 'different dates should yield different seeds');
        assert(a > 0, 'seed should be non-zero');
    });

    it('daily key is a UTC YYYY-MM-DD string', () => {
        const k = getDailyKey(new Date('2026-06-22T23:30:00Z'));
        eq(k, '2026-06-22', 'key should be the UTC date');
    });

    it('records keep the best result for a day', () => {
        gameMeta.dailyRecords = {};
        let isBest = recordDailyResult('2026-06-22', 5, false, 'warrior', 'knight');
        eq(isBest, true, 'first result should be a personal best');
        eq(getDailyRecord('2026-06-22').floor, 5, 'record should store floor');
        // A worse run should NOT overwrite
        isBest = recordDailyResult('2026-06-22', 3, false, 'mage', 'elementalist');
        eq(isBest, false, 'worse run should not be a new best');
        eq(getDailyRecord('2026-06-22').floor, 5, 'record should keep the deeper floor');
        // A deeper run SHOULD overwrite
        isBest = recordDailyResult('2026-06-22', 9, false, 'rogue', 'assassin');
        eq(isBest, true, 'deeper run should be a new best');
        eq(getDailyRecord('2026-06-22').floor, 9, 'record should update to deeper floor');
    });

    it('a win always counts as a new best', () => {
        gameMeta.dailyRecords = { '2026-06-22': { floor: 50, won: false } };
        const isBest = recordDailyResult('2026-06-22', 10, true, 'warrior', 'knight');
        eq(isBest, true, 'a win should always register as best');
        eq(getDailyRecord('2026-06-22').won, true, 'record should mark the win');
    });

    it('records prune to 60 days', () => {
        gameMeta.dailyRecords = {};
        for (let i = 0; i < 70; i++) {
            const d = new Date(2026, 0, 1 + i);
            recordDailyResult(getDailyKey(d), 5, false, 'warrior', 'knight');
        }
        assert(Object.keys(gameMeta.dailyRecords).length <= 60, 'records should prune to <= 60 days');
    });
});

        eq(new Set(glyphs).size, 3, 'new enemy glyphs are not distinct');
    });

    it('warden is stun-immune', () => {
        freshFloor(16);
