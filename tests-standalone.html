        applyStatus(g, 'stun', 3);
        assert(hasStatus(g, 'stun'), 'goblin should be stunnable');
    });

    it('cultist enrages a nearby ally instead of attacking', () => {
        freshFloor(8);
        gameState.player.x = 2; gameState.player.y = 2; // keep player far
        const cultist = new Enemy(15, 15, 'cultist');
        const goblin  = new Enemy(16, 15, 'goblin');

        assert(hasStatus(goblin, 'rage'), 'cultist did not enrage its ally');
        eq(gameState.player.gold, goldBefore, 'cultist should not have dealt with the player this turn');

    it('thief steals gold on hit then enters flee mode', () => {
        freshFloor(12);

    it('new types are gated by floor in the spawn pool', () => {
        // Force the pool selection deterministically by checking membership
        // via repeated draws on a low vs high floor.
        function poolContains(floor, type) {
            gameState.floor = floor;
            for (let i = 0; i < 200; i++) { seedRun(i + 1); if (chooseEnemyType() === type) return true; }
            return false;

        assert(!poolContains(5, 'cultist'), 'cultist should not spawn before floor 8');
        assert(poolContains(10, 'cultist'), 'cultist should spawn by floor 10');
        assert(!poolContains(10, 'warden'), 'warden should not spawn before floor 16');
        assert(poolContains(20, 'warden'), 'warden should spawn by floor 20');

    it('second-wave types exist with sprites and lore', () => {

            assert(ENEMY_SPRITE_SRC[t], `${t} missing a sprite source`);
            assert(BESTIARY_LORE[t], `${t} missing bestiary lore`);
        });
    });

    it('second-wave types are floor-gated', () => {
        function poolContains(floor, type) {
            gameState.floor = floor;
            for (let i = 0; i < 200; i++) { seedRun(i + 1); if (chooseEnemyType() === type) return true; }
            return false;
        }
        assert(!poolContains(3, 'bat'), 'bat should not spawn before floor 5');
        assert(poolContains(8, 'bat'), 'bat should spawn by floor 8');
        assert(!poolContains(4, 'spider'), 'spider should not spawn before floor 6');
        assert(poolContains(10, 'spider'), 'spider should spawn by floor 10');
        assert(!poolContains(10, 'necromancer'), 'necromancer should not spawn before floor 14');
        assert(poolContains(18, 'necromancer'), 'necromancer should spawn by floor 18');
    });

    it('spider poisons the player on hit', () => {
        seedRun(50);
        gameState.floor = 6;
        gameState.player = new Player('warrior', 'knight', 'Tester');
        gameState.player.x = 10; gameState.player.y = 10;
        gameState.player.statuses = [];
        gameState.allies = []; gameState.decoy = null;
        generateDungeon();
        const spider = new Enemy(11, 10, 'spider'); // adjacent
        gameState.enemies = [spider];
        enemyTurn();
        assert(hasStatus(gameState.player, 'poison'), 'spider bite should poison the player');
    });

    it('necromancer raises a skeleton instead of attacking', () => {
        seedRun(51);
        gameState.floor = 14;
        gameState.player = new Player('warrior', 'knight', 'Tester');
        gameState.player.x = 10; gameState.player.y = 10;
        gameState.allies = []; gameState.decoy = null;
        generateDungeon();
        const necro = new Enemy(13, 12, 'necromancer'); // within awareness, not adjacent
        necro._summonCd = 0; // ready to raise
        gameState.enemies = [necro];
        const before = gameState.enemies.length;
        enemyTurn();
        assert(gameState.enemies.length > before, 'necromancer should have raised a minion');
        assert(gameState.enemies.some(e => e._raisedBy === necro), 'raised minion should be tracked to its necromancer');
    });
});

        gameMeta.arenaFame = 25;
        gameState.player = new Player('warrior', 'knight', 'T');
        gameState.player.x = 5; gameState.player.y = 5;
        gameState.inCourtyard = true;
        const goldBefore = gameState.player.gold;
        startGauntlet('bronze_gauntlet', 0);
        // Clear wave 1 (banks reward), then lose
        handleGauntletKill(gameState.enemies[0]);
        const bankedGold = gameState.arenaBoutData.bankedGold;
        assert(bankedGold > 0, 'should have banked gold from wave 1');
        _resolveGauntlet(false); // simulate death
        assert(!gameState.inArenaBout, 'gauntlet should end on loss');
        assert(gameState.player.gold >= goldBefore + bankedGold, 'player should keep banked gold on loss');
    });
});

// ── Render results ───────────────────────────────────────────────────────────
(function render() {
    const results = document.getElementById('results');
    let total = 0, passed = 0;
    groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'group';
        const head = document.createElement('div');
        head.className = 'group-head';
        head.textContent = g.name;
        div.appendChild(head);
        g.cases.forEach(c => {
            total++; if (c.ok) passed++;
            const row = document.createElement('div');
            row.className = 'case ' + (c.ok ? 'ok' : 'bad');
            row.innerHTML = `<span class="icon">${c.ok ? '✓' : '✗'}</span>
                <span class="body"><span class="name">${c.name}</span>${c.detail ? `<div class="detail">${c.detail.replace(/</g,'&lt;')}</div>` : ''}</span>`;
            div.appendChild(row);
        });
        results.appendChild(div);
    });
    const sum = document.getElementById('summary');
    const allPass = passed === total;
    sum.className = allPass ? 'pass' : 'fail';
    sum.textContent = `${passed} / ${total} passed` + (allPass ? '  —  all tripwires green' : '  —  FAILURES above');
})();

</script>
