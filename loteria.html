<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Loter&#xED;a &#x2014; standalone</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&display=swap">
<style>
/* 
   La Loteria - STANDALONE
   A self-contained Mexican Loteria that runs on its own, with no dependency on
   The Broken Flagon's runtime (no gameState / gameMeta / shared CSS). The game
   engine is inlined below, so this is ONE self-contained file with no other
   dependencies. Coins are tracked locally in the browser via localStorage, so
   progress persists between visits but is entirely separate from the main game.
    */
:root {
    --loteria-accent: #ff5e8a;   /* rosa mexicano */
    --loteria-gold:   #ffd65a;
    --loteria-teal:   #2bb6a6;
    --loteria-urgent: #ff4242;
    --loteria-paper:  #fbf3e0;
    --muted: #aaa397;
    --font-display: 'Cinzel', Georgia, 'Times New Roman', serif;
    --font-body: "Courier New", monospace;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
    margin: 0;
    min-height: 100%;
    font-family: var(--font-body);
    color: #f0e6d0;
    background:
        radial-gradient(ellipse 70% 55% at 50% 0%, rgba(255, 94, 138, 0.14), transparent 70%),
        linear-gradient(180deg, #150a10, #0c0509);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 12px;
}

#loteria-inner {
    width: min(880px, 96vw);
    max-height: 94vh;
    overflow-y: auto;
    background: linear-gradient(180deg, #1c1014, #140b10);
    border: 2px solid var(--loteria-accent);
    border-radius: 16px;
    box-shadow: 0 0 50px rgba(255, 94, 138, 0.25);
    padding: 22px 26px 26px;
}
#loteria-header {
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid rgba(255, 214, 90, 0.25);
    padding-bottom: 12px;
    margin-bottom: 16px;
}
#loteria-header h2 {
    font-family: var(--font-display);
    color: var(--loteria-gold);
    margin: 0;
    font-size: 26px;
    letter-spacing: 0.04em;
    flex: 0 0 auto;
}
#loteria-coins-display {
    margin-left: auto;
    color: var(--loteria-gold);
    font-family: var(--font-display);
    font-size: 14px;
}
.loteria-coin-icon { color: var(--loteria-gold); }
#loteria-header button {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    padding: 7px 13px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
}
#loteria-header button:hover { border-color: var(--loteria-accent); }

/*  Setup screen  */
.loteria-tagline {
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.6;
    text-align: center;
    margin: 0 auto 22px;
    max-width: 600px;
    font-family: var(--font-body);
}
.loteria-setup-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    justify-content: center;
}
.loteria-setup-label {
    font-family: var(--font-display);
    color: var(--loteria-gold);
    font-size: 15px;
    width: 70px;
    text-align: right;
    letter-spacing: 0.05em;
}
.loteria-choice-group { display: flex; gap: 8px; flex-wrap: wrap; }
.loteria-choice {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.14);
    color: #f0e6d0;
    padding: 9px 16px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    min-width: 44px;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
}
.loteria-choice:hover { border-color: var(--loteria-accent); transform: translateY(-1px); }
.loteria-choice-active {
    border-color: var(--loteria-accent);
    background: rgba(255, 94, 138, 0.16);
    box-shadow: 0 0 14px rgba(255, 94, 138, 0.3);
}
.loteria-choice-pace { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 96px; }
.loteria-pace-name { font-size: 14px; }
.loteria-pace-mult { font-size: 11px; color: var(--loteria-teal); font-weight: 600; }

#loteria-stake-summary {
    display: flex;
    justify-content: center;
    gap: 24px;
    align-items: baseline;
    margin: 22px 0 14px;
    font-size: 16px;
    color: #f0e6d0;
}
#loteria-stake-summary strong { color: var(--loteria-gold); font-size: 19px; font-family: var(--font-display); }
.loteria-stake-coins { color: var(--muted); font-size: 13px; }

#loteria-start-btn {
    display: block;
    margin: 0 auto;
    padding: 13px 30px;
    background: linear-gradient(180deg, var(--loteria-accent), #d4376a);
    color: #fff;
    font-weight: 800;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-family: var(--font-display);
    letter-spacing: 0.03em;
    box-shadow: 0 4px 16px rgba(255, 94, 138, 0.3);
    transition: filter 0.15s, transform 0.12s;
}
#loteria-start-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
.loteria-btn-disabled, #loteria-start-btn:disabled {
    background: rgba(255,255,255,0.1) !important;
    color: var(--muted) !important;
    cursor: not-allowed;
    box-shadow: none !important;
    transform: none !important;
}
.loteria-setup-note { text-align: center; color: var(--muted); font-size: 12.5px; margin-top: 12px; font-style: italic; }

/*  Play screen  */
#loteria-play-top {
    display: flex;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
}
#loteria-caller-area {
    flex: 1 1 280px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(255, 214, 90, 0.22);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
}
.loteria-caller-label, .loteria-goal-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--loteria-gold);
    margin-bottom: 8px;
}
#loteria-current-card {
    background: var(--loteria-paper);
    border-radius: 12px;
    padding: 14px 10px;
    margin: 0 auto 10px;
    max-width: 200px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4), inset 0 0 0 3px rgba(212,55,106,0.25);
}
.loteria-card-pop { animation: loteria-pop 0.34s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes loteria-pop { from { transform: scale(0.7) rotate(-4deg); opacity: 0.3; } to { transform: scale(1) rotate(0); opacity: 1; } }
#loteria-current-glyph { font-size: 60px; line-height: 1; }
#loteria-current-name {
    font-family: var(--font-display);
    color: #2a1015;
    font-size: 18px;
    font-weight: 800;
    margin-top: 6px;
}
#loteria-current-verse {
    color: var(--muted);
    font-size: 12.5px;
    font-style: italic;
    min-height: 32px;
    margin-bottom: 8px;
    font-family: var(--font-body);
}
#loteria-pace-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;
}
#loteria-pace-bar {
    height: 100%;
    width: 100%;
    background: var(--loteria-accent);
    border-radius: 3px;
    transition: background 0.2s;
}

#loteria-goal-area {
    flex: 0 0 200px;
    background: rgba(0,0,0,0.28);
    border: 1px solid rgba(43, 182, 166, 0.25);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
}
#loteria-goal-pattern {
    font-family: var(--font-display);
    color: var(--loteria-teal);
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 10px;
}
#loteria-goal-mini {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
    width: 76px;
    margin: 0 auto 10px;
}
.loteria-mini-cell {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
}
.loteria-mini-on { background: var(--loteria-teal); box-shadow: 0 0 6px rgba(43,182,166,0.6); }
#loteria-progress-note { font-size: 13px; color: var(--muted); min-height: 18px; font-weight: 700; }
.loteria-progress-hot { color: var(--loteria-urgent) !important; animation: loteria-flash 0.7s ease-in-out infinite; }
@keyframes loteria-flash { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
#loteria-called-count { font-size: 11px; color: var(--muted); margin-top: 6px; }

/*  Tabla boards  */
#loteria-tablas {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
}
.loteria-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    background: rgba(212, 55, 106, 0.12);
    padding: 8px;
    border-radius: 10px;
    border: 1.5px solid rgba(255, 94, 138, 0.3);
}
/* Smaller cells when multiple tabla are in play. */
.loteria-tablas-count-1 .loteria-cell { width: 92px; height: 92px; }
.loteria-tablas-count-2 .loteria-cell { width: 74px; height: 74px; }
.loteria-tablas-count-3 .loteria-cell { width: 58px; height: 58px; }
.loteria-tablas-count-4 .loteria-cell { width: 52px; height: 52px; }
.loteria-cell {
    position: relative;
    background: var(--loteria-paper);
    border: none;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px;
    transition: transform 0.1s, box-shadow 0.15s;
    overflow: hidden;
}
.loteria-cell:hover { transform: scale(1.04); }
.loteria-cell-glyph { font-size: 26px; line-height: 1; }
.loteria-tablas-count-3 .loteria-cell-glyph,
.loteria-tablas-count-4 .loteria-cell-glyph { font-size: 20px; }
.loteria-cell-name {
    font-size: 8.5px;
    color: #4a2a30;
    font-weight: 700;
    text-align: center;
    line-height: 1.05;
    font-family: var(--font-display);
}
.loteria-tablas-count-3 .loteria-cell-name,
.loteria-tablas-count-4 .loteria-cell-name { display: none; }

/* A cell whose card is being called right now - invites the click. */
.loteria-cell-live {
    box-shadow: 0 0 0 3px var(--loteria-gold), 0 0 18px rgba(255,214,90,0.7);
    animation: loteria-live-pulse 0.8s ease-in-out infinite;
}
@keyframes loteria-live-pulse {
    0%,100% { box-shadow: 0 0 0 3px var(--loteria-gold), 0 0 14px rgba(255,214,90,0.5); }
    50%     { box-shadow: 0 0 0 3px var(--loteria-gold), 0 0 24px rgba(255,214,90,0.9); }
}
/* A marked cell - the bean (frijol) sits on top. */
.loteria-cell-marked { filter: saturate(0.6) brightness(0.82); cursor: default; }
.loteria-cell-marked:hover { transform: none; }
.loteria-bean {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    opacity: 0.85;
    animation: loteria-bean-drop 0.25s ease;
    pointer-events: none;
}
@keyframes loteria-bean-drop { from { transform: scale(1.8); opacity: 0; } to { transform: scale(1); opacity: 0.85; } }

/*  Loteria full-card art (sprites/loteria/<id>.png), optional  */
.loteria-cell-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 7px;
    pointer-events: none;
    user-select: none;
    display: none;
}
.loteria-cell-hasart .loteria-cell-art { display: block; }
.loteria-cell-hasart .loteria-cell-glyph,
.loteria-cell-hasart .loteria-cell-name { display: none; }
.loteria-cell-hasart { background: transparent; padding: 0; }

/*  Result overlay  */
#loteria-result-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    animation: loteria-fade 0.3s ease;
}
@keyframes loteria-fade { from { opacity: 0; } to { opacity: 1; } }
#loteria-result-card {
    text-align: center;
    padding: 38px 44px;
    border-radius: 18px;
    max-width: 420px;
    background: radial-gradient(circle at 50% 0%, rgba(40,18,26,0.98), rgba(16,8,12,0.98));
    border: 2px solid var(--loteria-accent);
    box-shadow: 0 0 56px rgba(255,94,138,0.4);
    animation: loteria-pop 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
.loteria-result-win { border-color: var(--loteria-gold) !important; box-shadow: 0 0 70px rgba(255,214,90,0.5) !important; }
.loteria-result-loss { border-color: rgba(255,255,255,0.2) !important; box-shadow: 0 0 40px rgba(0,0,0,0.5) !important; }
#loteria-result-icon { font-size: 60px; margin-bottom: 8px; }
#loteria-result-title {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--loteria-gold);
    margin: 0 0 14px;
    letter-spacing: 0.03em;
}
.loteria-result-loss #loteria-result-title { color: #d8cdbe; }
#loteria-result-text { color: #f0e6d0; font-size: 15px; line-height: 1.6; margin: 0 0 24px; }
#loteria-result-text strong { color: var(--loteria-gold); }
#loteria-result-btn {
    padding: 11px 30px;
    background: linear-gradient(180deg, var(--loteria-accent), #d4376a);
    color: #fff;
    font-weight: 800;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    font-size: 15px;
    font-family: var(--font-display);
    transition: filter 0.15s, transform 0.12s;
}
#loteria-result-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
</style>
</head>
<body>
    <div id="loteria-inner">
        <div id="loteria-header">
            <h2>La Loter&#xED;a</h2>
            <span id="loteria-coins-display"></span>
            <button id="loteria-reset-btn" title="Refill your purse to keep playing">Refill purse</button>
        </div>

        <div id="loteria-setup">
            <p class="loteria-tagline">The caller draws cards one by one. Click each card on your tabla before the next is called &#x2014; miss it and the mark is lost. Complete the announced pattern to win.</p>

            <div class="loteria-setup-row">
                <span class="loteria-setup-label">Tabla</span>
                <div id="loteria-tabla-picker" class="loteria-choice-group"></div>
            </div>
            <div class="loteria-setup-row">
                <span class="loteria-setup-label">Pace</span>
                <div id="loteria-pace-picker" class="loteria-choice-group"></div>
            </div>

            <div id="loteria-stake-summary"></div>
            <button id="loteria-start-btn">Buy In &amp; Start the Caller</button>
            <p id="loteria-setup-note" class="loteria-setup-note"></p>
        </div>

        <div id="loteria-play" style="display:none;">
            <div id="loteria-play-top">
                <div id="loteria-caller-area">
                    <div class="loteria-caller-label">Now calling</div>
                    <div id="loteria-current-card">
                        <div id="loteria-current-glyph">&#127183;</div>
                        <div id="loteria-current-name">&#x2014;</div>
                    </div>
                    <div id="loteria-current-verse"></div>
                    <div id="loteria-pace-bar-track"><div id="loteria-pace-bar"></div></div>
                </div>
                <div id="loteria-goal-area">
                    <div class="loteria-goal-label">Win pattern</div>
                    <div id="loteria-goal-pattern">&#x2014;</div>
                    <div id="loteria-goal-mini"></div>
                    <div id="loteria-progress-note"></div>
                    <div id="loteria-called-count"></div>
                </div>
            </div>
            <div id="loteria-tablas"></div>
        </div>

        <div id="loteria-result-overlay" style="display:none;">
            <div id="loteria-result-card">
                <div id="loteria-result-icon">&#127183;</div>
                <h2 id="loteria-result-title"></h2>
                <p id="loteria-result-text"></p>
                <button id="loteria-result-btn">Play Again</button>
            </div>
        </div>
    </div>

    <!-- The pure game engine, inlined so this is one self-contained file. -->
    <script>
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// THE BROKEN FLAGON \u2014 Loter\u00eda (traditional Mexican board game)
//
// A faithful Loter\u00eda: a caller (el grit\u00f3n) draws cards one at a time from the
// 54-card deck; the player marks matching images on their tabla(s) by clicking
// before the next card is called. Win by completing the round's announced
// pattern and the payout is paid in Flagon Coins.
//
// DESIGN (locked with the player):
//   \u2022 Currency: Flagon Coins (buy tabla, win coins).
//   \u2022 Pace: player-chosen \u2014 faster calling = bigger payout multiplier.
//   \u2022 Marking: MANUAL. Click the card on your tabla before it scrolls past.
//     Miss the click window and that mark is lost (skill + tension).
//   \u2022 Pattern: a RANDOM pattern is announced each round.
//   \u2022 Round end: caller runs until a win, or the 54-card deck is exhausted.
//   \u2022 Multiple tabla: the player may buy 1\u20134 tabla for one round (more cost,
//     more coverage, bigger total stake).
//
// This file is the ENGINE \u2014 pure logic, no DOM. It is unit-tested headless
// before any UI is built on top, the same discipline used for the lottery.
// The UI layer lives in loteria-ui.js and only calls into these functions.
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550

// \u2500\u2500 The 54 traditional cards \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// id = canonical number (1\u201354), name = traditional Spanish name, glyph = a
// unicode stand-in so the game is fully playable before custom art is added
// (drop art into sprites/loteria/<id>.png later and the UI swaps it in, exactly
// like the enemy-sprite contract elsewhere in the game). Verses are the
// traditional/known riddles the caller can announce for flavor; kept short.
const LOTERIA_DECK = [
    { id: 1,  name: 'El Gallo',       glyph: '\ud83d\udc13', verse: 'El que le cant\u00f3 a San Pedro.' },
    { id: 2,  name: 'El Diablito',    glyph: '\ud83d\ude08', verse: 'P\u00f3rtate bien cuatito, si no te lleva el coloradito.' },
    { id: 3,  name: 'La Dama',        glyph: '\ud83d\udc69', verse: 'La dama puliendo el paso.' },
    { id: 4,  name: 'El Catr\u00edn',      glyph: '\ud83c\udfa9', verse: 'Don Ferruco en la alameda.' },
    { id: 5,  name: 'El Paraguas',    glyph: '\u2602\ufe0f', verse: 'Para el sol y para el agua.' },
    { id: 6,  name: 'La Sirena',      glyph: '\ud83e\udddc', verse: 'Con los cantos de sirena, no te vayas a marear.' },
    { id: 7,  name: 'La Escalera',    glyph: '\ud83e\ude9c', verse: 'S\u00fabeme paso a pasito.' },
    { id: 8,  name: 'La Botella',     glyph: '\ud83c\udf7e', verse: 'La herramienta del borracho.' },
    { id: 9,  name: 'El Barril',      glyph: '\ud83d\udee2\ufe0f', verse: 'Tanto bebi\u00f3 el alba\u00f1il, que qued\u00f3 como barril.' },
    { id: 10, name: 'El \u00c1rbol',       glyph: '\ud83c\udf33', verse: 'El que a buen \u00e1rbol se arrima.' },
    { id: 11, name: 'El Mel\u00f3n',       glyph: '\ud83c\udf48', verse: 'Me lo das o me lo quitas.' },
    { id: 12, name: 'El Valiente',    glyph: '\ud83d\udd2a', verse: 'Por qu\u00e9 le corres cobarde.' },
    { id: 13, name: 'El Gorrito',     glyph: '\ud83d\udc52', verse: 'Ponle su gorrito al nene.' },
    { id: 14, name: 'La Muerte',      glyph: '\ud83d\udc80', verse: 'La muerte tilica y flaca.' },

// \u2500\u2500 Tunables (locked with the player) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
const LOTERIA_TABLA_COST = 40;     // Flagon Coins per tabla for a round
const LOTERIA_MAX_TABLA  = 4;      // buy up to 4 tabla at once
const LOTERIA_TABLA_SIZE = 16;     // 4\u00d74 board
const LOTERIA_GRID = 4;

// Pace options: faster = less time to react = higher payout multiplier.
const LOTERIA_PACES = [
    { id: 'relaxed', label: 'Relaxed', secPerCall: 3.5, payoutMult: 0.9 },
    { id: 'classic', label: 'Classic', secPerCall: 2.5, payoutMult: 1.1 },
    { id: 'fast',    label: 'Fast',    secPerCall: 1.6, payoutMult: 1.4 },
];

// Winning patterns. A round announces ONE at random. Each pattern carries a
// `winSets`: an array of winning cell-sets (each a list of 4\u00d74 indices 0\u201315).
// A tabla satisfies the pattern when ANY ONE of its winSets is fully marked.
// This lets "L\u00ednea" win on any single row, column, or diagonal, while the
// shaped patterns (corners/center/full) each have exactly one winSet.
const LOTERIA_PATTERNS = (() => {
    const N = LOTERIA_GRID;
    const idx = (r, c) => r * N + c;
    const rows = [], cols = [];
    for (let r = 0; r < N; r++) rows.push(Array.from({length:N}, (_,c)=>idx(r,c)));
    for (let c = 0; c < N; c++) cols.push(Array.from({length:N}, (_,r)=>idx(r,c)));
    const diagA = Array.from({length:N}, (_,i)=>idx(i,i));
    const diagB = Array.from({length:N}, (_,i)=>idx(i,N-1-i));
    return [
        // L\u00ednea \u2014 any full row, column, or diagonal.
        { id: 'linea',   label: 'L\u00ednea (any line)',        winSets: [...rows, ...cols, diagA, diagB] },
        // Four Corners.
        { id: 'corners', label: 'Four Corners',            winSets: [[idx(0,0), idx(0,N-1), idx(N-1,0), idx(N-1,N-1)]] },
        // Center Four.
        { id: 'center',  label: 'Center Four',             winSets: [[idx(1,1), idx(1,2), idx(2,1), idx(2,2)]] },
        // Tabla Llena \u2014 the whole board.
        { id: 'full',    label: 'Tabla Llena (full board)', winSets: [Array.from({length:N*N}, (_,i)=>i)] },
    ];
})();

// \u2500\u2500 Seedable RNG (reuses the game's _mulberry32 if present) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _loteriaRng(seed) {
    if (typeof _mulberry32 === 'function') return _mulberry32(seed >>> 0);
    let s = seed >>> 0;
    return function () { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
}
function _loteriaShuffle(arr, rnd) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(rnd() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// \u2500\u2500 Tabla generation \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// A tabla is 16 DISTINCT cards from the deck. Returns an array of 16 card ids.
function generateTabla(rnd) {
    const ids = LOTERIA_DECK.map(c => c.id);
    return _loteriaShuffle(ids, rnd).slice(0, LOTERIA_TABLA_SIZE);
}

// \u2500\u2500 Round state \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// A round is a self-contained object (no global mutation) so it's easy to test
// and the UI just holds one. Created by startLoteriaRound().
function startLoteriaRound(opts) {
    opts = opts || {};
    const tablaCount = Math.max(1, Math.min(LOTERIA_MAX_TABLA, opts.tablaCount || 1));
    const pace = LOTERIA_PACES.find(p => p.id === opts.paceId) || LOTERIA_PACES[1];
    const seed = (opts.seed != null) ? opts.seed : (Date.now() ^ Math.floor(Math.random() * 0x7fffffff));
    const rnd = _loteriaRng(seed);

    // Build tabla(s).
    const tablas = [];
    for (let i = 0; i < tablaCount; i++) {
        tablas.push({ cards: generateTabla(rnd), marked: new Array(LOTERIA_TABLA_SIZE).fill(false) });
    }

    // Shuffle the call order (the caller's deck).
    const callOrder = _loteriaShuffle(LOTERIA_DECK.map(c => c.id), rnd);

    // Announce a random winning pattern for this round.
    const pattern = LOTERIA_PATTERNS[Math.floor(rnd() * LOTERIA_PATTERNS.length)];

    const stake = tablaCount * LOTERIA_TABLA_COST;
    return {
        seed, pace, pattern, tablas,
        callOrder,
        callIndex: -1,            // index into callOrder of the current card (-1 = not started)
        called: [],               // ids called so far, in order
        currentCardId: null,      // the card on the table right now
        markableUntil: null,      // (UI uses pace to enforce the click window)
        stake,
        tablaCount,
        status: 'ready',          // ready \u2192 playing \u2192 won | lost
        winningTabla: null,       // index of the tabla that won
        payout: 0,
    };
}

// Advance the caller to the next card. Returns the new current card object, or
// null if the deck is exhausted (round lost if no win by then).
function loteriaCallNext(round) {
    if (round.status !== 'playing' && round.status !== 'ready') return null;
    round.status = 'playing';
    round.callIndex++;
    if (round.callIndex >= round.callOrder.length) {
        // Deck exhausted with no win.
        round.currentCardId = null;
        round.status = 'lost';
        return null;
    }
    const id = round.callOrder[round.callIndex];
    round.currentCardId = id;
    round.called.push(id);
    return getLoteriaCard(id);
}

// Attempt to mark a cell on a tabla. The rule: you may only mark the cell if it
// matches the card CURRENTLY being called (manual, skill-based). Marking a cell
// that doesn't match the current card does nothing (no penalty, just a miss).
// Returns true if a mark was placed.
function loteriaMark(round, tablaIdx, cellIdx) {
    if (round.status !== 'playing') return false;
    const tabla = round.tablas[tablaIdx];
    if (!tabla) return false;
    if (tabla.marked[cellIdx]) return false;                  // already marked
    if (tabla.cards[cellIdx] !== round.currentCardId) return false; // not the called card
    tabla.marked[cellIdx] = true;
    return true;
}

// Check whether any tabla has completed the round's pattern. If so, marks the
// round won, records which tabla and the payout. Returns true on a win.
// Payout = stake \u00d7 pattern difficulty \u00d7 pace multiplier (see _loteriaPatternMult).
function loteriaCheckWin(round) {
    if (round.status !== 'playing') return false;
    for (let t = 0; t < round.tablas.length; t++) {
        const tabla = round.tablas[t];
        const complete = round.pattern.winSets.some(set => set.every(ci => tabla.marked[ci]));
        if (complete) {
            round.status = 'won';
            round.winningTabla = t;
            round.payout = computeLoteriaPayout(round);
            return true;
        }
    }
    return false;
}

// Difficulty multiplier by pattern \u2014 harder patterns pay more. Tuned together
// with the pace multipliers (relaxed 0.9 \u2026 fast 1.4) so that a win NEVER costs
// coins: even the easiest pattern (L\u00ednea) at the slowest pace returns more than
// the stake. The full board (the hardest) pays the real bonus.
function _loteriaPatternMult(patternId) {
    if (patternId === 'full') return 2.2;        // tabla llena \u2014 hardest, best payout
    if (patternId === 'corners') return 1.6;     // four corners
    if (patternId === 'center')  return 1.6;     // center four
    return 1.2;                                  // l\u00ednea (any line) \u2014 easiest
}

// Payout in Flagon Coins for a won round.
function computeLoteriaPayout(round) {
    const base = round.stake;                    // what they paid in
    const patMult = _loteriaPatternMult(round.pattern.id);
    const paceMult = round.pace.payoutMult;
    // Net winnings are generous but bounded. A win always returns at least the
    // stake (the floor below makes that a hard guarantee, not just a tuning
    // accident), so completing the announced pattern never leaves you poorer.
    return Math.max(base, Math.round(base * patMult * paceMult));
}

// \u2500\u2500 Helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function getLoteriaCard(id) { return LOTERIA_DECK.find(c => c.id === id) || null; }

// How many marks short of the announced pattern is the player's best tabla?
// With multi-winSet patterns (L\u00ednea), this is the fewest marks remaining across
// ANY winning line on ANY tabla \u2014 the closest the player is to calling Loter\u00eda.
// (UI uses this to show "1 to go!" tension.) Returns { tablaIdx, remaining }.
function loteriaBestProgress(round) {
    const patternSize = round.pattern.winSets.reduce((m, s) => Math.min(m, s.length), Infinity);
    let best = { tablaIdx: 0, remaining: patternSize };
    round.tablas.forEach((tabla, t) => {
        round.pattern.winSets.forEach(set => {
            const remaining = set.filter(ci => !tabla.marked[ci]).length;
            if (remaining < best.remaining) best = { tablaIdx: t, remaining };
        });
    });
    return best;
}

// A cell is "missable" if the called card matches it but it isn't marked yet \u2014
// i.e. the player still needs to click it before the next call. UI uses this to
// know when a mark opportunity was missed (for the skill/tension rule).
function loteriaPendingMarks(round) {
    const out = [];
    if (round.currentCardId == null) return out;
    round.tablas.forEach((tabla, t) => {
        tabla.cards.forEach((cardId, c) => {
            if (cardId === round.currentCardId && !tabla.marked[c]) out.push({ tablaIdx: t, cellIdx: c });
        });
    });
    return out;
}

        function renderCurrentCard(card) {
            document.getElementById('loteria-current-glyph').textContent = card.glyph;
            document.getElementById('loteria-current-name').textContent = card.name;
            document.getElementById('loteria-current-verse').textContent = card.verse || '';
            const cc = document.getElementById('loteria-current-card');
            cc.classList.remove('loteria-card-pop'); void cc.offsetWidth; cc.classList.add('loteria-card-pop');
        }

        function renderGoal() {
            if (!_round) return;
            document.getElementById('loteria-goal-pattern').textContent = _round.pattern.label;

            const mini = document.getElementById('loteria-goal-mini');
            mini.innerHTML = '';
            const need = new Set(_round.pattern.winSets.flat());
            for (let i = 0; i < LOTERIA_TABLA_SIZE; i++) {
                const dot = document.createElement('div');
                dot.className = 'loteria-mini-cell' + (need.has(i) ? ' loteria-mini-on' : '');
                mini.appendChild(dot);
            }

            const note = document.getElementById('loteria-progress-note');
            const best = loteriaBestProgress(_round);
            if (best.remaining === 0) note.textContent = '';
            else if (best.remaining === 1) { note.textContent = '\u00a1Una m\u00e1s! 1 to go!'; note.className = 'loteria-progress-hot'; }
            else { note.textContent = `${best.remaining} to go`; note.className = ''; }

            document.getElementById('loteria-called-count').textContent = `${_round.called.length} / 54 called`;
        }

        function renderTablas() {
            const wrap = document.getElementById('loteria-tablas');
            if (!_round) return;
            wrap.innerHTML = '';
            wrap.className = 'loteria-tablas-count-' + _round.tablas.length;

            _round.tablas.forEach((tabla, t) => {
                const board = document.createElement('div');
                board.className = 'loteria-board';
                tabla.cards.forEach((cardId, c) => {
                    const card = getLoteriaCard(cardId);
                    const cell = document.createElement('button');
                    const isMarked = tabla.marked[c];
                    const isLive = (_round.currentCardId === cardId) && !isMarked && _round.status === 'playing';
                    cell.className = 'loteria-cell' +
                        (isMarked ? ' loteria-cell-marked' : '') +
                        (isLive ? ' loteria-cell-live' : '');
                    const artSrc = `sprites/loteria/${cardId}.png`;
                    cell.innerHTML =
                        `<span class="loteria-cell-glyph">${card.glyph}</span>` +
                        `<span class="loteria-cell-name">${card.name}</span>` +
                        `<img class="loteria-cell-art" src="${artSrc}" alt="" draggable="false"` +
                        ` onload="this.closest('.loteria-cell').classList.add('loteria-cell-hasart');"` +
                        ` onerror="this.remove();">` +
                        (isMarked ? '<span class="loteria-bean" aria-hidden="true">&#128997;</span>' : '');
                    cell.onclick = () => cellClick(t, c);
                    board.appendChild(cell);
                });
                wrap.appendChild(board);
            });
        }

        // \u2500\u2500 Marking (the skill mechanic) \u2500\u2500
        function cellClick(tablaIdx, cellIdx) {
            if (!_round || _round.status !== 'playing') return;
            if (loteriaMark(_round, tablaIdx, cellIdx)) {
                renderTablas();
                renderGoal();
                if (loteriaCheckWin(_round)) endRound(true);
            }
        }

        // \u2500\u2500 End of round \u2500\u2500
        function endRound(won) {
            stopTimers();
            const overlay = document.getElementById('loteria-result-overlay');
            const icon = document.getElementById('loteria-result-icon');
            const title = document.getElementById('loteria-result-title');
            const text = document.getElementById('loteria-result-text');
            const card = document.getElementById('loteria-result-card');

            if (won) {
                const payout = _round.payout;
                if (payout > 0) addCoins(payout);
                card.className = 'loteria-result-win';
                icon.innerHTML = '&#127881;';
                title.textContent = '\u00a1Loter\u00eda!';
                text.innerHTML =
                    `You completed <strong>${_round.pattern.label}</strong> and won ` +
                    `<strong>${payout.toLocaleString()} Flagon Coins</strong>.`;
            } else {
                card.className = 'loteria-result-loss';
                icon.innerHTML = '&#128533;';
                title.textContent = 'The deck ran out';
                text.innerHTML =
                    `No one completed <strong>${_round.pattern.label}</strong> this round. ` +
                    `Better luck next time \u2014 the caller is ready to go again.`;
            }
            renderCoins();
            overlay.style.display = 'flex';
        }

        function resultContinue() {
            document.getElementById('loteria-result-overlay').style.display = 'none';
            _round = null;
            showSetup();
        }

        // \u2500\u2500 Refill purse (keeps the standalone self-sufficient) \u2500\u2500
        function refillPurse() {
            if (getCoins() >= STARTING_COINS) return;   // only top up when low
            setCoins(STARTING_COINS);
            renderCoins();
            showSetup();
        }

        // \u2500\u2500 Wire up \u2500\u2500
        function init() {
            if (typeof startLoteriaRound !== 'function') {
                document.getElementById('loteria-inner').innerHTML =
                    '<p style="color:#ff7a7a;font-family:monospace;padding:20px;">' +
                    'Could not load the Loter\u00eda engine (js/loteria.js). Serve this page from the ' +
                    'project folder (e.g. <code>python3 -m http.server</code>) so the script can load.</p>';
                return;
            }
            document.getElementById('loteria-start-btn').onclick = start;
            document.getElementById('loteria-result-btn').onclick = resultContinue;
            document.getElementById('loteria-reset-btn').onclick = refillPurse;
            showSetup();
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    })();
    </script>
</body>
</html>
